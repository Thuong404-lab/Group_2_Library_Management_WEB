# Cau hinh chung (an toan de commit)
spring.profiles.active=dev
spring.application.name=library-management

# JPA / Hibern
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=com.lms.config.DatabaseNamingStrategy

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Internationalization (English default, Vietnamese optional)
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
# Keep message bundles in sync with Thymeleaf templates during local development.
spring.messages.cache-duration=0s

# Upload file size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server
server.port=8080
server.servlet.context-path=/
app.base-url=http://localhost:${server.port}

# Session timeout
server.servlet.session.timeout=30m
server.servlet.session.persistent=false
