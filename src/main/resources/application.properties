# Cau hinh chung (an toan de commit)
spring.profiles.active=dev
library.transactions.page-size=12
spring.application.name=library-management

# JPA / Hibern
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.naming.physical-strategy=com.lms.config.DatabaseNamingStrategy
# The project does not use generated JPA static metamodel classes. Disabling
# population prevents Hibernate Envers' bundled mapped-superclass metamodel
# from being injected as an entity during startup (HHH015007).
spring.jpa.properties.hibernate.jpa.static_metamodel.population=disabled
# Keep the existing view-rendering behavior explicit instead of relying on
# Spring Boot's default, which also removes the startup configuration warning.
spring.jpa.open-in-view=true

# Versioned database migrations run before Hibernate validation.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
# Allow newly merged timestamped migrations to run when a newer team migration
# already exists in the shared database history.
spring.flyway.out-of-order=true
spring.flyway.clean-disabled=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Internationalization (English default, Vietnamese optional)
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
# Keep message bundles in sync with Thymeleaf templates during local development.
spring.messages.cache-duration=0s

# Upload file size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server
server.port=8080
server.servlet.context-path=/
app.base-url=http://localhost:${server.port}

# Session timeout
server.servlet.session.timeout=30m
server.servlet.session.persistent=false
