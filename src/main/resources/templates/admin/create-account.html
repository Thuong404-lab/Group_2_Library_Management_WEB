<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/admin_base}">

<head>
    <title th:text="${source == 'staff' ? 'Tạo tài khoản nhân viên' : 'Tạo tài khoản thành viên'}">
        Tạo tài khoản
    </title>
    <link rel="stylesheet" th:href="@{/css/pages/librarian/member-list.css}" />
    <link rel="stylesheet" th:href="@{/css/pages/admin/create-account.css}" />
</head>

<body>
    <div layout:fragment="content" th:with="activeMenu=${source == 'staff' ? 'staff' : 'accounts'}"
        class="member-management-page">
        <div
            class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom u-border-color-rgba-139-90-43-0-2-important-f8e732ba">
            <div>
                <h2 class="fw-bold mb-1 u-color-4a3b32-font-family-playfair-display-serif-70239336"
                    th:text="${source == 'staff' ? 'Tạo Tài Khoản Thủ Thư' : 'Tạo Tài Khoản Thành Viên'}">
                    Tạo Tài Khoản Mới
                </h2>
                <div class="text-muted"
                    th:text="${source == 'staff' ? 'Thêm một tài khoản nhân viên mới vào hệ thống' : 'Thêm một tài khoản thành viên mới vào hệ thống'}">
                    Thêm một tài khoản mới vào hệ thống
                </div>
            </div>
            <div>
                <a class="btn btn-outline-secondary" th:href="${backUrl}">
                    <span th:text="${backText}">← Quản lý tài khoản</span>
                </a>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card-classic shadow-sm mb-4">
                    <div class="card-header bg-white border-bottom border-color p-4">
                        <h5 class="fw-bold mb-0 u-color-4a3b32-font-family-playfair-display-serif-70239336">
                            <i class="bi bi-person-lines-fill me-2 text-classic"></i>
                            Thông tin tài khoản
                        </h5>
                    </div>
                    <div class="card-body px-4 pb-4 pt-2">
                        <form method="post" th:action="@{/admin/accounts/create}" autocomplete="off"
                            id="createAccountForm" novalidate th:fragment="createAccountForm(source, modalMode)"
                            th:attr="data-validation-url=@{/admin/accounts/create/validate}">
                            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}"
                                th:value="${_csrf.token}">
                            <input type="hidden" name="source" th:value="${source}">
                            <input type="hidden" name="accountType" value="MEMBER" th:if="${source == 'members'}">

                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-muted text-uppercase">Họ tên <span
                                            class="text-danger">*</span></label>
                                    <input class="form-control validate-field" name="fullName" maxlength="50" required
                                        placeholder="Nguyễn Văn A"
                                        th:value="${formValues != null ? formValues['fullName'] : ''}"
                                        th:classappend="${fieldErrors != null and fieldErrors['fullName'] != null} ? 'is-invalid'">
                                    <div class="invalid-feedback"
                                        th:text="${fieldErrors != null ? fieldErrors['fullName'] : ''}">
                                        Họ tên không được để trống.
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-muted text-uppercase">Email <span
                                            class="text-danger">*</span></label>
                                    <input class="form-control validate-field" name="email" type="email" required
                                        pattern="[A-Za-z0-9]+([._%+\-][A-Za-z0-9]+)*@([A-Za-z0-9]([A-Za-z0-9\-]*[A-Za-z0-9])?\.)+[A-Za-z]{2,}"
                                        placeholder="email@example.com" autocomplete="off"
                                        th:value="${formValues != null ? formValues['email'] : ''}"
                                        th:classappend="${fieldErrors != null and fieldErrors['email'] != null} ? 'is-invalid'">
                                    <div class="invalid-feedback"
                                        th:text="${fieldErrors != null ? fieldErrors['email'] : ''}">
                                        Email không hợp lệ.
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-muted text-uppercase">
                                        Số điện thoại <span class="text-danger">*</span>
                                    </label>
                                    <input class="form-control validate-field" name="phone" required
                                        pattern="^(?!0{10}$)0[0-9]{9}$" minlength="10" inputmode="numeric"
                                        placeholder="0912345678"
                                        th:value="${formValues != null ? formValues['phone'] : ''}"
                                        th:classappend="${fieldErrors != null and fieldErrors['phone'] != null} ? 'is-invalid'">
                                    <div class="invalid-feedback"
                                        th:text="${fieldErrors != null ? fieldErrors['phone'] : ''}">
                                        Số điện thoại không hợp lệ.
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-muted text-uppercase">Username <span
                                            class="text-danger">*</span></label>
                                    <input class="form-control validate-field" name="username" required
                                        pattern="[a-zA-Z0-9_]{3,20}" placeholder="Nhập tên đăng nhập"
                                        autocomplete="new-password"
                                        th:value="${formValues != null ? formValues['username'] : ''}"
                                        th:classappend="${fieldErrors != null and fieldErrors['username'] != null} ? 'is-invalid'">
                                    <div class="invalid-feedback"
                                        th:text="${fieldErrors != null ? fieldErrors['username'] : ''}">
                                        Username không được để trống.
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-muted text-uppercase">
                                        Mật khẩu <span class="text-danger">*</span>
                                    </label>
                                    <input class="form-control validate-field" name="password" type="password" required
                                        minlength="6" placeholder="Nhập mật khẩu" autocomplete="new-password"
                                        th:classappend="${fieldErrors != null and fieldErrors['password'] != null} ? 'is-invalid'">
                                    <div class="invalid-feedback"
                                        th:text="${fieldErrors != null ? fieldErrors['password'] : ''}">
                                        Mật khẩu không được để trống.
                                    </div>
                                </div>
                            </div>

                            <div class="row g-4">
                                <div class="col-md-6" id="tierBox" th:if="${source == 'members'}">
                                    <label class="form-label fw-bold small text-muted text-uppercase">
                                        Hạng thành viên
                                    </label>
                                    <div class="member-readonly-field" role="textbox" aria-readonly="true">
                                        Thường
                                    </div>
                                    <input type="hidden" name="tierId" th:each="tier : ${tiers}"
                                        th:if="${#strings.equalsIgnoreCase(tier.tierName, 'Regular')}"
                                        th:value="${tier.tierId}">
                                </div>

                                <div class="col-md-6" th:if="${source != 'members'}">
                                    <label class="form-label fw-bold small text-muted text-uppercase">
                                        Loại tài khoản <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select form-control validate-field" name="accountType"
                                        id="accountType" required
                                        th:classappend="${fieldErrors != null and fieldErrors['accountType'] != null} ? 'is-invalid'">
                                        <option value="" disabled
                                            th:selected="${formValues == null or #strings.isEmpty(formValues['accountType'])}">
                                            -- Chọn loại tài khoản --
                                        </option>
                                        <option value="LIBRARIAN"
                                            th:selected="${formValues != null and formValues['accountType'] == 'LIBRARIAN'}">
                                            Thủ thư (Librarian)
                                        </option>
                                        <option value="ADMIN"
                                            th:selected="${formValues != null and formValues['accountType'] == 'ADMIN'}">
                                            Quản trị viên (Admin)
                                        </option>
                                    </select>
                                    <div class="invalid-feedback"
                                        th:text="${fieldErrors != null ? fieldErrors['accountType'] : ''}">
                                        Vui lòng chọn loại tài khoản.
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold small text-muted text-uppercase">
                                        Trạng thái
                                    </label>
                                    <div class="member-readonly-field" role="textbox" aria-readonly="true">
                                        Hoạt động
                                    </div>
                                    <input type="hidden" name="status" value="Active">
                                </div>

                            </div>

                            <hr class="my-4 u-border-color-rgba-139-90-43-0-2-447fe402">
                            <div class="d-flex justify-content-end u-gap-12px-58cf3fe5">
                                <a class="btn btn-light border shadow-sm" th:if="${modalMode != true}"
                                    th:href="${backUrl}">
                                    Hủy bỏ
                                </a>
                                <button class="btn btn-light border shadow-sm" th:if="${modalMode == true}"
                                    type="button" data-bs-dismiss="modal">Hủy bỏ</button>
                                <button class="btn btn-classic px-4" type="submit">
                                    Tạo tài khoản
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script th:fragment="createAccountValidation">
            document.addEventListener("DOMContentLoaded", function () {
                const form = document.getElementById("createAccountForm");

                if (form == null) {
                    return;
                }

                const fields = form.querySelectorAll(".validate-field");
                const modal = form.closest(".modal");
                let isSubmitting = false;

                function getFeedback(field) {
                    return field.parentElement.querySelector(".invalid-feedback");
                }

                function getErrorMessage(field) {
                    const labels = {
                        fullName: "Họ tên",
                        email: "Email",
                        phone: "Số điện thoại",
                        username: "Username",
                        password: "Mật khẩu",
                        tierId: "Hạng thành viên",
                        accountType: "Loại tài khoản",
                        status: "Trạng thái tài khoản"
                    };

                    if (field.validity.valueMissing) {
                        if (field.tagName === "SELECT") {
                            return "Vui lòng chọn " + labels[field.name].toLowerCase() + ".";
                        }
                        return labels[field.name] + " không được để trống.";
                    }

                    if (field.name === "phone") {
                        return "Số điện thoại phải gồm đúng 10 chữ số, bắt đầu bằng số 0 và không được toàn số 0.";
                    }

                    if (field.name === "fullName") {
                        return "Họ tên chỉ được chứa chữ cái và khoảng trắng.";
                    }

                    if (field.name === "username") {
                        return "Username phải từ 3-20 ký tự, chỉ gồm chữ cái, chữ số và dấu gạch dưới.";
                    }

                    if (field.name === "password") {
                        return "Mật khẩu phải có ít nhất 6 ký tự.";
                    }

                    if (field.name === "email"
                        && (field.validity.typeMismatch || field.validity.patternMismatch)) {
                        return "Email không đúng định dạng.";
                    }

                    return "Giá trị không hợp lệ.";
                }

                function validateField(field) {
                    const value = field.value.trim();
                    const feedback = getFeedback(field);

                    if (field.hasAttribute("required") && value === "") {
                        field.classList.remove("is-valid");
                        field.classList.add("is-invalid");
                        feedback.textContent = getErrorMessage(field);
                        return false;
                    }

                    if (field.name === "phone" && !/^(?!0{10}$)0[0-9]{9}$/.test(value)) {
                        field.classList.remove("is-valid");
                        field.classList.add("is-invalid");
                        feedback.textContent = getErrorMessage(field);
                        return false;
                    }

                    if (field.name === "fullName" && !/^[\p{L}]+(?:\s+[\p{L}]+)*$/u.test(value)) {
                        field.classList.remove("is-valid");
                        field.classList.add("is-invalid");
                        feedback.textContent = getErrorMessage(field);
                        return false;
                    }

                    if (field.name === "fullName" && value.length > 50) {
                        field.classList.remove("is-valid");
                        field.classList.add("is-invalid");
                        feedback.textContent = "Họ tên không được vượt quá 50 ký tự.";
                        return false;
                    }

                    if (field.name === "fullName"
                        && !/^[\p{L}]{1,15}(?:\s+[\p{L}]{1,15}){0,7}$/u.test(value)) {
                        field.classList.remove("is-valid");
                        field.classList.add("is-invalid");
                        feedback.textContent = "Họ tên chỉ được có tối đa 8 từ và mỗi từ không quá 15 ký tự.";
                        return false;
                    }

                    if (field.name === "fullName" && /([\p{L}])\1\1/u.test(value)) {
                        field.classList.remove("is-valid");
                        field.classList.add("is-invalid");
                        feedback.textContent = "Họ tên không được có một ký tự lặp lại 3 lần liên tiếp.";
                        return false;
                    }

                    if (field.name === "fullName" && /^([\p{L}])\1+$/u.test(value)) {
                        field.classList.remove("is-valid");
                        field.classList.add("is-invalid");
                        feedback.textContent = "Họ tên không được chỉ gồm một ký tự lặp lại.";
                        return false;
                    }

                    if (!field.checkValidity()) {
                        field.classList.remove("is-valid");
                        field.classList.add("is-invalid");
                        feedback.textContent = getErrorMessage(field);
                        return false;
                    }

                    field.classList.remove("is-invalid");
                    field.classList.add("is-valid");
                    feedback.textContent = "";
                    return true;
                }

                function clearFieldError(field) {
                    const feedback = getFeedback(field);
                    field.classList.remove("is-invalid", "is-valid");
                    if (feedback != null) {
                        feedback.textContent = "";
                    }
                }

                fields.forEach(function (field) {
                    field.addEventListener("input", function () {
                        clearFieldError(field);
                    });

                    field.addEventListener("change", function () {
                        clearFieldError(field);
                    });
                });

                form.addEventListener("submit", async function (event) {
                    event.preventDefault();
                    if (isSubmitting) return;
                    isSubmitting = true;
                    let isFormValid = true;

                    fields.forEach(function (field) {
                        if (!validateField(field)) {
                            isFormValid = false;
                        }
                    });

                    const submitButton = form.querySelector("button[type='submit']");
                    submitButton.disabled = true;
                    try {
                        const params = new URLSearchParams();
                        new FormData(form).forEach(function (value, key) {
                            if (!key.startsWith("_csrf")) {
                                params.append(key, value);
                            }
                        });

                        const validationUrl = new URL(form.dataset.validationUrl, window.location.origin);
                        params.forEach(function (value, key) {
                            validationUrl.searchParams.append(key, value);
                        });
                        const response = await fetch(validationUrl.toString(), {
                            headers: { "Accept": "application/json" }
                        });
                        if (!response.ok) {
                            throw new Error("Validation request failed");
                        }

                        const serverErrors = await response.json();
                        const errors = Object.assign({}, serverErrors, Object.fromEntries(
                            Array.from(fields).filter(function (field) {
                                return field.classList.contains("is-invalid");
                            }).map(function (field) {
                                return [field.name, getFeedback(field).textContent];
                            })
                        ));
                        const errorFields = Object.keys(errors);
                        if (errorFields.length > 0) {
                            let firstInvalidField = null;
                            errorFields.forEach(function (fieldName) {
                                const field = form.elements.namedItem(fieldName);
                                if (field == null || !field.classList) {
                                    return;
                                }
                                field.classList.remove("is-valid");
                                field.classList.add("is-invalid");
                                const feedback = getFeedback(field);
                                if (feedback != null) {
                                    feedback.textContent = errors[fieldName];
                                }
                                if (firstInvalidField == null) {
                                    firstInvalidField = field;
                                }
                            });
                            if (firstInvalidField != null) {
                                firstInvalidField.focus();
                            }
                            return;
                        }

                        form.submit();
                    } catch (error) {
                        window.alert("Không thể kiểm tra dữ liệu lúc này. Vui lòng thử lại.");
                    } finally {
                        submitButton.disabled = false;
                        isSubmitting = false;
                    }
                });

                if (modal != null) {
                    modal.addEventListener("hidden.bs.modal", function () {
                        form.reset();
                        fields.forEach(clearFieldError);
                    });
                }
            });
        </script>
    </div>

</body>

</html>
