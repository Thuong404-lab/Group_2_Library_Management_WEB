<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/admin_base}">

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/pages/admin/dashboard.css}" />
</head>

<body>
    <div layout:fragment="content" th:with="activeMenu='dashboard'">
        <div
            class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom u-border-color-rgba-139-90-43-0-2-important-f8e732ba">
            <div>
                <h2 class="fw-bold mb-1 u-color-4a3b32-font-family-playfair-display-serif-70239336">Tổng quan Thư
                    viện</h2>
                <div class="text-muted">
                    Cập nhật: <span class="fw-bold"
                        th:text="${#temporals.format(currentDate, 'dd/MM/yyyy')}">24/06/2026</span>
                </div>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success shadow-sm" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger shadow-sm" th:text="${error}"></div>

        <!-- Overview -->
        <section id="section-overview" class="lib-section active">

            <!-- Statistics Cards -->
            <div class="row row-cols-6 g-3 mb-5">
                <div class="col">
                    <div
                        class="card-classic dashboard-stat-card h-100 py-3 px-3 border-0 shadow-sm u-border-left-4px-solid-0d6efd-important-64ac16c1">
                        <div class="d-flex align-items-center h-100">
                            <div
                                class="rounded-circle d-flex align-items-center justify-content-center me-3 u-width-48px-height-48px-background-color-rgba-13-110-253-0-1-color-0d6efd-e5954655">
                                <i class="bi bi-book fs-4"></i>
                            </div>
                            <div class="flex-grow-1 text-center">
                                <div class="dashboard-stat-label text-muted small text-uppercase fw-bold mb-0">
                                    Đầu Sách
                                </div>
                                <h3 class="fw-bold mb-0 fs-4 u-color-2c1e16-5ab7ae80" th:text="${totalBooks}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div
                        class="card-classic dashboard-stat-card h-100 py-3 px-3 border-0 shadow-sm u-border-left-4px-solid-198754-important-8dcb64f6">
                        <div class="d-flex align-items-center h-100">
                            <div
                                class="rounded-circle d-flex align-items-center justify-content-center me-3 u-width-48px-height-48px-background-color-rgba-25-135-84-0-1-color-198754-c23022eb">
                                <i class="bi bi-check2-square fs-4"></i>
                            </div>
                            <div class="flex-grow-1 text-center">
                                <div class="dashboard-stat-label text-muted small text-uppercase fw-bold mb-0">Bản sách
                                </div>
                                <h3 class="fw-bold mb-0 fs-4 u-color-2c1e16-5ab7ae80" th:text="${availableItems}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div
                        class="card-classic dashboard-stat-card h-100 py-3 px-3 border-0 shadow-sm admin-dashboard-div-border-left-08">
                        <div class="d-flex align-items-center h-100">
                            <div
                                class="rounded-circle d-flex align-items-center justify-content-center me-3 admin-dashboard-div-width-height-background-09">
                                <i class="bi bi-people fs-4"></i>
                            </div>
                            <div class="flex-grow-1 text-center">
                                <div class="dashboard-stat-label text-muted small text-uppercase fw-bold mb-0">
                                    Thành Viên
                                </div>
                                <h3 class="fw-bold mb-0 fs-4 u-color-2c1e16-5ab7ae80" th:text="${totalMembers}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div
                        class="card-classic dashboard-stat-card h-100 py-3 px-3 border-0 shadow-sm u-border-left-4px-solid-0dcaf0-important-b5b60906">
                        <div class="d-flex align-items-center h-100">
                            <div
                                class="rounded-circle d-flex align-items-center justify-content-center me-3 u-width-48px-height-48px-background-color-rgba-13-202-240-0-1-color-0dcaf0-5c77f3cf">
                                <i class="bi bi-journal-arrow-up fs-4"></i>
                            </div>
                            <div class="flex-grow-1 text-center">
                                <div class="dashboard-stat-label text-muted small text-uppercase fw-bold mb-0">Đang Mượn
                                </div>
                                <h3 class="fw-bold mb-0 fs-4 u-color-2c1e16-5ab7ae80" th:text="${activeBorrows}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div
                        class="card-classic dashboard-stat-card h-100 py-3 px-3 border-0 shadow-sm u-border-left-4px-solid-fd7e14-important-0fa630a5">
                        <div class="d-flex align-items-center h-100">
                            <div
                                class="rounded-circle d-flex align-items-center justify-content-center me-3 u-width-48px-height-48px-background-color-rgba-253-126-20-0-1-color-fd7e14-8d4d646a">
                                <i class="bi bi-clock-history fs-4"></i>
                            </div>
                            <div class="flex-grow-1 text-center">
                                <div class="dashboard-stat-label text-muted small text-uppercase fw-bold mb-0">Yêu cầu
                                    mượn</div>
                                <h3 class="fw-bold mb-0 fs-4 u-color-2c1e16-5ab7ae80" th:text="${pendingBorrows}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div
                        class="card-classic dashboard-stat-card h-100 py-3 px-3 border-0 shadow-sm u-border-left-4px-solid-dc3545-important-49da6d79">
                        <div class="d-flex align-items-center h-100">
                            <div
                                class="rounded-circle d-flex align-items-center justify-content-center me-3 u-width-48px-height-48px-background-color-rgba-220-53-69-0-1-color-dc3545-4faa87be">
                                <i class="bi bi-exclamation-triangle fs-4"></i>
                            </div>
                            <div class="flex-grow-1 text-center">
                                <div class="dashboard-stat-label text-muted small text-uppercase fw-bold mb-0">
                                    Quá hạn mượn
                                </div>
                                <h3 class="fw-bold mb-0 fs-4 u-color-2c1e16-5ab7ae80" th:text="${overdueBorrows}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Dashboard Content -->
            <div class="row g-4">
                <!-- Thống kê mượn trả -->
                <div class="col-lg-8">
                    <div class="card-classic h-100 shadow-sm">
                        <div class="card-header bg-white border-bottom p-4 border-color">
                            <h5 class="fw-bold mb-0 u-color-4a3b32-font-family-playfair-display-serif-70239336">
                                <i class="bi bi-bar-chart-line me-2 text-classic"></i>Thống kê mượn/trả 6 tháng qua
                            </h5>
                        </div>
                        <div
                            class="card-body p-4 d-flex align-items-end justify-content-around admin-dashboard-div-min-height-16">
                            <div th:each="stat : ${monthStats}"
                                class="text-center d-flex flex-column align-items-center justify-content-end admin-dashboard-div-height-17">
                                <div class="fw-bold mb-2 u-color-8b5a2b-93ece783" th:text="${stat.count}">0</div>
                                <div class="admin-dashboard-div-width-background-border-radius-19"
                                    th:data-presentation-height="${stat.height}"
                                    th:title="${stat.count + ' phiếu mượn'}">
                                </div>
                                <div class="text-muted small mt-2 fw-bold" th:text="${stat.label}">...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Hoạt động gần đây -->
                <div class="col-lg-4">
                    <div class="card-classic h-100 shadow-sm">
                        <div class="card-header bg-white border-bottom p-4 border-color">
                            <h5 class="fw-bold mb-0 u-color-4a3b32-font-family-playfair-display-serif-70239336">
                                <i class="bi bi-activity me-2 text-classic"></i> Hoạt động gần đây
                            </h5>
                        </div>
                        <div class="card-body p-4">
                            <div th:if="${#lists.isEmpty(recentBorrows)}" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                <div class="d-flex mb-3 pb-3 border-bottom admin-dashboard-div-border-color-20"
                                    th:each="borrow, iterStat : ${recentBorrows}">
                                    <div class="flex-shrink-0">
                                        <img th:if="${borrow.borrow.member != null && borrow.borrow.member.user != null && borrow.borrow.member.user.avatar != null && !borrow.borrow.member.user.avatar.isEmpty()}"
                                            th:src="${borrow.borrow.member.user.avatar}"
                                            class="rounded-circle border u-width-40px-height-40px-object-fit-cover-2142a144"
                                            alt="Avatar">
                                        <div th:unless="${borrow.borrow.member != null && borrow.borrow.member.user != null && borrow.borrow.member.user.avatar != null && !borrow.borrow.member.user.avatar.isEmpty()}"
                                            class="rounded-circle text-white d-flex align-items-center justify-content-center u-width-40px-height-40px-font-weight-bold-background-color-8b5a2b-aa9fcd7a"
                                            th:text="${borrow.borrow.member != null && borrow.borrow.member.user != null ? #strings.substring(borrow.borrow.member.user.fullName, 0, 1) : 'N'}">
                                            N
                                        </div>
                                    </div>
                                    <div class="flex-grow-1 ms-3">
                                        <h6 class="mb-1 fw-bold"
                                            th:text="${borrow.borrow.member != null && borrow.borrow.member.user != null ? borrow.borrow.member.user.fullName : 'Người dùng ẩn danh'}">
                                            Người dùng</h6>
                                        <div class="text-muted small">
                                            <i class="bi bi-box-arrow-right me-1"></i> Đã mượn: <span
                                                th:text="${borrow.book.title}">Sách</span> ·
                                            <span
                                                th:text="${borrow.borrow.borrowDate != null ? #temporals.format(borrow.borrow.borrowDate, 'dd/MM/yyyy · HH:mm') : 'N/A'}">Hôm
                                                nay</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer bg-white border-top text-center p-3 border-color"
                            th:if="${!#lists.isEmpty(recentBorrows)}">
                            <a th:href="@{/admin/reports}" class="text-decoration-none fw-bold text-classic">Xem tất cả
                                hoạt động <i class="bi bi-arrow-right"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>

</html>
