<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/admin_base}">

<head>
    <title>Admin Dashboard</title>
</head>

<body>
    <div layout:fragment="content" th:with="activeMenu='dashboard'">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom"
            style="border-color: rgba(139, 90, 43, 0.2) !important;">
            <div>
                <h2 class="fw-bold mb-1" style="color: #4a3b32; font-family: 'Playfair Display', serif;">Tổng quan Thư
                    viện</h2>
                <div class="text-muted">
                    Cập nhật: <span class="fw-bold"
                        th:text="${#temporals.format(currentDate, 'dd/MM/yyyy')}">24/06/2026</span>
                </div>
            </div>
        </div>

        <!-- Statistics Cards -->
        <div class="row g-3 mb-5">
            <div class="col-xl-2 col-lg-4 col-sm-6">
                <div class="card-classic h-100 py-3 px-3 border-0 shadow-sm"
                    style="border-left: 4px solid #0d6efd !important;">
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                            style="width: 48px; height: 48px; background-color: rgba(13, 110, 253, 0.1); color: #0d6efd;">
                            <i class="bi bi-book fs-4"></i>
                        </div>
                        <div class="flex-grow-1 text-center">
                            <div class="text-muted small text-uppercase fw-bold mb-0">Tổng Đầu Sách</div>
                            <h3 class="fw-bold mb-0 fs-4" style="color: #2c1e16;" th:text="${totalBooks}">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-4 col-sm-6">
                <div class="card-classic h-100 py-3 px-3 border-0 shadow-sm"
                    style="border-left: 4px solid #198754 !important;">
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                            style="width: 48px; height: 48px; background-color: rgba(25, 135, 84, 0.1); color: #198754;">
                            <i class="bi bi-check2-square fs-4"></i>
                        </div>
                        <div class="flex-grow-1 text-center">
                            <div class="text-muted small text-uppercase fw-bold mb-0">Bản sách sẵn có</div>
                            <h3 class="fw-bold mb-0 fs-4" style="color: #2c1e16;" th:text="${availableItems}">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-4 col-sm-6">
                <div class="card-classic h-100 py-3 px-3 border-0 shadow-sm"
                    style="border-left: 4px solid #6f42c1 !important;">
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                            style="width: 48px; height: 48px; background-color: rgba(111, 66, 193, 0.1); color: #6f42c1;">
                            <i class="bi bi-people fs-4"></i>
                        </div>
                        <div class="flex-grow-1 text-center">
                            <div class="text-muted small text-uppercase fw-bold mb-0">Tổng Thành Viên</div>
                            <h3 class="fw-bold mb-0 fs-4" style="color: #2c1e16;" th:text="${totalMembers}">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-4 col-sm-6">
                <div class="card-classic h-100 py-3 px-3 border-0 shadow-sm"
                    style="border-left: 4px solid #0dcaf0 !important;">
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                            style="width: 48px; height: 48px; background-color: rgba(13, 202, 240, 0.1); color: #0dcaf0;">
                            <i class="bi bi-journal-arrow-up fs-4"></i>
                        </div>
                        <div class="flex-grow-1 text-center">
                            <div class="text-muted small text-uppercase fw-bold mb-0">Đang Mượn</div>
                            <h3 class="fw-bold mb-0 fs-4" style="color: #2c1e16;" th:text="${activeBorrows}">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-4 col-sm-6">
                <div class="card-classic h-100 py-3 px-3 border-0 shadow-sm"
                    style="border-left: 4px solid #fd7e14 !important;">
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                            style="width: 48px; height: 48px; background-color: rgba(253, 126, 20, 0.1); color: #fd7e14;">
                            <i class="bi bi-clock-history fs-4"></i>
                        </div>
                        <div class="flex-grow-1 text-center">
                            <div class="text-muted small text-uppercase fw-bold mb-0">Yêu cầu mượn</div>
                            <h3 class="fw-bold mb-0 fs-4" style="color: #2c1e16;" th:text="${pendingBorrows}">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-xl-2 col-lg-4 col-sm-6">
                <div class="card-classic h-100 py-3 px-3 border-0 shadow-sm"
                    style="border-left: 4px solid #dc3545 !important;">
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle d-flex align-items-center justify-content-center me-3"
                            style="width: 48px; height: 48px; background-color: rgba(220, 53, 69, 0.1); color: #dc3545;">
                            <i class="bi bi-exclamation-triangle fs-4"></i>
                        </div>
                        <div class="flex-grow-1 text-center">
                            <div class="text-muted small text-uppercase fw-bold mb-0">Phiếu mượn quá hạn</div>
                            <h3 class="fw-bold mb-0 fs-4" style="color: #2c1e16;" th:text="${overdueBorrows}">0</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Dashboard Content -->
        <div class="row g-4">
            <!-- Thống kê mượn trả -->
            <div class="col-lg-8">
                <div class="card-classic h-100 shadow-sm">
                    <div class="card-header bg-white border-bottom p-4 border-color">
                        <h5 class="fw-bold mb-0" style="color: #4a3b32; font-family: 'Playfair Display', serif;">
                            <i class="bi bi-bar-chart-line me-2 text-classic"></i>Thống kê mượn/trả 6 tháng qua
                        </h5>
                    </div>
                    <div class="card-body p-4 d-flex align-items-end justify-content-around" style="min-height: 250px;">
                        <div th:each="stat : ${monthStats}"
                            class="text-center d-flex flex-column align-items-center justify-content-end"
                            style="height: 100%;">
                            <div class="fw-bold mb-2" th:text="${stat.count}" style="color: #8b5a2b;">0</div>
                            <div style="width: 40px; background-color: rgba(139, 90, 43, 0.8); border-radius: 4px 4px 0 0; transition: height 0.5s ease;"
                                th:styleappend="|height: ${stat.height}px;|" th:title="${stat.count + ' phiếu mượn'}">
                            </div>
                            <div class="text-muted small mt-2 fw-bold" th:text="${stat.label}">...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Hoạt động gần đây -->
            <div class="col-lg-4">
                <div class="card-classic h-100 shadow-sm">
                    <div class="card-header bg-white border-bottom p-4 border-color">
                        <h5 class="fw-bold mb-0" style="color: #4a3b32; font-family: 'Playfair Display', serif;">
                            <i class="bi bi-activity me-2 text-classic"></i> Hoạt động gần đây
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${#lists.isEmpty(recentBorrows)}" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                            Chưa có hoạt động mượn sách nào.
                        </div>

                        <div class="d-flex mb-3 pb-3 border-bottom" th:each="borrow, iterStat : ${recentBorrows}"
                            style="border-color: rgba(139, 90, 43, 0.1) !important;">
                            <div class="flex-shrink-0">
                                <div class="rounded-circle text-white d-flex align-items-center justify-content-center"
                                    style="width: 40px; height: 40px; font-weight: bold;"
                                    th:styleappend="${iterStat.index % 4 == 0 ? 'background-color: #0d6efd;' : iterStat.index % 4 == 1 ? 'background-color: #198754;' : iterStat.index % 4 == 2 ? 'background-color: #6f42c1;' : 'background-color: #fd7e14;'}"
                                    th:text="${borrow.member != null && borrow.member.user != null ? #strings.substring(borrow.member.user.fullName, 0, 1) : 'N'}">
                                    N
                                </div>
                            </div>
                            <div class="flex-grow-1 ms-3">
                                <h6 class="mb-1 fw-bold"
                                    th:text="${borrow.member != null && borrow.member.user != null ? borrow.member.user.fullName : 'Người dùng ẩn danh'}">
                                    Người dùng</h6>
                                <div class="text-muted small">
                                    <i class="bi bi-box-arrow-right me-1"></i> Đã mượn sách ·
                                    <span
                                        th:text="${borrow.borrowDate != null ? #temporals.format(borrow.borrowDate, 'dd/MM/yyyy · HH:mm') : 'N/A'}">Hôm
                                        nay</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-top text-center p-3 border-color"
                        th:if="${!#lists.isEmpty(recentBorrows)}">
                        <a th:href="@{/admin/reports}" class="text-decoration-none fw-bold text-classic">Xem tất cả hoạt động <i class="bi bi-arrow-right"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
