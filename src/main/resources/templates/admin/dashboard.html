<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/admin_base}">

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/pages/admin/dashboard.css}" />
</head>

<body>
    <div layout:fragment="content" th:with="activeMenu='dashboard'">
        <!-- Welcome Banner -->
        <div class="welcome-banner mb-4 rounded-4 shadow-sm overflow-hidden position-relative">
            <div class="p-3 p-md-4 d-flex align-items-center justify-content-between position-relative z-1">
                <div class="text-white w-100">
                    <h2 class="fw-bold mb-2 fs-3 font-playfair">
                        <span th:text="${#messages.msg('admin.dashboard.greeting', currentUser?.fullName != null ? currentUser.fullName : 'Admin')}">Hello, Admin!</span>
                    </h2>
                    <p class="mb-0 fs-6 opacity-75">
                        <span th:text="${#messages.msg('admin.dashboard.welcome', #temporals.format(currentDate, 'dd/MM/yyyy'))}">Welcome back. The library system is operating normally.</span>
                    </p>
                </div>
            </div>
            <!-- Decorative CSS shapes -->
            <div class="banner-shape shape-1"></div>
            <div class="banner-shape shape-2"></div>
        </div>

        <div th:if="${success}" class="alert alert-success shadow-sm" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger shadow-sm" th:text="${error}"></div>

            <h5 class="fw-bold mb-3 mt-4 u-color-4a3b32-font-family-playfair-display-serif-70239336">
                <i class="bi bi-bar-chart-fill me-2 text-classic"></i><span th:text="#{admin.dashboard.overview}">Overview Statistics</span>
            </h5>
            <!-- Statistics Cards -->
            <div class="row row-cols-6 g-3 mb-5">
                <div class="col">
                    <div
                        class="card-classic dashboard-stat-card h-100 py-3 px-3 border-0 shadow-sm u-border-left-4px-solid-0d6efd-important-64ac16c1">
                        <div class="d-flex align-items-center h-100">
                            <div
                                class="rounded-circle d-flex align-items-center justify-content-center me-3 u-width-48px-height-48px-background-color-rgba-13-110-253-0-1-color-0d6efd-e5954655">
                                <i class="bi bi-book fs-4"></i>
                            </div>
                            <div class="flex-grow-1 text-center">
                                <div class="dashboard-stat-label text-muted small text-uppercase fw-bold mb-0">
                                    <span th:text="#{admin.dashboard.bookTitles}">Book Titles</span>
                                </div>
                                <h3 class="fw-bold mb-0 fs-4 stat-number u-color-2c1e16-5ab7ae80" th:text="${totalBooks}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div
                        class="card-classic dashboard-stat-card h-100 py-3 px-3 border-0 shadow-sm u-border-left-4px-solid-198754-important-8dcb64f6">
                        <div class="d-flex align-items-center h-100">
                            <div
                                class="rounded-circle d-flex align-items-center justify-content-center me-3 u-width-48px-height-48px-background-color-rgba-25-135-84-0-1-color-198754-c23022eb">
                                <i class="bi bi-check2-square fs-4"></i>
                            </div>
                            <div class="flex-grow-1 text-center">
                                <div class="dashboard-stat-label text-muted small text-uppercase fw-bold mb-0" th:text="#{admin.dashboard.bookCopies}">Book Copies
                                </div>
                                <h3 class="fw-bold mb-0 fs-4 stat-number u-color-2c1e16-5ab7ae80" th:text="${availableItems}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div
                        class="card-classic dashboard-stat-card h-100 py-3 px-3 border-0 shadow-sm admin-dashboard-div-border-left-08">
                        <div class="d-flex align-items-center h-100">
                            <div
                                class="rounded-circle d-flex align-items-center justify-content-center me-3 admin-dashboard-div-width-height-background-09">
                                <i class="bi bi-people fs-4"></i>
                            </div>
                            <div class="flex-grow-1 text-center">
                                <div class="dashboard-stat-label text-muted small text-uppercase fw-bold mb-0">
                                    <span th:text="#{admin.dashboard.members}">Members</span>
                                </div>
                                <h3 class="fw-bold mb-0 fs-4 stat-number u-color-2c1e16-5ab7ae80" th:text="${totalMembers}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div
                        class="card-classic dashboard-stat-card h-100 py-3 px-3 border-0 shadow-sm u-border-left-4px-solid-0dcaf0-important-b5b60906">
                        <div class="d-flex align-items-center h-100">
                            <div
                                class="rounded-circle d-flex align-items-center justify-content-center me-3 u-width-48px-height-48px-background-color-rgba-13-202-240-0-1-color-0dcaf0-5c77f3cf">
                                <i class="bi bi-journal-arrow-up fs-4"></i>
                            </div>
                            <div class="flex-grow-1 text-center">
                                <div class="dashboard-stat-label text-muted small text-uppercase fw-bold mb-0" th:text="#{admin.dashboard.activeLoans}">Active Loans
                                </div>
                                <h3 class="fw-bold mb-0 fs-4 stat-number u-color-2c1e16-5ab7ae80" th:text="${activeBorrows}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div
                        class="card-classic dashboard-stat-card h-100 py-3 px-3 border-0 shadow-sm u-border-left-4px-solid-fd7e14-important-0fa630a5">
                        <div class="d-flex align-items-center h-100">
                            <div
                                class="rounded-circle d-flex align-items-center justify-content-center me-3 u-width-48px-height-48px-background-color-rgba-253-126-20-0-1-color-fd7e14-8d4d646a">
                                <i class="bi bi-person-badge fs-4"></i>
                            </div>
                            <div class="flex-grow-1 text-center">
                                <div class="dashboard-stat-label text-muted small text-uppercase fw-bold mb-0" th:text="#{admin.dashboard.staff}">Staff</div>
                                <h3 class="fw-bold mb-0 fs-4 stat-number u-color-2c1e16-5ab7ae80" th:text="${totalStaff}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div
                        class="card-classic dashboard-stat-card h-100 py-3 px-3 border-0 shadow-sm u-border-left-4px-solid-dc3545-important-49da6d79">
                        <div class="d-flex align-items-center h-100">
                            <div
                                class="rounded-circle d-flex align-items-center justify-content-center me-3 u-width-48px-height-48px-background-color-rgba-220-53-69-0-1-color-dc3545-4faa87be">
                                <i class="bi bi-cash-stack fs-4"></i>
                            </div>
                            <div class="flex-grow-1 text-center">
                                <div class="dashboard-stat-label text-muted small text-uppercase fw-bold mb-0">
                                    <span th:text="#{admin.dashboard.revenue}">Revenue</span>
                                </div>
                                <h3 class="fw-bold mb-0 fs-4 stat-number u-color-2c1e16-5ab7ae80" th:text="${totalRevenue != null ? (totalRevenue >= 1000000 ? #numbers.formatDecimal(totalRevenue / 1000000.0, 1, 1, 'POINT') + 'M' : (totalRevenue >= 1000 ? #numbers.formatDecimal(totalRevenue / 1000.0, 1, 1, 'POINT') + 'K' : totalRevenue)) : '0'}">0</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Dashboard Content -->
            <div class="row g-4">
                <!-- Thống kê mượn trả -->
                <div class="col-lg-8">
                    <div class="card-classic h-100 shadow-sm">
                        <div class="card-header bg-white border-bottom p-4 border-color">
                            <h5 class="fw-bold mb-0 u-color-4a3b32-font-family-playfair-display-serif-70239336">
                                <i class="bi bi-bar-chart-line me-2 text-classic"></i><span th:text="#{admin.dashboard.loanChart}">Loans and Returns in the Last 6 Months</span>
                            </h5>
                        </div>
                        <div class="card-body p-4">
                            <canvas id="borrowChart" style="max-height: 300px; width: 100%;"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Hoạt động gần đây -->
                <div class="col-lg-4">
                    <div class="card-classic h-100 shadow-sm">
                        <div class="card-header bg-white border-bottom p-4 border-color">
                            <h5 class="fw-bold mb-0 u-color-4a3b32-font-family-playfair-display-serif-70239336">
                                <i class="bi bi-activity me-2 text-classic"></i> <span th:text="#{admin.dashboard.systemLog}">System Log</span>
                            </h5>
                        </div>
                        <div class="card-body p-4">
                            <div th:if="${#lists.isEmpty(recentLogs)}" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                <p th:text="#{admin.dashboard.noActivity}">There is no recent activity.</p>
                            </div>
                            <div th:unless="${#lists.isEmpty(recentLogs)}">
                                <div class="d-flex mb-3 pb-3 border-bottom admin-dashboard-div-border-color-20"
                                    th:each="log : ${recentLogs}">
                                    <div class="flex-shrink-0">
                                        <img th:if="${log.user?.avatar != null && !log.user.avatar.isEmpty()}"
                                            th:src="@{${log.user.avatar}}"
                                            onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='flex';"
                                            class="rounded-circle border u-width-40px-height-40px-object-fit-cover-2142a144"
                                            alt="Avatar">
                                        <div th:style="${log.user?.avatar != null && !log.user.avatar.isEmpty() ? 'display:none;' : 'display:flex;'}"
                                            class="rounded-circle text-white align-items-center justify-content-center u-width-40px-height-40px-font-weight-bold-background-color-8b5a2b-aa9fcd7a"
                                            th:text="${log.user?.fullName != null ? #strings.substring(log.user.fullName, 0, 1) : 'H'}">
                                            H
                                        </div>
                                    </div>
                                    <div class="flex-grow-1 ms-3">
                                        <h6 class="mb-1 fw-bold"
                                            th:text="${log.user?.fullName != null ? log.user.fullName : #messages.msg('admin.dashboard.system')}">
                                            User</h6>
                                        <div class="text-muted small">
                                            <span th:text="${log.description}">Action</span> ·
                                            <span
                                                th:text="${log.createdAt != null ? #temporals.format(log.createdAt, 'dd/MM/yyyy · HH:mm') : 'N/A'}">Today</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer bg-white border-top text-center p-3 border-color"
                            th:if="${!#lists.isEmpty(recentLogs)}">
                            <a th:href="@{/admin/system/logs}" class="text-decoration-none fw-bold text-classic"><span th:text="#{admin.dashboard.viewActivity}">View all activity</span> <i class="bi bi-arrow-right"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Chart.js and Initialization -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script th:inline="javascript">
            document.addEventListener("DOMContentLoaded", function () {
                const monthStats = /*[[${monthStats}]]*/ [];
                
                if (!monthStats || monthStats.length === 0) return;

                const labels = monthStats.map(stat => stat.label);
                const data = monthStats.map(stat => stat.count);

                const ctx = document.getElementById('borrowChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: /*[[#{admin.dashboard.loanCount}]]*/ 'Number of loans',
                            data: data,
                            backgroundColor: 'rgba(139, 90, 43, 0.7)',
                            borderColor: 'rgba(139, 90, 43, 1)',
                            borderWidth: 1,
                            borderRadius: 4,
                            hoverBackgroundColor: 'rgba(139, 90, 43, 0.9)'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                backgroundColor: 'rgba(44, 30, 22, 0.9)',
                                titleFont: { family: 'Playfair Display', size: 14 },
                                bodyFont: { family: 'Lora', size: 13 },
                                padding: 10,
                                cornerRadius: 4,
                                displayColors: false
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1,
                                    font: { family: 'Lora' }
                                },
                                grid: {
                                    color: 'rgba(0, 0, 0, 0.05)'
                                }
                            },
                            x: {
                                grid: {
                                    display: false
                                },
                                ticks: {
                                    font: { family: 'Lora' }
                                }
                            }
                        },
                        animation: {
                            duration: 1500,
                            easing: 'easeOutQuart'
                        }
                    }
                });
            });
        </script>
    </div>
</body>

</html>
