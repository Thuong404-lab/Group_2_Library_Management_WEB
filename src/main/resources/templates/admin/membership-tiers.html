<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/admin_base}">
<head>
    <title>Quản lý Hạng thành viên</title>
</head>
<body>
    <div layout:fragment="content" th:with="activeMenu='tiers'">
        
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom"
            style="border-color: rgba(139, 90, 43, 0.2) !important;">
            <div>
                <h2 class="fw-bold mb-1" style="color: #4a3b32; font-family: 'Playfair Display', serif;">Quản lý hạng thành viên</h2>
                <div class="text-muted">Thiết lập các mức hạng và quyền lợi của độc giả</div>
            </div>
            <div>
                <button class="btn btn-classic" data-bs-toggle="modal" data-bs-target="#addTierModal">
                    Thêm hạng mới
                </button>
            </div>
        </div>

        <!-- Alerts -->
        <div th:if="${success}" class="alert alert-success fade show shadow-sm" role="alert">
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
        </div>

        <!-- Table -->
        <div class="card-classic shadow-sm mb-4">
            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 stable-table-layout">
                        <colgroup>
                            <col style="width: 6%">
                            <col style="width: 11%">
                            <col style="width: 15%">
                            <col style="width: 11%">
                            <col style="width: 13%">
                            <col style="width: 32%">
                            <col style="width: 12%">
                        </colgroup>
                        <thead class="table-light text-uppercase small text-muted">
                            <tr>
                                <th class="ps-3">ID</th>
                                <th>Tên hạng</th>
                                <th>Điều kiện (VND)</th>
                                <th>Giảm giá (%)</th>
                                <th>Giới hạn mượn</th>
                                <th>Quyền lợi</th>
                                <th class="text-end pe-3">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="tier : ${tiers}">
                                <td class="ps-3 fw-bold" style="color: #8b5a2b;" th:text="${'#' + tier.tierId}"></td>
                                <td class="fw-bold" th:text="${tier.tierName == 'Regular' ? 'Thường' : (tier.tierName == 'Silver' ? 'Bạc' : (tier.tierName == 'Gold' ? 'Vàng' : (tier.tierName == 'Diamond' ? 'Kim cương' : tier.tierName)))}"></td>
                                <td th:text="${tier.condition != null ? #numbers.formatDecimal(tier.condition, 0, 'COMMA', 0, 'POINT') + ' VND' : 'Mặc định'}"></td>
                                <td><span class="badge rounded-pill px-3 py-2 text-white"
                                    style="background-color: #587442;" th:text="${tier.discountPercent + '%'}"></span></td>
                                <td th:text="${tier.borrowLimit + ' cuốn'}"></td>
                                <td><span th:text="${tier.benefits}"></span></td>
                                <td class="text-end pe-3">
                                    <button class="btn btn-sm btn-outline-classic me-1"
                                            data-bs-toggle="modal" th:data-bs-target="${'#editTierModal' + tier.tierId}">
                                        <i class="bi bi-pencil-square"></i>
                                    </button>
                                    <form th:action="@{/admin/tiers/delete/{id}(id=${tier.tierId})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Bạn có chắc chắn muốn xóa hạng thành viên này không?');">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                                
                                <!-- Edit Modal cho mỗi dòng -->
                                <div class="modal fade" th:id="${'editTierModal' + tier.tierId}" tabindex="-1" aria-hidden="true">
                                    <div class="modal-dialog modal-dialog-centered">
                                        <div class="modal-content border-0 shadow">
                                            <div class="modal-header bg-white border-bottom p-4">
                                                <h5 class="modal-title fw-bold" style="color: #4a3b32; font-family: 'Playfair Display', serif;"><i class="bi bi-pencil-square text-classic me-2"></i>Sửa hạng thành viên</h5>
                                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                                            </div>
                                            <form th:action="@{/admin/tiers/save}" method="post">
                                                <input type="hidden" name="tierId" th:value="${tier.tierId}" />
                                                <div class="modal-body">
                                                    <div class="mb-3">
                                                        <label class="form-label fw-bold text-muted small">Tên hạng <span class="text-danger">*</span></label>
                                                        <input type="text" name="tierName" class="form-control" th:value="${tier.tierName}" required>
                                                    </div>
                                                    <div class="row">
                                                        <div class="col-6 mb-3">
                                                            <label class="form-label fw-bold text-muted small">Điểm/Chi tiêu (VND)</label>
                                                            <input type="number" step="0.01" name="condition" class="form-control" th:value="${tier.condition}">
                                                        </div>
                                                        <div class="col-6 mb-3">
                                                            <label class="form-label fw-bold text-muted small">Giảm giá (%) <span class="text-danger">*</span></label>
                                                            <input type="number" step="0.01" min="0" max="100" name="discountPercent" class="form-control" th:value="${tier.discountPercent}" required>
                                                        </div>
                                                    </div>
                                                    <div class="mb-3">
                                                        <label class="form-label fw-bold text-muted small">Giới hạn mượn (cuốn) <span class="text-danger">*</span></label>
                                                        <input type="number" name="borrowLimit" class="form-control" th:value="${tier.borrowLimit}" required>
                                                    </div>
                                                    <div class="mb-3">
                                                        <label class="form-label fw-bold text-muted small">Quyền lợi bổ sung</label>
                                                        <textarea name="benefits" class="form-control" rows="3" th:text="${tier.benefits}"></textarea>
                                                    </div>
                                                </div>
                                                <div class="modal-footer border-top">
                                                    <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Hủy</button>
                                                    <button type="submit" class="btn btn-classic">Lưu thay đổi</button>
                                                </div>
                                            </form>
                                        </div>
                                    </div>
                                </div>
                            </tr>
                            <tr th:if="${#lists.isEmpty(tiers)}">
                                <td colspan="7" class="text-center py-5 text-muted">Không có hạng thành viên nào được tìm thấy.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Add Modal -->
        <div class="modal fade" id="addTierModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header bg-white border-bottom p-4">
                        <h5 class="modal-title fw-bold" style="color: #4a3b32; font-family: 'Playfair Display', serif;">Thêm hạng mới</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
                    </div>
                    <form th:action="@{/admin/tiers/save}" method="post">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Tên hạng <span class="text-danger">*</span></label>
                                <input type="text" name="tierName" class="form-control" required>
                            </div>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label fw-bold text-muted small">Điểm/Chi tiêu (VND)</label>
                                    <input type="number" step="0.01" name="condition" class="form-control" placeholder="0.00">
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label fw-bold text-muted small">Giảm giá (%) <span class="text-danger">*</span></label>
                                    <input type="number" step="0.01" min="0" max="100" name="discountPercent" class="form-control" value="0.00" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Giới hạn mượn (cuốn) <span class="text-danger">*</span></label>
                                <input type="number" name="borrowLimit" class="form-control" value="3" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Quyền lợi bổ sung</label>
                                <textarea name="benefits" class="form-control" rows="3"></textarea>
                            </div>
                        </div>
                        <div class="modal-footer border-top">
                            <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn btn-classic">Thêm hạng</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
