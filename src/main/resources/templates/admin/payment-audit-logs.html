<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_base}">

<head>
    <title th:text="#{admin.paymentAudit.title}">Payment Audit Logs</title>
    <link rel="stylesheet" th:href="@{/css/pages/admin/payments.css}" />
    <script defer th:src="@{/js/auto-filter.js}"></script>
</head>

<body>
    <div layout:fragment="content" th:with="activeMenu='payments'" class="admin-payment-page">
        <div class="app-page-header">
            <div><a th:href="@{/admin/payments}" class="app-back-link"><i class="bi bi-arrow-left"></i> <span
                        th:text="#{admin.payments.heading}">Payments</span></a>
                <h2 class="app-page-title" th:text="#{admin.paymentAudit.title}">Payment Audit Logs</h2>
            </div>
            <div class="app-page-actions"><a class="btn btn-outline-classic"
                    th:href="@{/admin/payments/audit-logs/export(format='csv',keyword=${keyword},eventType=${eventType},fromDate=${fromDate},toDate=${toDate})}">CSV</a><a
                    class="btn btn-classic"
                    th:href="@{/admin/payments/audit-logs/export(format='pdf',keyword=${keyword},eventType=${eventType},fromDate=${fromDate},toDate=${toDate})}">PDF</a>
            </div>
        </div>
        <div class="app-card mb-4">
            <div class="app-card-body">
                <form id="auditFilterForm" class="payment-filter-grid audit-filter-grid" method="get"
                    th:action="@{/admin/payments/audit-logs}" data-auto-filter-form
                    data-focus-key="adminPaymentAuditFilterFocus">
                    <div class="payment-filter-field payment-filter-search"><label class="form-label"
                            th:text="#{common.search}">Search</label><input class="form-control" name="keyword"
                            th:value="${keyword}" data-auto-search
                            th:placeholder="#{admin.paymentAudit.searchPlaceholder}"></div>
                    <div class="payment-filter-field"><label class="form-label"
                            th:text="#{admin.paymentAudit.eventType}">Event Type</label><select class="form-select"
                            name="eventType" data-auto-submit>
                            <option value="" th:text="#{common.all}">All</option>
                            <option value="PAYMENT_CREATED" th:selected="${eventType == 'PAYMENT_CREATED'}"
                                th:text="#{payment.admin.event.payment_created}">Payment Created</option>
                            <option value="PAYMENT_PAID" th:selected="${eventType == 'PAYMENT_PAID'}"
                                th:text="#{payment.admin.event.payment_paid}">Payment Completed</option>
                            <option value="STATUS_CHANGED" th:selected="${eventType == 'STATUS_CHANGED'}"
                                th:text="#{payment.admin.event.status_changed}">Status Changed</option>
                            <option value="WEBHOOK_SETTLED" th:selected="${eventType == 'WEBHOOK_SETTLED'}"
                                th:text="#{payment.admin.event.webhook_settled}">Webhook Confirmed Payment</option>
                            <option value="RECONCILIATION_REQUESTED"
                                th:selected="${eventType == 'RECONCILIATION_REQUESTED'}"
                                th:text="#{payment.admin.event.reconciliation_requested}">Reconciliation Requested
                            </option>
                            <option value="RECONCILIATION_FAILED" th:selected="${eventType == 'RECONCILIATION_FAILED'}"
                                th:text="#{payment.admin.event.reconciliation_failed}">Reconciliation Failed</option>
                            <option value="RECONCILIATION_RESOLVED"
                                th:selected="${eventType == 'RECONCILIATION_RESOLVED'}"
                                th:text="#{payment.admin.event.reconciliation_resolved}">Reconciliation Resolved
                            </option>
                            <option value="PAYMENT_CANCELLED" th:selected="${eventType == 'PAYMENT_CANCELLED'}"
                                th:text="#{payment.admin.event.payment_cancelled}">Payment Cancelled</option>
                        </select></div>
                    <div class="payment-filter-field"><label class="form-label" th:text="#{common.fromDate}">From
                            Date</label><input type="date" class="form-control" name="fromDate" th:value="${fromDate}"
                            data-auto-submit></div>
                    <div class="payment-filter-field"><label class="form-label" th:text="#{common.toDate}">To
                            Date</label><input type="date" class="form-control" name="toDate" th:value="${toDate}"
                            data-auto-submit></div>
                    <div class="payment-filter-actions"><button class="btn btn-classic" type="submit"
                            th:text="#{common.search}">Search</button></div>
                </form>
            </div>
        </div>
        <div class="app-card">
            <div class="app-table-wrap">
                <table class="app-table">
                    <thead>
                        <tr>
                            <th th:text="#{common.time}">Time</th>
                            <th th:text="#{admin.payments.orderCode}">Order Code</th>
                            <th th:text="#{role.member}">Member</th>
                            <th th:text="#{admin.paymentAudit.event}">Event</th>
                            <th th:text="#{admin.paymentAudit.source}">Source</th>
                            <th th:text="#{common.status}">Status</th>
                            <th th:text="#{admin.paymentAudit.result}">Result</th>
                            <th th:text="#{common.content}">Content</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${audits.content.isEmpty()}">
                            <td colspan="8" class="text-center text-muted py-5" th:text="#{admin.paymentAudit.empty}">No
                                matching payment audit logs.</td>
                        </tr>
                        <tr th:each="a : ${audits.content}">
                            <td class="app-date-time"
                                th:text="${a.createdAt != null ? #temporals.format(a.createdAt,'dd/MM/yyyy HH:mm:ss') : '—'}">
                            </td>
                            <td><a class="app-code-number"
                                    th:href="@{/admin/payments/{code}(code=${a.payment.orderCode})}"
                                    th:text="${a.payment.orderCode != null ? a.payment.orderCode : '—'}"></a></td>
                            <td th:text="${a.payment.member.user.fullName}"></td>
                            <td th:text="${#messages.msg('payment.admin.event.' + #strings.toLowerCase(a.eventType))}">
                            </td>
                            <td th:text="${#messages.msg('payment.admin.source.' + #strings.toLowerCase(a.source))}">
                            </td>
                            <td
                                th:text="${(a.oldStatus != null ? #messages.msg('payment.admin.status.' + #strings.toLowerCase(a.oldStatus)) : '—') + ' → ' + (a.newStatus != null ? #messages.msg('payment.admin.status.' + #strings.toLowerCase(a.newStatus)) : '—')}">
                            </td>
                            <td><span class="audit-result"
                                    th:classappend="${a.successful ? ' result-success' : ' result-failure'}"
                                    th:text="${a.successful ? #messages.msg('payment.admin.result.success') : #messages.msg('payment.admin.result.failure')}"></span>
                            </td>
                            <td
                                th:text="${#messages.msg('payment.admin.content.' + #strings.toLowerCase(a.eventType))}">
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="app-pagination-region" th:if="${audits.totalPages > 1}"
                th:with="startPage=${audits.totalPages <= 10 ? 0 : (audits.number < 9 ? 0 : (audits.number - 8 > audits.totalPages - 10 ? audits.totalPages - 10 : audits.number - 8))}">
                <nav th:aria-label="#{admin.paymentAudit.pagination}"
                    th:with="endPage=${startPage + 9 < audits.totalPages ? startPage + 9 : audits.totalPages - 1}">
                    <ul class="pagination app-pagination">
                        <li class="page-item" th:classappend="${audits.first ? 'disabled' : ''}">
                            <a class="page-link"
                                th:href="@{/admin/payments/audit-logs(page=0,keyword=${keyword},eventType=${eventType},fromDate=${fromDate},toDate=${toDate})}"
                                th:text="#{pagination.first}">First</a>
                        </li>
                        <li class="page-item" th:classappend="${audits.first ? 'disabled' : ''}">
                            <a class="page-link" th:aria-label="#{common.previous}"
                                th:href="@{/admin/payments/audit-logs(page=${audits.number-1},keyword=${keyword},eventType=${eventType},fromDate=${fromDate},toDate=${toDate})}"><i
                                    class="bi bi-chevron-left"></i></a>
                        </li>
                        <li class="page-item disabled" th:if="${startPage > 0}"><span class="page-link">…</span></li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
                            th:classappend="${i == audits.number ? 'active' : ''}">
                            <a class="page-link"
                                th:href="@{/admin/payments/audit-logs(page=${i},keyword=${keyword},eventType=${eventType},fromDate=${fromDate},toDate=${toDate})}"
                                th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item disabled" th:if="${endPage < audits.totalPages - 1}"><span
                                class="page-link">…</span></li>
                        <li class="page-item" th:classappend="${audits.last ? 'disabled' : ''}">
                            <a class="page-link" th:aria-label="#{common.next}"
                                th:href="@{/admin/payments/audit-logs(page=${audits.number+1},keyword=${keyword},eventType=${eventType},fromDate=${fromDate},toDate=${toDate})}"><i
                                    class="bi bi-chevron-right"></i></a>
                        </li>
                        <li class="page-item" th:classappend="${audits.last ? 'disabled' : ''}">
                            <a class="page-link"
                                th:href="@{/admin/payments/audit-logs(page=${audits.totalPages-1},keyword=${keyword},eventType=${eventType},fromDate=${fromDate},toDate=${toDate})}"
                                th:text="#{pagination.last}">Last</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>

</html>
