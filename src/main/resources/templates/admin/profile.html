<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Administrator Profile - LMS</title>
    <style>
        .container { width: 45%; margin: 60px auto; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .card { border: 1px solid #e0e0e0; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); background: #fff; }
        .header { background-color: #111; color: white; padding: 15px; border-radius: 6px; font-size: 18px; font-weight: bold; text-align: center; letter-spacing: 1px; }
        .info-group { margin: 25px 0; font-size: 15px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .info-group strong { color: #555; width: 160px; display: inline-block; }
        .status-badge { background: #e8f5e9; color: #2e7d32; padding: 4px 12px; border-radius: 15px; font-weight: bold; font-size: 13px; }
        .btn-home { text-decoration: none; color: #111; border: 1px solid #111; padding: 10px 20px; background: transparent; display: block; text-align: center; border-radius: 6px; margin-top: 25px; font-weight: bold; transition: 0.2s; }
        .btn-home:hover { background: #111; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">ADMINISTRATOR PERSONAL PROFILE</div>

        <div class="info-group">
            <strong>System Full Name:</strong> <span th:text="${admin.fullName}">Admin Tổng</span>
        </div>
        <div class="info-group">
            <strong>Admin Email:</strong> <span th:text="${admin.email}">admin@library.vn</span>
        </div>
        <div class="info-group">
            <strong>Phone Number:</strong> <span th:text="${admin.phone}">0901000001</span>
        </div>
        <div class="info-group">
            <strong>Account Status:</strong> <span class="status-badge" th:text="${admin.status}">Active</span>
        </div>

        <a href="/" class="btn-home">🏠 Back to Control Dashboard</a>
    </div>
</div>

</body>
</html>
