<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/admin_base}">

<head>
    <title th:text="#{admin.reports.title}">Báo cáo & Thống kê</title>
</head>

<body>
    <div layout:fragment="content" th:with="activeMenu='reports'">
        <div
            class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom u-border-color-rgba-139-90-43-0-2-important-f8e732ba">
            <div>
                <h2 class="fw-bold mb-1 u-color-4a3b32-font-family-playfair-display-serif-70239336" th:text="#{admin.reports.heading}">Báo cáo & Thống kê
                </h2>
                <div class="text-muted" th:text="#{admin.reports.description}">
                    Xem chi tiết các báo cáo hoạt động của thư viện
                </div>
            </div>
            <div>
                <button class="btn btn-outline-classic">
                    <i class="bi bi-download me-1"></i> <span th:text="#{admin.reports.exportReport}">Xuất Báo Cáo</span>
                </button>
            </div>
        </div>

        <div class="card-classic shadow-sm">
            <div class="card-body p-5 text-center">
                <i class="bi bi-tools text-muted mb-3 u-font-size-3rem-ea01e09b"></i>
                <h4 class="fw-bold text-classic" th:text="#{common.underDevelopment}">Đang phát triển</h4>
                <p class="text-muted" th:text="#{admin.reports.underDevelopmentNote}">Tính năng báo cáo thống kê đang được xây dựng.</p>
            </div>
        </div>
    </div>
</body>

</html>
