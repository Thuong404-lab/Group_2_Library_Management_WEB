<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_base}">
<head>
    <title>Báo cáo & Thống kê</title>
</head>
<body>
<div layout:fragment="content" th:with="activeMenu='reports'">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom" style="border-color: rgba(139, 90, 43, 0.2) !important;">
        <div>
            <h2 class="fw-bold mb-1" style="color: #4a3b32; font-family: 'Playfair Display', serif;">Báo cáo & Thống kê</h2>
            <div class="text-muted">
                Xem chi tiết các báo cáo hoạt động của thư viện
            </div>
        </div>
        <div>
            <button class="btn btn-outline-classic">
                <i class="bi bi-download me-1"></i> Xuất Báo Cáo
            </button>
        </div>
    </div>

    <div class="card-classic shadow-sm">
        <div class="card-body p-5 text-center">
            <i class="bi bi-tools text-muted mb-3" style="font-size: 3rem;"></i>
            <h4 class="fw-bold text-classic">Đang phát triển</h4>
            <p class="text-muted">Tính năng báo cáo thống kê đang được xây dựng.</p>
        </div>
    </div>
</div>
</body>
</html>
