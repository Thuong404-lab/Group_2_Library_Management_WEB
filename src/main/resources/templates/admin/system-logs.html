<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/admin_base}">

<head>
    <title th:text="#{admin.logs.title}">System Logs</title>
    <link rel="stylesheet" th:href="@{/css/pages/admin/system-logs.css}" />
</head>

<body>
    <div layout:fragment="content" th:with="activeMenu='logs'">

        <div
            class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom u-border-color-rgba-139-90-43-0-2-important-f8e732ba">
            <div>
                <h2 class="fw-bold mb-1 u-color-4a3b32-font-family-playfair-display-serif-70239336">
                    <span th:text="#{admin.logs.heading}">System Logs</span>
                </h2>
                <div class="text-muted">
                    <span th:text="#{admin.logs.description}">Track important activities in the system</span>
                </div>
            </div>
        </div>

        <div class="card-classic shadow-sm">
            <div class="card-header bg-white border-bottom border-color p-4">
                <form id="systemLogFilterForm" class="system-log-filter" method="get" th:action="@{/admin/system/logs}">
                    <div class="system-log-filter-field">
                        <label for="systemLogKeyword" th:text="#{admin.logs.keyword}">Keyword</label>
                        <input id="systemLogKeyword" type="text" name="keyword" class="form-control"
                            th:placeholder="#{admin.logs.searchPlaceholder}"
                            th:value="${keyword}">
                    </div>
                    <div class="system-log-filter-actions">
                        <button type="submit" name="section" th:value="${currentSection}"
                            class="btn btn-classic system-log-search-button"
                            th:title="#{common.search}" th:aria-label="#{common.search}">
                            <i class="bi bi-search" aria-hidden="true"></i>
                        </button>
                        <a th:href="@{/admin/system/logs(section=${currentSection})}"
                            class="btn btn-outline-classic system-log-cancel-button">
                            <span th:text="#{admin.logs.clearSearch}">Clear Search</span>
                        </a>
                    </div>
                    <nav class="system-log-section-nav" th:aria-label="#{admin.logs.groups}">
                        <button type="submit" name="section" value="auth"
                            onclick="this.form.actionType.value=''"
                            class="btn btn-sm"
                            th:classappend="${currentSection == 'auth'} ? 'btn-classic' : 'btn-outline-classic'"
                            th:attr="aria-current=${currentSection == 'auth'} ? 'page'">
                            <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i><span th:text="#{admin.logs.auth}">Login / Logout</span>
                        </button>
                        <button type="submit" name="section" value="operations"
                            onclick="this.form.actionType.value=''"
                            class="btn btn-sm"
                            th:classappend="${currentSection == 'operations'} ? 'btn-classic' : 'btn-outline-classic'"
                            th:attr="aria-current=${currentSection == 'operations'} ? 'page'">
                            <i class="bi bi-activity" aria-hidden="true"></i><span th:text="#{admin.logs.operations}">Status / CRUD</span>
                        </button>
                        <button type="submit" name="section" value="circulation"
                            onclick="this.form.actionType.value=''"
                            class="btn btn-sm"
                            th:classappend="${currentSection == 'circulation'} ? 'btn-classic' : 'btn-outline-classic'"
                            th:attr="aria-current=${currentSection == 'circulation'} ? 'page'">
                            <i class="bi bi-arrow-left-right" aria-hidden="true"></i><span th:text="#{admin.logs.circulation}">Loans / Returns / Reservations</span>
                        </button>
                    </nav>
                </form>
                <div class="system-log-title-row">
                <h5 class="fw-bold mb-0 u-color-4a3b32-font-family-playfair-display-serif-70239336">
                    <i class="bi bi-journal-text me-2 text-classic"></i>
                    <span th:text="${currentSection == 'auth' ? #messages.msg('admin.logs.authHistory') : (currentSection == 'operations' ? #messages.msg('admin.logs.operationsHistory') : #messages.msg('admin.logs.circulationHistory'))}">
                        Log List
                    </span>
                </h5>
                <select form="systemLogFilterForm" class="form-select system-log-tab-filter" name="actionType" th:aria-label="#{admin.logs.filterAction}" onchange="this.form.submit()">
                    <option value="" th:text="#{admin.logs.allActions}">All activities</option>
                    <th:block th:if="${currentSection == 'auth'}">
                        <option value="LOGIN" th:selected="${actionType == 'LOGIN'}" th:text="#{admin.logs.action.login}">Login</option>
                        <option value="LOGOUT" th:selected="${actionType == 'LOGOUT'}" th:text="#{admin.logs.action.logout}">Logout</option>
                        <option value="GOOGLE" th:selected="${actionType == 'GOOGLE'}" th:text="#{admin.logs.action.google}">Google Login</option>
                    </th:block>
                    <th:block th:if="${currentSection == 'operations'}">
                        <option value="CREATE_ACCOUNT" th:selected="${actionType == 'CREATE_ACCOUNT'}" th:text="#{admin.logs.action.create_account}">Create Account</option>
                        <option value="UPDATE_ACCOUNT" th:selected="${actionType == 'UPDATE_ACCOUNT'}" th:text="#{admin.logs.action.update_account}">Update Account</option>
                        <option value="UPDATE_SETTINGS" th:selected="${actionType == 'UPDATE_SETTINGS'}" th:text="#{admin.logs.action.update_settings}">Update Settings</option>
                    </th:block>
                    <th:block th:if="${currentSection == 'circulation'}">
                        <option value="REQUEST_BORROW" th:selected="${actionType == 'REQUEST_BORROW'}" th:text="#{admin.logs.action.request_borrow}">Loan Request</option>
                        <option value="REQUEST_RETURN" th:selected="${actionType == 'REQUEST_RETURN'}" th:text="#{admin.logs.action.request_return}">Return Request</option>
                        <option value="RESERVE_BOOK" th:selected="${actionType == 'RESERVE_BOOK'}" th:text="#{admin.logs.action.reserve_book}">Reserve Book</option>
                    </th:block>
                </select>
                </div>

            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 stable-table-layout">
                        <colgroup>
                            <col class="u-width-24-3ca932db">
                            <col class="admin-system-logs-col-width-04">
                            <col class="u-width-14-546d6dae">
                            <col class="u-width-17-9278e232">
                            <col class="u-width-24-3ca932db">
                        </colgroup>
                        <thead class="admin-system-logs-thead-background-07">
                            <tr>
                                <th th:text="#{common.time}">Time</th>
                                <th th:text="#{admin.logs.actor}">Actor</th>
                                <th th:text="#{admin.logs.action}">Action</th>
                                <th>IP</th>
                                <th th:text="#{librarian.inventory.bookDescription}">Description</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:if="${logs == null or logs.content.isEmpty()}">
                                <td colspan="5" class="text-center text-muted py-5">
                                    <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                    <span th:text="${currentSection == 'auth' ? #messages.msg('admin.logs.noAuth') : (currentSection == 'operations' ? #messages.msg('admin.logs.noOperations') : #messages.msg('admin.logs.noCirculation'))}">
                                        No system logs.
                                    </span>
                                </td>
                            </tr>

                            <tr th:each="log : ${logs.content}">
                                <td>
                                    <span th:if="${log.createdAt != null}"
                                        th:text="${#temporals.format(log.createdAt, 'dd/MM/yyyy · HH:mm:ss')}">
                                        dd/MM/yyyy · HH:mm:ss
                                    </span>
                                    <span th:if="${log.createdAt == null}" class="text-muted">
                                        N/A
                                    </span>
                                </td>

                                <td>
                                    <div class="fw-semibold"
                                        th:text="${log.actorUsername != null ? log.actorUsername : 'System'}">
                                        admin
                                    </div>
                                    <small class="text-muted" th:if="${log.user != null}"
                                        th:text="${log.user.fullName}">
                                        System Administrator
                                    </small>
                                </td>

                                <td>
                                    <span class="badge rounded-pill px-2 py-1 text-white" th:classappend="${
                                            log.actionType == 'LOGIN' ? 'bg-success' :
                                            (log.actionType == 'LOGOUT' or log.actionType == 'DEACTIVATE_ACCOUNT') ? 'bg-danger' :
                                            #strings.startsWith(log.actionType, 'CREATE') ? 'bg-primary' :
                                            #strings.startsWith(log.actionType, 'UPDATE') ? 'bg-warning text-dark' :
                                            'bg-secondary'}"
                                        th:text="${log.actionType == 'LOGIN' ? #messages.msg('admin.logs.action.login') :
                                            (log.actionType == 'LOGOUT' ? #messages.msg('admin.logs.action.logout') :
                                            (log.actionType == 'CREATE_BOOK' ? #messages.msg('admin.logs.action.create_book') :
                                            (log.actionType == 'UPDATE_BOOK' ? #messages.msg('admin.logs.action.update_book') :
                                            (log.actionType == 'DELETE_BOOK' ? #messages.msg('admin.logs.action.delete_book') :
                                            (log.actionType == 'CREATE_ACCOUNT' ? #messages.msg('admin.logs.action.create_account') :
                                            (log.actionType == 'UPDATE_ACCOUNT' ? #messages.msg('admin.logs.action.update_account') :
                                            (log.actionType == 'DEACTIVATE_ACCOUNT' ? #messages.msg('admin.logs.action.deactivate_account') :
                                            (log.actionType == 'UPDATE_SETTINGS' ? #messages.msg('admin.logs.action.update_settings') :
                                            (log.actionType == 'REQUEST_BORROW' ? #messages.msg('admin.logs.action.request_borrow') :
                                            (log.actionType == 'REQUEST_RETURN' ? #messages.msg('admin.logs.action.request_return') :
                                            (log.actionType == 'RESERVE_BOOK' ? #messages.msg('admin.logs.action.reserve_book') :
                                            (log.actionType == 'GOOGLE' ? #messages.msg('admin.logs.action.google') : log.actionType))))))))))))}">
                                        Login
                                    </span>
                                </td>

                                <td>
                                    <span th:text="${log.ipAddress != null ? log.ipAddress : 'N/A'}">
                                        127.0.0.1
                                    </span>
                                </td>

                                <td class="admin-system-logs-td-max-width-08">
                                    <span th:text="${log.description != null ? log.description : #messages.msg('admin.logs.noDescription')}">
                                        No description
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="member-pagination app-pagination-region"
                th:if="${logs != null and logs.totalPages > 1}"
                th:with="startPage=${logs.totalPages <= 10 ? 0 : (logs.number < 9 ? 0 : (logs.number - 8 > logs.totalPages - 10 ? logs.totalPages - 10 : logs.number - 8))}">
                <nav th:aria-label="#{admin.logs.pagination}"
                    th:with="endPage=${startPage + 9 < logs.totalPages ? startPage + 9 : logs.totalPages - 1}">
                    <ul class="pagination mb-0 app-pagination">
                        <li class="page-item" th:classappend="${logs.first} ? 'disabled'">
                            <a class="page-link page-link-classic u-color-8b5a2b-border-color-rgba-139-90-43-0-2-0da3cc4a"
                                th:href="@{/admin/system/logs(section=${currentSection}, page=0, keyword=${keyword})}" th:aria-label="#{common.first}" th:text="#{common.first}">
                                First
                            </a>
                        </li>

                        <li class="page-item" th:classappend="${logs.first} ? 'disabled'">
                            <a class="page-link page-link-classic u-color-8b5a2b-border-color-rgba-139-90-43-0-2-0da3cc4a"
                                th:href="@{/admin/system/logs(section=${currentSection}, page=${logs.number - 1}, keyword=${keyword})}"
                                th:aria-label="#{common.previous}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>

                        <li class="page-item disabled" th:if="${startPage > 0}">
                            <span class="page-link page-link-classic">…</span>
                        </li>

                        <li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
                            th:classappend="${i == logs.number} ? 'active'">
                            <a class="page-link page-link-classic"
                                th:href="@{/admin/system/logs(section=${currentSection}, page=${i}, keyword=${keyword})}" th:text="${i + 1}">
                                1
                            </a>
                        </li>

                        <li class="page-item disabled" th:if="${endPage < logs.totalPages - 1}">
                            <span class="page-link page-link-classic">…</span>
                        </li>

                        <li class="page-item" th:classappend="${logs.last} ? 'disabled'">
                            <a class="page-link page-link-classic u-color-8b5a2b-border-color-rgba-139-90-43-0-2-0da3cc4a"
                                th:href="@{/admin/system/logs(section=${currentSection}, page=${logs.number + 1}, keyword=${keyword})}"
                                th:aria-label="#{common.next}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>

                        <li class="page-item" th:classappend="${logs.last} ? 'disabled'">
                            <a class="page-link page-link-classic u-color-8b5a2b-border-color-rgba-139-90-43-0-2-0da3cc4a"
                                th:href="@{/admin/system/logs(section=${currentSection}, page=${logs.totalPages - 1}, keyword=${keyword})}"
                                th:aria-label="#{common.last}" th:text="#{common.last}">
                                Last
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

    </div>
</body>

</html>
