<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/admin_base}">

<head>
    <title th:text="#{admin.logs.title}">System Logs</title>
    <link rel="stylesheet" th:href="@{/css/pages/admin/system-logs.css}" />
</head>

<body>
    <div layout:fragment="content" th:with="activeMenu='logs'" class="admin-system-log-page">

        <header class="system-log-hero">
            <div>
                <span class="system-log-eyebrow" th:text="#{admin.logs.eyebrow}">SYSTEM MONITORING</span>
                <h1 class="system-log-page-title">
                    <span th:text="#{admin.logs.heading}">System Logs</span>
                </h1>
                <p class="system-log-page-description">
                    <span th:text="#{admin.logs.description}">Track important activities in the system</span>
                </p>
            </div>
        </header>

        <div class="card-classic system-log-card">
            <div class="card-header system-log-card-header">
                <form id="systemLogFilterForm" class="system-log-filter" method="get" th:action="@{/admin/system/logs}">
                    <div class="system-log-filter-field">
                        <label for="systemLogKeyword" th:text="#{admin.logs.keyword}">Keyword</label>
                        <input id="systemLogKeyword" type="text" name="keyword" class="form-control"
                            th:placeholder="#{admin.logs.searchPlaceholder}" th:value="${keyword}">
                    </div>
                    <div class="system-log-action-filter">
                        <label for="systemLogActionType" th:text="#{admin.logs.filterAction}">Filter log action</label>
                        <select id="systemLogActionType" class="form-select system-log-tab-filter" name="actionType"
                            th:aria-label="#{admin.logs.filterAction}" onchange="this.form.submit()">
                            <option value="" th:text="#{admin.logs.allActions}">All activities</option>
                            <th:block th:if="${currentSection == 'auth'}">
                                <option value="LOGIN" th:selected="${actionType == 'LOGIN'}"
                                    th:text="#{admin.logs.action.login}">Login</option>
                                <option value="LOGOUT" th:selected="${actionType == 'LOGOUT'}"
                                    th:text="#{admin.logs.action.logout}">Logout</option>
                                <option value="GOOGLE" th:selected="${actionType == 'GOOGLE'}"
                                    th:text="#{admin.logs.action.google}">Google Login</option>
                            </th:block>
                            <th:block th:if="${currentSection == 'operations'}">
                                <option value="CREATE_ACCOUNT" th:selected="${actionType == 'CREATE_ACCOUNT'}"
                                    th:text="#{admin.logs.action.create_account}">Create Account</option>
                                <option value="UPDATE_ACCOUNT" th:selected="${actionType == 'UPDATE_ACCOUNT'}"
                                    th:text="#{admin.logs.action.update_account}">Update Account</option>
                                <option value="UPDATE_SETTINGS" th:selected="${actionType == 'UPDATE_SETTINGS'}"
                                    th:text="#{admin.logs.action.update_settings}">Update Settings</option>
                            </th:block>
                            <th:block th:if="${currentSection == 'circulation'}">
                                <option value="REQUEST_BORROW" th:selected="${actionType == 'REQUEST_BORROW'}"
                                    th:text="#{admin.logs.action.request_borrow}">Loan Request</option>
                                <option value="REQUEST_RETURN" th:selected="${actionType == 'REQUEST_RETURN'}"
                                    th:text="#{admin.logs.action.request_return}">Return Request</option>
                                <option value="RESERVE_BOOK" th:selected="${actionType == 'RESERVE_BOOK'}"
                                    th:text="#{admin.logs.action.reserve_book}">Reserve Book</option>
                            </th:block>
                        </select>
                    </div>
                    <input type="hidden" name="section" th:value="${currentSection}">
                    <div class="system-log-filter-actions">
                        <button type="submit" class="btn btn-classic system-log-search-button"
                            th:title="#{common.search}" th:aria-label="#{common.search}">
                            <span th:text="#{common.search}">Search</span>
                        </button>
                        <a th:href="@{/admin/system/logs(section=${currentSection})}"
                            class="btn btn-outline-classic system-log-cancel-button">
                            <span th:text="#{admin.logs.clearSearch}">Clear Search</span>
                        </a>
                    </div>
                    <nav class="system-log-section-nav" th:aria-label="#{admin.logs.groups}">
                        <button type="submit" onclick="this.form.section.value='auth'; this.form.actionType.value=''"
                            class="btn btn-sm"
                            th:classappend="${currentSection == 'auth'} ? 'btn-classic' : 'btn-outline-classic'"
                            th:attr="aria-current=${currentSection == 'auth'} ? 'page'">
                            <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i><span
                                th:text="#{admin.logs.auth}">Login / Logout</span>
                        </button>
                        <button type="submit"
                            onclick="this.form.section.value='operations'; this.form.actionType.value=''"
                            class="btn btn-sm"
                            th:classappend="${currentSection == 'operations'} ? 'btn-classic' : 'btn-outline-classic'"
                            th:attr="aria-current=${currentSection == 'operations'} ? 'page'">
                            <i class="bi bi-activity" aria-hidden="true"></i><span
                                th:text="#{admin.logs.operations}">Status / CRUD</span>
                        </button>
                        <button type="submit"
                            onclick="this.form.section.value='circulation'; this.form.actionType.value=''"
                            class="btn btn-sm"
                            th:classappend="${currentSection == 'circulation'} ? 'btn-classic' : 'btn-outline-classic'"
                            th:attr="aria-current=${currentSection == 'circulation'} ? 'page'">
                            <i class="bi bi-arrow-left-right" aria-hidden="true"></i><span
                                th:text="#{admin.logs.circulation}">Loans / Returns / Reservations</span>
                        </button>
                    </nav>
                </form>
                <div class="system-log-title-row">
                    <h2 class="system-log-list-title">
                        <i class="bi bi-journal-text me-2 text-classic"></i>
                        <span
                            th:text="${currentSection == 'auth' ? #messages.msg('admin.logs.authHistory') : (currentSection == 'operations' ? #messages.msg('admin.logs.operationsHistory') : #messages.msg('admin.logs.circulationHistory'))}">
                            Log List
                        </span>
                    </h2>
                </div>

            </div>

            <div class="card-body p-0">
                <div class="table-responsive system-log-table-wrap">
                    <table class="table table-hover align-middle mb-0 stable-table-layout system-log-table">
                        <colgroup>
                            <col style="width: 20%;">
                            <col style="width: 20%;">
                            <col style="width: 15%;">
                            <col style="width: 45%;">
                        </colgroup>
                        <thead class="admin-system-logs-thead-background-07">
                            <tr>
                                <th th:text="#{common.time}">Time</th>
                                <th th:text="#{admin.logs.actor}">Actor</th>
                                <th th:text="#{admin.logs.action}">Action</th>
                                <th th:text="#{librarian.inventory.bookDescription}">Description</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:if="${logs == null or logs.content.isEmpty()}">
                                <td colspan="4" class="text-center text-muted py-5 system-log-empty-cell">
                                    <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                    <span
                                        th:text="${currentSection == 'auth' ? #messages.msg('admin.logs.noAuth') : (currentSection == 'operations' ? #messages.msg('admin.logs.noOperations') : #messages.msg('admin.logs.noCirculation'))}">
                                        No system logs.
                                    </span>
                                </td>
                            </tr>

                            <tr th:each="log : ${logs.content}">
                                <td th:data-label="#{common.time}">
                                    <span class="app-date-time" th:if="${log.createdAt != null}"
                                        th:text="${#temporals.format(log.createdAt, 'dd/MM/yyyy · HH:mm:ss')}">
                                        dd/MM/yyyy · HH:mm:ss
                                    </span>
                                    <span th:if="${log.createdAt == null}" class="text-muted app-date-time">
                                        —
                                    </span>
                                </td>

                                <td th:data-label="#{admin.logs.actor}">
                                    <div class="fw-semibold"
                                        th:text="${log.actorUsername != null ? log.actorUsername : #messages.msg('common.system')}">
                                        admin
                                    </div>
                                    <small class="text-muted" th:if="${log.user != null}"
                                        th:text="${log.user.fullName}">
                                        System Administrator
                                    </small>
                                </td>

                                <td th:data-label="#{admin.logs.action}">
                                    <span class="log-action-badge" th:classappend="${
                                            log.actionType == 'LOGIN' ? 'log-action-success' :
                                            (log.actionType == 'LOGOUT' or log.actionType == 'DEACTIVATE_ACCOUNT' or log.actionType == 'DELETE_BOOK') ? 'log-action-danger' :
                                            log.actionType == 'GOOGLE' ? 'log-action-primary' :
                                            (log.actionType == 'CREATE_ACCOUNT' or log.actionType == 'CREATE_BOOK') ? 'log-action-info' :
                                            (log.actionType == 'UPDATE_ACCOUNT' or log.actionType == 'UPDATE_BOOK') ? 'log-action-warning' :
                                            log.actionType == 'UPDATE_SETTINGS' ? 'log-action-purple' :
                                            log.actionType == 'REQUEST_BORROW' ? 'log-action-indigo' :
                                            log.actionType == 'REQUEST_RETURN' ? 'log-action-pink' :
                                            log.actionType == 'RESERVE_BOOK' ? 'log-action-brown' :
                                            'log-action-secondary'}"
                                        th:text="${log.actionType == 'LOGIN' ? #messages.msg('admin.logs.action.login') :
                                            (log.actionType == 'LOGOUT' ? #messages.msg('admin.logs.action.logout') :
                                            (log.actionType == 'CREATE_BOOK' ? #messages.msg('admin.logs.action.create_book') :
                                            (log.actionType == 'UPDATE_BOOK' ? #messages.msg('admin.logs.action.update_book') :
                                            (log.actionType == 'DELETE_BOOK' ? #messages.msg('admin.logs.action.delete_book') :
                                            (log.actionType == 'CREATE_ACCOUNT' ? #messages.msg('admin.logs.action.create_account') :
                                            (log.actionType == 'UPDATE_ACCOUNT' ? #messages.msg('admin.logs.action.update_account') :
                                            (log.actionType == 'DEACTIVATE_ACCOUNT' ? #messages.msg('admin.logs.action.deactivate_account') :
                                            (log.actionType == 'UPDATE_SETTINGS' ? #messages.msg('admin.logs.action.update_settings') :
                                            (log.actionType == 'REQUEST_BORROW' ? #messages.msg('admin.logs.action.request_borrow') :
                                            (log.actionType == 'REQUEST_RETURN' ? #messages.msg('admin.logs.action.request_return') :
                                            (log.actionType == 'RESERVE_BOOK' ? #messages.msg('admin.logs.action.reserve_book') :
                                            (log.actionType == 'GOOGLE' ? #messages.msg('admin.logs.action.google') : log.actionType))))))))))))}">
                                        Login
                                    </span>
                                </td>

                                <td class="admin-system-logs-td-max-width-08"
                                    th:data-label="#{librarian.inventory.bookDescription}">
                                    <th:block th:switch="${log.actionType}">
                                        <span th:case="'LOGIN'" th:text="#{backend.auth.audit.login}"></span>
                                        <span th:case="'LOGOUT'" th:text="#{backend.auth.audit.logout}"></span>
                                        <span th:case="'GOOGLE'" th:text="#{backend.auth.audit.google_login}"></span>
                                        <span th:case="'UPDATE_SETTINGS'"
                                            th:text="#{backend.settings.audit.updated}"></span>
                                        <span th:case="*"
                                            th:text="${log.description != null ? log.description : #messages.msg('admin.logs.noDescription')}">
                                            No description
                                        </span>
                                    </th:block>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="member-pagination app-pagination-region" th:if="${logs != null and logs.totalPages > 1}"
                th:with="startPage=${logs.totalPages <= 10 ? 0 : (logs.number < 9 ? 0 : (logs.number - 8 > logs.totalPages - 10 ? logs.totalPages - 10 : logs.number - 8))}">
                <nav th:aria-label="#{admin.logs.pagination}"
                    th:with="endPage=${startPage + 9 < logs.totalPages ? startPage + 9 : logs.totalPages - 1}">
                    <ul class="pagination mb-0 app-pagination">
                        <li class="page-item" th:classappend="${logs.first} ? 'disabled'">
                            <a class="page-link page-link-classic u-color-8b5a2b-border-color-rgba-139-90-43-0-2-0da3cc4a"
                                th:href="@{/admin/system/logs(section=${currentSection}, page=0, keyword=${keyword}, actionType=${actionType})}"
                                th:aria-label="#{common.first}" th:text="#{common.first}">
                                First
                            </a>
                        </li>

                        <li class="page-item" th:classappend="${logs.first} ? 'disabled'">
                            <a class="page-link page-link-classic u-color-8b5a2b-border-color-rgba-139-90-43-0-2-0da3cc4a"
                                th:href="@{/admin/system/logs(section=${currentSection}, page=${logs.number - 1}, keyword=${keyword}, actionType=${actionType})}"
                                th:aria-label="#{common.previous}">
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>

                        <li class="page-item disabled" th:if="${startPage > 0}">
                            <span class="page-link page-link-classic">…</span>
                        </li>

                        <li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
                            th:classappend="${i == logs.number} ? 'active'">
                            <a class="page-link page-link-classic"
                                th:href="@{/admin/system/logs(section=${currentSection}, page=${i}, keyword=${keyword}, actionType=${actionType})}"
                                th:text="${i + 1}">
                                1
                            </a>
                        </li>

                        <li class="page-item disabled" th:if="${endPage < logs.totalPages - 1}">
                            <span class="page-link page-link-classic">…</span>
                        </li>

                        <li class="page-item" th:classappend="${logs.last} ? 'disabled'">
                            <a class="page-link page-link-classic u-color-8b5a2b-border-color-rgba-139-90-43-0-2-0da3cc4a"
                                th:href="@{/admin/system/logs(section=${currentSection}, page=${logs.number + 1}, keyword=${keyword}, actionType=${actionType})}"
                                th:aria-label="#{common.next}">
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>

                        <li class="page-item" th:classappend="${logs.last} ? 'disabled'">
                            <a class="page-link page-link-classic u-color-8b5a2b-border-color-rgba-139-90-43-0-2-0da3cc4a"
                                th:href="@{/admin/system/logs(section=${currentSection}, page=${logs.totalPages - 1}, keyword=${keyword}, actionType=${actionType})}"
                                th:aria-label="#{common.last}" th:text="#{common.last}">
                                Last
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

    </div>
</body>

</html>
