<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/admin_base}">

<head>
    <title>Nhật ký hệ thống</title>
    <link rel="stylesheet" th:href="@{/css/pages/admin/system-logs.css}" />
  </head>

<body>
    <div layout:fragment="content" th:with="activeMenu='logs'">

        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom u-border-color-rgba-139-90-43-0-2-important-f8e732ba"
           >
            <div>
                <h2 class="fw-bold mb-1 u-color-4a3b32-font-family-playfair-display-serif-70239336">
                    Nhật ký hệ thống
                </h2>
                <div class="text-muted">
                    Theo dõi các hoạt động quan trọng trong hệ thống
                </div>
            </div>
        </div>

        <div class="card-classic shadow-sm mb-4">
            <div class="card-body p-4">
                <form class="row g-3 align-items-end" method="get" th:action="@{/admin/system/logs}">
                    <div class="col-md-10">
                        <label class="form-label fw-bold small text-muted text-uppercase">
                            Từ khóa
                        </label>
                        <input type="text" name="keyword" class="form-control"
                            placeholder="Tìm thời gian, người thực hiện, hành động, IP hoặc mô tả..."
                            th:value="${keyword}">
                    </div>

                    <div class="col-md-auto d-flex gap-2">
                        <button type="submit" class="btn btn-classic px-3" title="Tìm kiếm" aria-label="Tìm kiếm">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card-classic shadow-sm">
            <div class="card-header bg-white border-bottom border-color p-4">
                <h5 class="fw-bold mb-0 u-color-4a3b32-font-family-playfair-display-serif-70239336">
                    <i class="bi bi-journal-text me-2 text-classic"></i>
                    Danh sách nhật ký
                </h5>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 stable-table-layout">
                        <colgroup>
                            <col class="u-width-24-3ca932db">
                            <col class="admin-system-logs-col-width-04">
                            <col class="u-width-14-546d6dae">
                            <col class="u-width-17-9278e232">
                            <col class="u-width-24-3ca932db">
                        </colgroup>
                        <thead class="admin-system-logs-thead-background-07">
                            <tr>
                                <th>Thời gian</th>
                                <th>Người thực hiện</th>
                                <th>Hành động</th>
                                <th>IP</th>
                                <th>Mô tả</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:if="${logs == null or logs.content.isEmpty()}">
                                <td colspan="5" class="text-center text-muted py-5">
                                    <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                    Không có nhật ký hệ thống.
                                </td>
                            </tr>

                            <tr th:each="log : ${logs.content}">
                                <td>
                                    <span th:if="${log.createdAt != null}"
                                        th:text="${#temporals.format(log.createdAt, 'dd/MM/yyyy · HH:mm:ss')}">
                                        dd/MM/yyyy · HH:mm:ss
                                    </span>
                                    <span th:if="${log.createdAt == null}" class="text-muted">
                                        N/A
                                    </span>
                                </td>

                                <td>
                                    <div class="fw-semibold"
                                        th:text="${log.actorUsername != null ? log.actorUsername : 'System'}">
                                        admin
                                    </div>
                                    <small class="text-muted" th:if="${log.user != null}"
                                        th:text="${log.user.fullName}">
                                        Admin Tổng
                                    </small>
                                </td>

                                <td>
                                    <span class="badge rounded-pill px-2 py-1 text-white"
                                        th:classappend="${
                                            log.actionType == 'LOGIN' ? 'bg-success' :
                                            (log.actionType == 'LOGOUT' or log.actionType == 'DEACTIVATE_ACCOUNT') ? 'bg-danger' :
                                            #strings.startsWith(log.actionType, 'CREATE') ? 'bg-primary' :
                                            #strings.startsWith(log.actionType, 'UPDATE') ? 'bg-warning text-dark' :
                                            'bg-secondary'}"
                                        th:text="${log.actionType == 'LOGIN' ? 'Đăng nhập' :
                                            (log.actionType == 'LOGOUT' ? 'Đăng xuất' :
                                            (log.actionType == 'CREATE_BOOK' ? 'Thêm sách' :
                                            (log.actionType == 'UPDATE_BOOK' ? 'Cập nhật sách' :
                                            (log.actionType == 'DELETE_BOOK' ? 'Xóa sách' :
                                            (log.actionType == 'CREATE_ACCOUNT' ? 'Tạo tài khoản' :
                                            (log.actionType == 'UPDATE_ACCOUNT' ? 'Cập nhật tài khoản' :
                                            (log.actionType == 'DEACTIVATE_ACCOUNT' ? 'Vô hiệu hóa tài khoản' :
                                            (log.actionType == 'UPDATE_SETTINGS' ? 'Cập nhật cài đặt' :
                                            (log.actionType == 'REQUEST_BORROW' ? 'Yêu cầu mượn sách' :
                                            (log.actionType == 'REQUEST_RETURN' ? 'Yêu cầu trả sách' :
                                            (log.actionType == 'RESERVE_BOOK' ? 'Đặt trước sách' :
                                            (log.actionType == 'GOOGLE' ? 'Đăng nhập Google' : log.actionType))))))))))))}">
                                        Đăng nhập
                                    </span>
                                </td>

                                <td>
                                    <span th:text="${log.ipAddress != null ? log.ipAddress : 'N/A'}">
                                        127.0.0.1
                                    </span>
                                </td>

                                <td class="admin-system-logs-td-max-width-08">
                                    <span th:text="${log.description != null ? log.description : 'Không có mô tả'}">
                                        Đăng nhập thành công.
                                    </span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card-footer bg-white border-top p-3 d-flex justify-content-center"
                th:if="${logs != null and logs.totalPages > 1}"
                th:with="startPage=${logs.totalPages <= 10 ? 0 : (logs.number < 9 ? 0 : (logs.number - 8 > logs.totalPages - 10 ? logs.totalPages - 10 : logs.number - 8))}">
                <nav aria-label="Phân trang nhật ký hệ thống"
                    th:with="endPage=${startPage + 9 < logs.totalPages ? startPage + 9 : logs.totalPages - 1}">
                    <ul class="pagination mb-0">
                        <li class="page-item" th:classappend="${logs.first} ? 'disabled'">
                            <a class="page-link page-link-classic u-color-8b5a2b-border-color-rgba-139-90-43-0-2-0da3cc4a" th:href="@{/admin/system/logs(page=0, keyword=${keyword})}"
                                aria-label="Trang đầu"
                               >
                                Đầu
                            </a>
                        </li>

                        <li class="page-item" th:classappend="${logs.first} ? 'disabled'">
                            <a class="page-link page-link-classic u-color-8b5a2b-border-color-rgba-139-90-43-0-2-0da3cc4a"
                                th:href="@{/admin/system/logs(page=${logs.number - 1}, keyword=${keyword})}"
                                aria-label="Trang trước"
                               >
                                <i class="bi bi-chevron-left"></i>
                            </a>
                        </li>

                        <li class="page-item disabled" th:if="${startPage > 0}">
                            <span class="page-link page-link-classic">…</span>
                        </li>

                        <li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
                            th:classappend="${i == logs.number} ? 'active'">
                            <a class="page-link page-link-classic" th:href="@{/admin/system/logs(page=${i}, keyword=${keyword})}"
                                th:text="${i + 1}">
                                1
                            </a>
                        </li>

                        <li class="page-item disabled" th:if="${endPage < logs.totalPages - 1}">
                            <span class="page-link page-link-classic">…</span>
                        </li>

                        <li class="page-item" th:classappend="${logs.last} ? 'disabled'">
                            <a class="page-link page-link-classic u-color-8b5a2b-border-color-rgba-139-90-43-0-2-0da3cc4a"
                                th:href="@{/admin/system/logs(page=${logs.number + 1}, keyword=${keyword})}"
                                aria-label="Trang sau"
                               >
                                <i class="bi bi-chevron-right"></i>
                            </a>
                        </li>

                        <li class="page-item" th:classappend="${logs.last} ? 'disabled'">
                            <a class="page-link page-link-classic u-color-8b5a2b-border-color-rgba-139-90-43-0-2-0da3cc4a"
                                th:href="@{/admin/system/logs(page=${logs.totalPages - 1}, keyword=${keyword})}"
                                aria-label="Trang cuối"
                               >
                                Cuối
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

    </div>
</body>

</html>
