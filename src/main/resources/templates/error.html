<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${status != null ? status + ' - ' + (error != null ? error : #messages.msg('error.system.title')) : #messages.msg('error.system.title')}">System Error</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&amp;family=Lora:ital,wght@0,400;0,600;1,400&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/components/language-switcher.css}">
    <link rel="stylesheet" th:href="@{/css/pages/error/403.css}">
</head>
<body class="error-page">
    <div class="error-language-control">
        <div th:replace="~{fragments/language-switcher :: switcher}"></div>
    </div>

    <main class="error-container" role="main">
        <div class="error-symbol" aria-hidden="true"><i class="bi bi-book"></i></div>
        <span class="error-eyebrow" th:text="#{error.eyebrow}">Something went wrong</span>
        <h1 class="error-code" th:text="${status != null ? status : '500'}">500</h1>
        <h2 class="error-title" th:text="${error != null ? error : #messages.msg('error.system.title')}">System Error</h2>
        <p class="error-desc" th:text="${errorMessage != null ? errorMessage : #messages.msg('error.system.message')}">
            A server error occurred. Please try again later.
        </p>

        <div class="error-actions">
            <a id="errorBackLink" th:href="@{/}" class="btn-back">
                <i class="bi bi-arrow-left" aria-hidden="true"></i>
                <span th:text="#{common.back}">Back</span>
            </a>
            <a th:href="@{/}" class="btn-home">
                <i class="bi bi-house" aria-hidden="true"></i>
                <span th:text="#{common.backHome}">Back to Home</span>
            </a>
        </div>

        <div th:if="${trace != null}" class="error-debug">
            <button id="traceToggle" type="button" class="toggle-dev" th:text="#{error.details}">Show error details (Developer)</button>
            <div id="traceBox" class="dev-details" hidden>
                <code th:text="${trace}"></code>
            </div>
        </div>
    </main>

    <script th:replace="~{fragments/language-switcher :: script}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const backLink = document.getElementById('errorBackLink');
            if (backLink) {
                backLink.addEventListener('click', function (event) {
                    if (window.history.length > 1) {
                        event.preventDefault();
                        window.history.back();
                    }
                });
            }

            const traceToggle = document.getElementById('traceToggle');
            const traceBox = document.getElementById('traceBox');
            if (traceToggle && traceBox) {
                traceToggle.addEventListener('click', function () {
                    traceBox.hidden = false;
                    traceToggle.hidden = true;
                });
            }
        });
    </script>
</body>
</html>
