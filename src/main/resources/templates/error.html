<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${status != null ? status + ' - ' + (error != null ? error : #messages.msg('error.system.title')) : #messages.msg('error.system.title')}">System Error</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/utilities.css}" />
    
    <style>
        :root {
            --primary-bg: #f8f9fa;
            --accent-color: #8b5a2b; /* LMW standard classic brown */
            --accent-hover: #6e451f;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            font-family: 'Outfit', 'Lora', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Decorative background elements */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: float 10s infinite ease-in-out alternate;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: #dcb38a;
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            background: #c3a17a;
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        .error-container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 3rem 4rem;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.05), 
                        0 0 0 1px rgba(255, 255, 255, 0.3) inset;
            max-width: 600px;
            width: 90%;
            transform: translateY(0);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin: 0;
            background: linear-gradient(135deg, var(--accent-color) 0%, #dcb38a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 4px 10px rgba(139, 90, 43, 0.2);
            letter-spacing: -5px;
        }

        .error-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 1rem 0;
        }

        .error-desc {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--accent-color);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 10px 20px rgba(139, 90, 43, 0.2);
        }

        .btn-home:hover {
            background: var(--accent-hover);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(139, 90, 43, 0.3);
        }

        .btn-home:active {
            transform: translateY(-1px);
        }

        .btn-home i {
            font-size: 1.2rem;
        }

        /* Animations */
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Exception stack trace toggle (for devs in dev mode) */
        .dev-details {
            margin-top: 2rem;
            text-align: left;
            display: none;
            font-size: 0.85rem;
        }
        
        .toggle-dev {
            background: none;
            border: none;
            color: #aaa;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="error-container">
        <!-- Error Code (e.g. 404, 500) -->
        <h1 class="error-code" th:text="${status != null ? status : '500'}">500</h1>
        
        <!-- Short error title -->
        <h2 class="error-title" th:text="${error != null ? error : #messages.msg('error.system.title')}">System Error</h2>
        
        <!-- Detailed Error Message -->
        <p class="error-desc" th:text="${errorMessage != null ? errorMessage : #messages.msg('error.system.message')}">
            A server error occurred. Please try again later.
        </p>
        
        <a href="javascript:history.back()" class="btn-home">
            <i class="bi bi-arrow-left"></i>
            <span th:text="#{common.back}">Back</span>
        </a>

        <!-- Debug Info (Optional) -->
        <div th:if="${trace != null}">
            <button class="toggle-btn toggle-dev" onclick="document.getElementById('traceBox').style.display = 'block'; this.style.display='none';" th:text="#{error.details}">Show error details (Developer)</button>
            <div id="traceBox" class="dev-details p-3 bg-light rounded text-muted" style="max-height: 200px; overflow-y: auto;">
                <code th:text="${trace}"></code>
            </div>
        </div>
    </div>

</body>
</html>
