<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>403 - Access Denied</title>
    <link rel="stylesheet" th:href="@{/css/pages/error/403.css}" />
      <link rel="stylesheet" th:href="@{/css/utilities.css}" />
  </head>
<body>

<div class="error-container">
    <div class="icon-lock">🔐</div>
    <h1 class="error-code">403</h1>
    <div class="error-title">Access Denied / Forbidden</div>
    <p class="error-message">
        You do not have permission to access this resource.<br>
        The system has restricted this request based on your account's assigned role.
    </p>
    <a href="/" class="btn-back">🏠 Back to Homepage</a>
</div>

</body>
</html>
