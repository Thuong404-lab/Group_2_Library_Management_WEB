<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quên Mật Khẩu</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .forgot-password-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .form-group label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="forgot-password-container">
        <h2 class="text-center mb-4">Quên Mật Khẩu</h2>

        <div th:if="${successMsg}" class="alert alert-success" role="alert">
            <p th:text="${successMsg}"></p>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger" role="alert">
            <p th:text="${errorMsg}"></p>
        </div>

        <form th:action="@{/forgot-password}" th:object="${forgotPasswordRequest}" method="post">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="Nhập địa chỉ email của bạn" required>
                <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Gửi yêu cầu đặt lại mật khẩu</button>
        </form>
        <div class="text-center mt-3">
            <a th:href="@{/login}">Quay lại trang đăng nhập</a>
        </div>
    </div>
</body>
</html>
