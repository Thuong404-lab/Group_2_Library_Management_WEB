<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Thư Viện Cổ Điển</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #fdfbf7;
            color: #2c1e16;
            font-family: 'Lora', serif;
        }

        .forgot-password-page {
            display: flex;
            min-height: 100vh;
        }

        .form-wrapper {
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-color: #fdfbf7;
        }

        .forgot-password-form {
            width: 100%;
            max-width: 420px;
        }

        .brand-logo {
            margin-bottom: 8px;
            color: #8b5a2b;
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .brand-subtitle {
            margin-bottom: 40px;
            color: #6b7280;
            font-size: 1.05rem;
            font-style: italic;
        }

        .page-title {
            margin-bottom: 12px;
            color: #2c1e16;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
        }

        .page-description {
            margin-bottom: 30px;
            color: #6b7280;
            line-height: 1.65;
        }

        .form-label {
            margin-bottom: 8px;
            color: #4a3b32;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .form-control {
            padding: 14px 16px;
            border: 1px solid #d1c7bd;
            border-radius: 8px;
            background-color: #fff;
            color: #2c1e16;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #8b5a2b;
            box-shadow: 0 0 0 4px rgba(139, 90, 43, 0.15);
        }

        .form-control.is-invalid {
            border-color: #dc3545;
            padding-right: 16px;
            background-image: none;
        }

        .invalid-feedback {
            display: block;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .btn-primary-custom {
            margin-top: 15px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background-color: #8b5a2b;
            box-shadow: 0 4px 6px rgba(139, 90, 43, 0.2);
            color: #fdfbf7;
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            background-color: #6a4420;
            box-shadow: 0 6px 12px rgba(139, 90, 43, 0.3);
            color: #fdfbf7;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .alert p {
            margin: 0;
        }

        .alert-danger {
            border: 1px solid #fca5a5;
            border-left: 4px solid #ef4444;
            background-color: #fef2f2;
            color: #b91c1c;
        }

        .alert-success {
            border: 1px solid #86efac;
            border-left: 4px solid #22c55e;
            background-color: #f0fdf4;
            color: #15803d;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            color: #8b5a2b;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #6a4420;
            text-decoration: underline;
        }

        .login-image {
            position: relative;
            display: none;
            flex: 1.3;
            background: url('/images/library_bg.png') center center no-repeat;
            background-size: cover;
        }

        .login-image::after {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to right, rgba(253, 251, 247, 1) 0%, rgba(253, 251, 247, 0) 15%),
                linear-gradient(180deg, rgba(44, 30, 22, 0.1) 0%, rgba(44, 30, 22, 0.7) 100%);
            content: '';
        }

        .image-text {
            position: absolute;
            right: 60px;
            bottom: 60px;
            z-index: 1;
            color: #fdfbf7;
            text-align: right;
        }

        .image-text h2 {
            margin-bottom: 15px;
            color: #e6ccb2;
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .image-text p {
            max-width: 500px;
            margin-left: auto;
            font-size: 1.2rem;
            line-height: 1.6;
            opacity: 0.95;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 992px) {
            .login-image {
                display: block;
            }
        }

        @media (max-width: 575.98px) {
            .brand-logo {
                font-size: 2.1rem;
            }

            .brand-subtitle {
                margin-bottom: 32px;
            }

            .page-title {
                font-size: 1.75rem;
            }
        }
    </style>
</head>

<body>
    <main class="forgot-password-page">
        <section class="form-wrapper">
            <div class="forgot-password-form">
                <div class="brand-logo">Thư Viện Cổ Điển.</div>
                <div class="brand-subtitle">Đồng hành cùng bạn trên hành trình tri thức</div>

                <h1 class="page-title">Quên mật khẩu?</h1>
                <p class="page-description">
                    Nhập địa chỉ email đã đăng ký. Chúng tôi sẽ gửi hướng dẫn giúp bạn đặt lại mật khẩu.
                </p>

                <div th:if="${successMsg}" class="alert alert-success mb-4" role="alert">
                    <p th:text="${successMsg}"></p>
                </div>
                <div th:if="${errorMsg}" class="alert alert-danger mb-4" role="alert">
                    <p th:text="${errorMsg}"></p>
                </div>

                <form id="forgotPasswordForm" th:action="@{/forgot-password}"
                    th:object="${forgotPasswordRequest}" method="post" novalidate>
                    <div class="mb-4">
                        <label for="email" class="form-label">Địa chỉ email</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control"
                            th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                            th:attr="aria-invalid=${#fields.hasErrors('email')}"
                            aria-describedby="emailError" placeholder="Nhập địa chỉ email của bạn"
                            autocomplete="email" required autofocus>
                        <div id="emailError" class="invalid-feedback"
                            th:classappend="${#fields.hasErrors('email')} ? 'd-block'">
                            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100">
                        Gửi yêu cầu đặt lại mật khẩu
                    </button>
                </form>

                <div class="text-center">
                    <a th:href="@{/login}" class="back-link">
                        <span aria-hidden="true">←</span>
                        Quay lại trang đăng nhập
                    </a>
                </div>
            </div>
        </section>

        <section class="login-image" aria-label="Không gian Thư Viện Cổ Điển">
            <div class="image-text">
                <h2>Trở lại hành trình</h2>
                <p>Khôi phục quyền truy cập để tiếp tục khám phá kho tri thức tại Thư Viện Cổ Điển.</p>
            </div>
        </section>
    </main>

    <script>
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('emailError');

        function clearEmailError() {
            emailInput.classList.remove('is-invalid');
            emailInput.setAttribute('aria-invalid', 'false');
            emailError.classList.remove('d-block');
            emailError.textContent = '';
        }

        function showEmailError(message) {
            emailInput.classList.add('is-invalid');
            emailInput.setAttribute('aria-invalid', 'true');
            emailError.textContent = message;
            emailError.classList.add('d-block');
        }

        forgotPasswordForm.addEventListener('submit', function (event) {
            const email = emailInput.value.trim();

            if (email === '') {
                event.preventDefault();
                showEmailError('Email không được để trống.');
                emailInput.focus();
                return;
            }

            if (emailInput.validity.typeMismatch) {
                event.preventDefault();
                showEmailError('Email không hợp lệ.');
                emailInput.focus();
            }
        });

        emailInput.addEventListener('input', clearEmailError);
    </script>
</body>

</html>
