<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Thư Viện Cổ Điển</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pages/forgot-password.css}" />
      <link rel="stylesheet" th:href="@{/css/utilities.css}" />
  </head>

<body>
    <main class="forgot-password-page">
        <section class="form-wrapper">
            <div class="forgot-password-form">
                <div class="brand-logo">Thư Viện Cổ Điển.</div>
                <div class="brand-subtitle">Đồng hành cùng bạn trên hành trình tri thức</div>

                <h1 class="page-title">Quên mật khẩu?</h1>
                <p class="page-description">
                    Nhập địa chỉ email đã đăng ký. Chúng tôi sẽ gửi hướng dẫn giúp bạn đặt lại mật khẩu.
                </p>

                <div th:if="${successMsg}" class="alert alert-success mb-4" role="alert">
                    <p th:text="${successMsg}"></p>
                </div>
                <div th:if="${errorMsg}" class="alert alert-danger mb-4" role="alert">
                    <p th:text="${errorMsg}"></p>
                </div>

                <form id="forgotPasswordForm" th:action="@{/forgot-password}"
                    th:object="${forgotPasswordRequest}" method="post" novalidate>
                    <div class="mb-4">
                        <label for="email" class="form-label">Địa chỉ email</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control"
                            th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                            th:attr="aria-invalid=${#fields.hasErrors('email')}"
                            aria-describedby="emailError" placeholder="Nhập địa chỉ email của bạn"
                            autocomplete="email" required autofocus>
                        <div id="emailError" class="invalid-feedback"
                            th:classappend="${#fields.hasErrors('email')} ? 'd-block'">
                            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100">
                        Gửi yêu cầu đặt lại mật khẩu
                    </button>
                </form>

                <div class="text-center">
                    <a th:href="@{/login}" class="back-link">
                        <span aria-hidden="true">←</span>
                        Quay lại trang đăng nhập
                    </a>
                </div>
            </div>
        </section>

        <section class="login-image" aria-label="Không gian Thư Viện Cổ Điển">
            <div class="image-text">
                <h2>Trở lại hành trình</h2>
                <p>Khôi phục quyền truy cập để tiếp tục khám phá kho tri thức tại Thư Viện Cổ Điển.</p>
            </div>
        </section>
    </main>

    <script>
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('emailError');

        function clearEmailError() {
            emailInput.classList.remove('is-invalid');
            emailInput.setAttribute('aria-invalid', 'false');
            emailError.classList.remove('d-block');
            emailError.textContent = '';
        }

        function showEmailError(message) {
            emailInput.classList.add('is-invalid');
            emailInput.setAttribute('aria-invalid', 'true');
            emailError.textContent = message;
            emailError.classList.add('d-block');
        }

        forgotPasswordForm.addEventListener('submit', function (event) {
            const email = emailInput.value.trim();

            if (email === '') {
                event.preventDefault();
                showEmailError('Email không được để trống.');
                emailInput.focus();
                return;
            }

            if (emailInput.validity.typeMismatch) {
                event.preventDefault();
                showEmailError('Email không hợp lệ.');
                emailInput.focus();
            }
        });

        emailInput.addEventListener('input', clearEmailError);
    </script>
</body>

</html>
