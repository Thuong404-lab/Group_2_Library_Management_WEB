<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{forgot.title}">Forgot Password - Library Management System</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pages/forgot-password.css}" />
    <link rel="stylesheet" th:href="@{/css/components/language-switcher.css}" />
      <link rel="stylesheet" th:href="@{/css/utilities.css}" />
  </head>

<body>
    <main class="forgot-password-page">
        <section class="form-wrapper">
            <div class="forgot-password-form">
                <div th:replace="~{fragments/language-switcher :: switcher}"></div>
                <div class="brand-logo" th:text="#{auth.brand}">Classic Library</div>
                <div class="brand-subtitle" th:text="#{password.brandSubtitle}">Supporting you throughout your journey of knowledge</div>

                <h1 class="page-title" th:text="#{forgot.heading}">Forgot password?</h1>
                <p class="page-description" th:text="#{forgot.description}">Enter your registered email address. We will send instructions to help you reset your password.</p>

                <div th:if="${successMsg}" class="alert alert-success mb-4" role="alert">
                    <p th:text="${successMsg}"></p>
                </div>
                <div th:if="${errorMsg}" class="alert alert-danger mb-4" role="alert">
                    <p th:text="${errorMsg}"></p>
                </div>

                <form id="forgotPasswordForm" th:action="@{/forgot-password}"
                    th:object="${forgotPasswordRequest}" method="post" novalidate>
                    <div class="mb-4">
                        <label for="email" class="form-label" th:text="#{forgot.email}">Email address</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control"
                            th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                            th:attr="aria-invalid=${#fields.hasErrors('email')}"
                            aria-describedby="emailError" th:placeholder="#{forgot.email.placeholder}" placeholder="Enter your email address"
                            autocomplete="email" required autofocus>
                        <div id="emailError" class="invalid-feedback"
                            th:classappend="${#fields.hasErrors('email')} ? 'd-block'">
                            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100">
                        <span th:text="#{forgot.submit}">Send Reset Request</span>
                    </button>
                </form>

                <div class="text-center">
                    <a th:href="@{/login}" class="back-link">
                        <span aria-hidden="true">←</span>
                        <span th:text="#{password.backToLogin}">Back to login</span>
                    </a>
                </div>
            </div>
        </section>

        <section class="login-image" th:aria-label="#{password.imageArea}" aria-label="Classic Library reading space">
            <div class="image-text">
                <h2 th:text="#{forgot.hero.title}">Return to Your Journey</h2>
                <p th:text="#{forgot.hero.description}">Restore access and continue exploring the library's collection.</p>
            </div>
        </section>
    </main>

    <script th:replace="~{fragments/language-switcher :: script}"></script>
    <script th:inline="javascript">
        const emailRequiredMessage = /*[[#{forgot.email.required}]]*/ 'Email is required.';
        const emailInvalidMessage = /*[[#{forgot.email.invalid}]]*/ 'Please enter a valid email address.';
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('email');
        const emailError = document.getElementById('emailError');

        function clearEmailError() {
            emailInput.classList.remove('is-invalid');
            emailInput.setAttribute('aria-invalid', 'false');
            emailError.classList.remove('d-block');
            emailError.textContent = '';
        }

        function showEmailError(message) {
            emailInput.classList.add('is-invalid');
            emailInput.setAttribute('aria-invalid', 'true');
            emailError.textContent = message;
            emailError.classList.add('d-block');
        }

        forgotPasswordForm.addEventListener('submit', function (event) {
            const email = emailInput.value.trim();

            if (email === '') {
                event.preventDefault();
                showEmailError(emailRequiredMessage);
                emailInput.focus();
                return;
            }

            if (emailInput.validity.typeMismatch) {
                event.preventDefault();
                showEmailError(emailInvalidMessage);
                emailInput.focus();
            }
        });

        emailInput.addEventListener('input', clearEmailError);
    </script>
</body>

</html>
