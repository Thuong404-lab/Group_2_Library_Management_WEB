<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
</head>
<body>
    <nav th:fragment="sidebar" class="col-md-3 col-lg-2 d-md-block bg-custom-dark sidebar-container p-3" style="background-color: #1a365d; min-height: 100vh; color: #fff;">
        <!-- Brand -->
        <div class="d-flex align-items-center mb-4 mt-2">
            <div class="bg-warning text-dark rounded p-2 me-3" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-book fs-3"></i>
            </div>
            <div>
                <h4 class="mb-0 fw-bold text-white">Thư Viện LMW</h4>
                <small class="text-secondary fw-bold" style="letter-spacing: 1px;">LIBRARY SYSTEM</small>
            </div>
        </div>
        <hr class="border-secondary mb-4">
        <!-- Navigation Links -->
        <ul class="nav flex-column gap-2">
            
            <!-- FOR MEMBER -->
            <div sec:authorize="hasRole('MEMBER')">
                <!-- All member account links have been moved to the top header profile dropdown -->
                <li class="nav-item">
                    <a class="nav-link text-white fs-5 py-2 active rounded" th:href="@{/}" style="background-color: #3b5c8c;">
                        <i class="bi bi-search me-3"></i> Trang chủ (Tìm sách)
                    </a>
                </li>
            </div>

            <!-- FOR GUEST -->
            <div sec:authorize="!isAuthenticated()">
                <li class="nav-item">
                    <a class="nav-link text-white fs-5 py-2 active rounded" th:href="@{/}" style="background-color: #3b5c8c;">
                        <i class="bi bi-search me-3"></i> Danh mục sách
                    </a>
                </li>
                <li class="nav-item mt-3">
                    <a class="nav-link text-light fs-5 py-2" th:href="@{/login}">
                        <i class="bi bi-box-arrow-in-right me-3"></i> Đăng nhập
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-light fs-5 py-2" th:href="@{/register}">
                        <i class="bi bi-person-plus me-3"></i> Đăng ký
                    </a>
                </li>
            </div>

            <!-- ADMIN / LIBRARIAN (Basic links) -->
            <div sec:authorize="hasRole('ADMIN')">
                <li class="nav-item">
                    <a class="nav-link text-light fs-5 py-2" th:href="@{/admin/dashboard}">
                        <i class="bi bi-speedometer2 me-3"></i> Admin Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white fs-5 py-2 active rounded" th:href="@{/}" style="background-color: #3b5c8c;">
                        <i class="bi bi-search me-3"></i> Tìm sách
                    </a>
                </li>
            </div>
            <div sec:authorize="hasRole('LIBRARIAN')">
                <li class="nav-item">
                    <a class="nav-link text-light fs-5 py-2" th:href="@{/librarian/dashboard}">
                        <i class="bi bi-speedometer2 me-3"></i> Librarian Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white fs-5 py-2 active rounded" th:href="@{/}" style="background-color: #3b5c8c;">
                        <i class="bi bi-search me-3"></i> Tìm sách
                    </a>
                </li>
            </div>
        </ul>
    </nav>
</body>
</html>
