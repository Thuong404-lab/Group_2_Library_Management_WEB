<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security" layout:decorate="~{layout/base}">

<head>
    <title>Danh sách Sách - Thư Viện Số</title>
    <link rel="stylesheet" th:href="@{/css/pages/guest/books.css}" />
  </head>

<body>
    <div layout:fragment="content">
        <div class="container py-4">

            <!-- Hero banner removed to reduce redundancy -->

            <!-- Main Content: Filter Sidebar + Book Grid -->
            <div class="row">
                <!-- Filter Sidebar (Left) -->
                <div class="col-lg-3 col-md-4 mb-4">
                    <form action="/books" method="GET" class="card shadow-sm sticky-top guest-books-form-border-radius-top-z-index-03" id="filterForm"
                       >
                        <input type="hidden" name="keyword" th:if="${keyword != null}" th:value="${keyword}">
                        <input type="hidden" name="sort" id="hiddenSort" th:value="${sort}">
                        <div class="card-body p-3">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h5 class="fw-bold mb-0 u-color-4a3b32-font-family-playfair-display-serif-70239336"
                                   ><i
                                        class="bi bi-funnel me-2 u-color-8b5a2b-93ece783"></i>Bộ lọc</h5>
                                <a href="/books" class="btn btn-sm btn-link text-decoration-none p-0 u-color-8b5a2b-93ece783"
                                   >Xóa bộ lọc</a>
                            </div>

                            <!-- Lọc theo Danh mục -->
                            <div class="mb-3 border-top pt-3 u-border-color-rgba-139-90-43-0-2-important-f8e732ba">
                                <h6 class="fw-bold mb-2 u-color-2c1e16-5ab7ae80">Danh mục thể loại</h6>
                                <div class="form-check mb-1" th:each="genre : ${genres}">
                                    <input class="form-check-input" type="radio" name="genreId"
                                        th:value="${genre.genreId}" th:id="'genre' + ${genre.genreId}"
                                        th:checked="${selectedGenreId == genre.genreId}" onchange="this.form.submit()">
                                    <label class="form-check-label text-muted d-flex justify-content-between"
                                        th:for="'genre' + ${genre.genreId}">
                                        <span th:text="${genre.genreName}">Văn học</span>
                                    </label>
                                </div>
                            </div>

                            <!-- Lọc theo Tình trạng -->
                            <div class="mb-3 border-top pt-3 u-border-color-rgba-139-90-43-0-2-important-f8e732ba">
                                <h6 class="fw-bold mb-2 u-color-2c1e16-5ab7ae80">Tình trạng sách</h6>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="radio" name="status" id="status1"
                                        value="Active" th:checked="${selectedStatus == 'Active'}"
                                        onchange="this.form.submit()">
                                    <label class="form-check-label text-muted" for="status1">Sẵn sàng (Còn sách)</label>
                                </div>
                                <div class="form-check mb-1">
                                    <input class="form-check-input" type="radio" name="status" id="status2"
                                        value="Inactive" th:checked="${selectedStatus == 'Inactive'}"
                                        onchange="this.form.submit()">
                                    <label class="form-check-label text-muted" for="status2">Không có sẵn</label>
                                </div>
                            </div>

                            <!-- Button Lọc -->
                            <button type="submit" class="btn btn-classic w-100 rounded-pill fw-bold py-2 shadow-sm u-font-family-playfair-display-serif-53670465"
                               >Áp dụng bộ lọc</button>
                        </div>
                    </form>
                </div>

                <!-- Book Grid (Right) -->
                <div class="col-lg-9 col-md-8">
                    <!-- Compact Search Bar (Shopee Style) -->
                    <div class="mb-4 position-relative" id="booksSearchContainer">
                        <form action="/books" method="GET" class="input-group shadow-sm guest-books-form-position-z-index-border-radius-08">
                            <input type="hidden" name="genreId" th:if="${selectedGenreId != null}" th:value="${selectedGenreId}">
                            <input type="hidden" name="status" th:if="${selectedStatus != null}" th:value="${selectedStatus}">
                            <input type="hidden" name="sort" th:if="${sort != null}" th:value="${sort}">
                            <span class="input-group-text bg-white border-0 u-color-8b5a2b-93ece783"><i class="bi bi-search"></i></span>
                            <input type="text" id="booksSearchInput" name="keyword" th:value="${keyword}"
                                class="form-control border-0 py-2" placeholder="Tìm kiếm trong danh mục..." autocomplete="off">
                            <button class="btn px-4 fw-bold guest-books-button-background-color-border-09" type="submit">TÌM</button>
                        </form>

                        <!-- Dropdown Overlay -->
                        <div id="booksSearchDropdown" class="dropdown-menu w-100 shadow border-0 mt-1 p-0 guest-books-div-border-radius-display-position-10">
                            <div id="booksLiveSearchSuggestions" class="bg-white">
                                <div class="list-group list-group-flush" id="booksSuggestionList">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- JS for Compact Live Search -->
                    <script>
                        document.addEventListener("DOMContentLoaded", function() {
                            const searchInput = document.getElementById('booksSearchInput');
                            const searchDropdown = document.getElementById('booksSearchDropdown');
                            const suggestionList = document.getElementById('booksSuggestionList');
                            let timeoutId;

                            document.addEventListener('click', function(e) {
                                if (!document.getElementById('booksSearchContainer').contains(e.target)) {
                                    searchDropdown.style.display = 'none';
                                }
                            });

                            searchInput.addEventListener('input', function() {
                                const keyword = this.value.trim();
                                if (keyword === '') {
                                    searchDropdown.style.display = 'none';
                                    return;
                                }

                                searchDropdown.style.display = 'block';
                                clearTimeout(timeoutId);
                                suggestionList.innerHTML = '<div class="p-2 text-center text-muted small"><div class="spinner-border spinner-border-sm me-2" role="status"></div> Đang tìm...</div>';

                                timeoutId = setTimeout(() => {
                                    fetch('/api/books/search/suggest?keyword=' + encodeURIComponent(keyword))
                                        .then(response => response.json())
                                        .then(data => {
                                            suggestionList.innerHTML = '';
                                            if (data.length === 0) {
                                                suggestionList.innerHTML = '<div class="p-2 text-center text-muted small">Không tìm thấy sách.</div>';
                                                return;
                                            }
                                            data.forEach(book => {
                                                const item = document.createElement('a');
                                                item.href = '/books/' + book.bookId;
                                                item.className = 'list-group-item list-group-item-action d-flex align-items-center border-0 py-2 px-2 suggestion-item';
                                                item.innerHTML = `
                                                    <img src="${book.thumbnailUrl}" class="rounded me-2 shadow-sm guest-books-img-width-height-fit-11"
                                                        onerror="this.onerror=null;this.src='/images/book-cover-placeholder.svg'">
                                                    <div class="flex-grow-1 overflow-hidden">
                                                        <h6 class="mb-0 text-truncate fw-bold guest-books-h6-color-font-size-12">${book.title}</h6>
                                                        <small class="text-muted text-truncate d-block u-font-size-0-75rem-8b511f07">${book.authorName}</small>
                                                    </div>
                                                `;
                                                item.addEventListener('mouseenter', function() { this.style.backgroundColor = '#f8f9fa'; });
                                                item.addEventListener('mouseleave', function() { this.style.backgroundColor = 'transparent'; });
                                                suggestionList.appendChild(item);
                                            });
                                        });
                                }, 300);
                            });
                        });
                    </script>

                    <!-- Advanced Status Bar -->
                    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 p-3 rounded-3 shadow-sm guest-books-div-background-border-14"
                       >
                        <div class="d-flex align-items-center mb-2 mb-md-0">
                            <span class="text-muted me-3">Đang hiển thị <strong class="u-color-4a3b32-1ba01220"
                                    th:text="${bookPage != null ? bookPage.totalElements : 0}">0</strong> kết quả</span>

                        </div>
                        <div class="d-flex align-items-center">
                            <label class="text-muted small me-2 text-nowrap mb-0">Sắp xếp theo:</label>
                            <select class="form-select form-select-sm fw-medium rounded-pill px-3 guest-books-select-min-width-background-border-15"

                                onchange="document.getElementById('hiddenSort').value = this.value; document.getElementById('filterForm').submit();">
                                <option value="newest" th:selected="${sort == 'newest' || sort == null}">Mới nhất
                                </option>
                                <option value="oldest" th:selected="${sort == 'oldest'}">Cũ nhất</option>
                                <option value="title_asc" th:selected="${sort == 'title_asc'}">Tên: A - Z</option>
                                <option value="title_desc" th:selected="${sort == 'title_desc'}">Tên: Z - A</option>
                            </select>
                        </div>
                    </div>

                    <!-- Lưới hiển thị Sách (3 cột vì Sidebar chiếm diện tích) -->
                    <div class="row g-4" th:if="${bookPage != null && !bookPage.isEmpty()}">

                        <!-- Lặp qua từng cuốn sách trong Page -->
                        <div class="col-lg-4 col-md-6 col-sm-6" th:each="book : ${bookPage.content}">
                            <div class="card book-card h-100 border-0 shadow-sm position-relative guest-books-div-border-radius-cursor-16"

                                th:onclick="'window.location.href=\'/books/' + ${book.bookId} + '\''">
                                <!-- Hover Overlay Container -->
                                <div class="position-relative overflow-hidden guest-books-div-border-radius-height-background-17"
                                   >
                                    <img th:src="${book.coverImageUrl != null and !#strings.isEmpty(book.coverImageUrl) ? book.coverImageUrl : 'https://picsum.photos/seed/' + book.bookId + '/600/800'}"
                                        class="guest-books-cover-backdrop" alt="" aria-hidden="true"
                                        onerror="this.onerror=null;this.src='/images/book-cover-placeholder.svg'">
                                    <img th:src="${book.coverImageUrl != null and !#strings.isEmpty(book.coverImageUrl) ? book.coverImageUrl : 'https://picsum.photos/seed/' + book.bookId + '/600/800'}"
                                        class="guest-books-cover-image" th:alt="${'Bìa sách ' + book.title}"
                                        onerror="this.onerror=null;this.src='/images/book-cover-placeholder.svg'">

                                </div>

                                <div class="card-body p-3 d-flex flex-column">
                                    <!-- Thể loại -->
                                    <span class="text-uppercase fw-bold mb-2 guest-books-span-font-size-color-letter-spacing-21"

                                        th:text="${book.genre != null ? book.genre.genreName : 'Chưa phân loại'}">THỂ
                                        LOẠI</span>

                                    <h5 class="card-title fw-bold mb-1 guest-books-h5-color-font-size-display-22"

                                        th:text="${book.title}">Tên cuốn sách</h5>

                                    <!-- Tác giả -->
                                    <p class="text-muted small mb-3">
                                        <i class="bi bi-pen me-1"></i>
                                        <span th:if="${book.authors != null && !book.authors.isEmpty()}"
                                            th:text="${book.authors.iterator().next().authorName}">Tên tác giả</span>
                                        <span th:unless="${book.authors != null && !book.authors.isEmpty()}">Nhiều tác
                                            giả</span>
                                    </p>

                                    <div
                                        class="mt-auto d-flex justify-content-between align-items-center pt-2 border-top">
                                        <div class="text-warning small fw-bold">
                                            <i class="bi bi-star-fill"></i> 4.8
                                        </div>
                                        <small class="text-muted font-monospace" th:text="${'ID: ' + book.isbn}">ID:
                                            000</small>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- Pagination below grid -->
                    <nav class="mt-5 mb-5" th:if="${bookPage != null && bookPage.totalPages > 1}"
                        th:with="startPage=${bookPage.totalPages <= 10 ? 0 : (bookPage.number < 9 ? 0 : (bookPage.number - 8 > bookPage.totalPages - 10 ? bookPage.totalPages - 10 : bookPage.number - 8))}, endPage=${startPage + 9 < bookPage.totalPages ? startPage + 9 : bookPage.totalPages - 1}">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${bookPage.first ? 'disabled' : ''}">
                                <a class="page-link page-link-classic border-0 shadow-sm rounded-pill mx-1 px-3 py-2 text-dark"
                                    th:href="@{/books(page=0, keyword=${keyword}, genreId=${selectedGenreId}, status=${selectedStatus}, sort=${sort})}">
                                    Đầu
                                </a>
                            </li>
                            <li class="page-item" th:classappend="${bookPage.first ? 'disabled' : ''}">
                                <a class="page-link page-link-classic border-0 shadow-sm rounded-circle mx-1 px-3 py-2 text-dark"
                                    th:href="@{/books(page=${bookPage.number - 1}, keyword=${keyword}, genreId=${selectedGenreId}, status=${selectedStatus}, sort=${sort})}">
                                    <i class="bi bi-chevron-left"></i>
                                </a>
                            </li>
                            <li class="page-item disabled" th:if="${startPage > 0}">
                                <span class="page-link page-link-classic border-0 bg-transparent px-2 py-2">…</span>
                            </li>
                            <li class="page-item" th:each="pageNum : ${#numbers.sequence(startPage, endPage)}">
                                <a class="page-link page-link-classic border-0 shadow-sm rounded-circle mx-1 px-3 py-2"
                                    th:classappend="${pageNum == bookPage.number ? 'bg-primary text-white fw-bold' : 'text-dark'}"
                                    th:href="@{/books(page=${pageNum}, keyword=${keyword}, genreId=${selectedGenreId}, status=${selectedStatus}, sort=${sort})}"
                                    th:text="${pageNum + 1}">1</a>
                            </li>
                            <li class="page-item disabled" th:if="${endPage < bookPage.totalPages - 1}">
                                <span class="page-link page-link-classic border-0 bg-transparent px-2 py-2">…</span>
                            </li>
                            <li class="page-item" th:classappend="${bookPage.last ? 'disabled' : ''}">
                                <a class="page-link page-link-classic border-0 shadow-sm rounded-circle mx-1 px-3 py-2 text-dark"
                                    th:href="@{/books(page=${bookPage.number + 1}, keyword=${keyword}, genreId=${selectedGenreId}, status=${selectedStatus}, sort=${sort})}">
                                    <i class="bi bi-chevron-right"></i>
                                </a>
                            </li>
                            <li class="page-item" th:classappend="${bookPage.last ? 'disabled' : ''}">
                                <a class="page-link page-link-classic border-0 shadow-sm rounded-pill mx-1 px-3 py-2 text-dark"
                                    th:href="@{/books(page=${bookPage.totalPages - 1}, keyword=${keyword}, genreId=${selectedGenreId}, status=${selectedStatus}, sort=${sort})}">
                                    Cuối
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>

            <!-- Modals removed as per user request to navigate to detail page instead -->

            <!-- Add CSS for overlay hover -->

        </div>
    </div>
    </div>
</body>

</html>
