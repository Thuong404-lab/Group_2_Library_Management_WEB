<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE - Admin">Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet" th:href="@{/css/components/dynamic-states.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layouts/admin-base.css}" />
      <link rel="stylesheet" th:href="@{/css/utilities.css}" />
  </head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a th:href="@{/admin/dashboard}" class="sidebar-brand">
                <i class="bi bi-book-half u-color-dcb38a-c310609e"></i>
                <span class="menu-text">LMW Admin</span>
            </a>
        </div>
        <ul class="sidebar-menu">
            <li class="menu-item">
                <a th:href="@{/admin/dashboard}" class="menu-link"
                    th:classappend="${activeMenu == 'dashboard'} ? 'active'">
                    <i class="bi bi-grid-1x2-fill menu-icon"></i>
                    <span class="menu-text">Tổng quan</span>
                </a>
            </li>

            <li class="menu-item">
                <a href="#adminUserManagementMenu" data-bs-toggle="collapse"
                    class="menu-link u-display-flex-justify-content-space-between-align-items-center-3490dbc8"
                    th:classappend="${activeMenu == 'accounts' || activeMenu == 'staff'} ? 'active'"
                    th:attr="aria-expanded=${activeMenu == 'accounts' || activeMenu == 'staff'}"
                    aria-controls="adminUserManagementMenu">
                    <span class="d-flex align-items-center">
                        <i class="bi bi-people-fill menu-icon"></i>
                        <span class="menu-text">Quản lý người dùng</span>
                    </span>
                    <i class="bi bi-chevron-down ms-auto menu-text u-font-size-0-75rem-8b511f07"></i>
                </a>
                <ul class="collapse list-unstyled ps-4 mb-0" id="adminUserManagementMenu"
                    th:classappend="${activeMenu == 'accounts' || activeMenu == 'staff'} ? 'show'">
                    <li class="menu-item my-1">
                        <a th:href="@{/admin/accounts}" class="menu-link py-2"
                            th:classappend="${activeMenu == 'accounts'} ? 'active-submenu'">
                            <span class="menu-text">Danh sách thành viên</span>
                        </a>
                    </li>
                    <li class="menu-item my-1">
                        <a th:href="@{/admin/staff}" class="menu-link py-2"
                            th:classappend="${activeMenu == 'staff'} ? 'active-submenu'">
                            <span class="menu-text">Danh sách nhân sự</span>
                        </a>
                    </li>
                </ul>
            </li>

            <li class="menu-item">
                <a th:href="@{/admin/books}" class="menu-link" th:classappend="${activeMenu == 'books'} ? 'active'">
                    <i class="bi bi-book-half menu-icon"></i>
                    <span class="menu-text">Sách</span>
                </a>
            </li>

            <li class="menu-item">
                <a th:href="@{/admin/reports}" class="menu-link" th:classappend="${activeMenu == 'reports'} ? 'active'">
                    <i class="bi bi-bar-chart-fill menu-icon"></i>
                    <span class="menu-text">Báo cáo</span>
                </a>
            </li>

            <li class="menu-item">
                <a th:href="@{/admin/payments}" class="menu-link" th:classappend="${activeMenu == 'payments'} ? 'active'">
                    <i class="bi bi-credit-card-2-front-fill menu-icon"></i>
                    <span class="menu-text">Thanh toán online</span>
                </a>
            </li>

            <li class="menu-item">
                <a th:href="@{/admin/system/logs}" class="menu-link"
                    th:classappend="${activeMenu == 'logs'} ? 'active'">
                    <i class="bi bi-journal-text menu-icon"></i>
                    <span class="menu-text">Nhật ký hệ thống</span>
                </a>
            </li>

            <li class="menu-item">
                <a href="#settingsMenu" data-bs-toggle="collapse" class="menu-link u-display-flex-justify-content-space-between-align-items-center-3490dbc8"
                    th:classappend="${activeMenu == 'settings' || activeMenu == 'tiers'} ? 'active'"
                   >
                    <span>
                        <i class="bi bi-gear-fill menu-icon"></i>
                        <span class="menu-text">Cài đặt</span>
                    </span>
                    <i class="bi bi-chevron-down menu-text u-font-size-0-75rem-8b511f07"></i>
                </a>
                <ul class="collapse list-unstyled mb-0" id="settingsMenu"
                    th:classappend="${activeMenu == 'settings' || activeMenu == 'tiers'} ? 'show'">
                    <li>
                        <a th:href="@{/admin/settings}" class="menu-link"
                            th:classappend="${activeMenu == 'settings'} ? 'active-submenu'">
                            <span class="menu-text">Cấu hình hệ thống</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/admin/tiers}" class="menu-link"
                            th:classappend="${activeMenu == 'tiers'} ? 'active-submenu'">
                            <span class="menu-text">Hạng thành viên</span>
                        </a>
                    </li>
                </ul>
            </li>
        </ul>
    </aside>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- Topbar -->
        <header class="topbar">
            <div>
                <button class="toggle-btn" id="sidebarToggle">
                    <i class="bi bi-list"></i>
                </button>
            </div>

            <div class="topbar-right">
                <details class="dropdown admin-user-dropdown">
                    <summary class="user-dropdown-toggle">
                        <div class="user-avatar p-0 overflow-hidden u-border-2px-solid-8b5a2b-2bf825ad"
                             th:with="principalAvatar=${#authentication.principal.getClass().getName() == 'com.lms.config.CustomUserDetails' ? #authentication.principal.user?.avatar : null}">
                            <i th:if="${principalAvatar == null}" class="bi bi-person w-100 h-100 d-flex align-items-center justify-content-center m-0 u-background-color-8b5a2b-color-white-2f93b67b"></i>
                            <img th:if="${principalAvatar != null}" th:src="${principalAvatar}" class="w-100 h-100 m-0 p-0 u-object-fit-cover-fd3ff4b2">
                        </div>
                        <span sec:authorize="isAuthenticated()" sec:authentication="name">Admin</span>
                        <i class="bi bi-chevron-down ms-1 u-font-size-0-8rem-color-8b5a2b-39ce8ef8"></i>
                    </summary>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 admin-base-ul-border-right-left-08"
                       >
                        <li><a class="dropdown-item py-2" th:href="@{/admin/profile}"><i
                                    class="bi bi-person-circle me-2 text-classic"></i>Hồ sơ cá nhân</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item py-2 text-danger" th:href="@{/staff-logout}"><i
                                    class="bi bi-box-arrow-right me-2"></i>Đăng xuất</a></li>
                    </ul>
                </details>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div class="content-area">
            <div layout:fragment="content"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script>
        document.getElementById('sidebarToggle').addEventListener('click', function () {
            document.body.classList.toggle('sidebar-collapsed');
        });
    </script>
    <script th:src="@{/js/dynamic-presentation.js}"></script>
</body>

</html>
