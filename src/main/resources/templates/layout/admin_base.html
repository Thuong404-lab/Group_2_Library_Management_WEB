<!DOCTYPE html>
<html th:lang="${#locale.language}" th:data-confirm-title="#{common.confirmAction}" th:data-confirm-subtitle="#{common.confirmSubtitle}" th:data-confirm-information="#{common.information}" th:data-confirm-cancel="#{common.back}" th:data-confirm-message="#{common.confirmQuestion}" th:data-confirm-action="#{common.confirm}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE" th:text="#{layout.admin.title}">Admin</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <link rel="stylesheet" th:href="@{/css/components/dynamic-states.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/layouts/admin-base.css}" />
    <link rel="stylesheet" th:href="@{/css/components/header.css}" />
    <link rel="stylesheet" th:href="@{/css/components/sidebar.css}" />
    <link rel="stylesheet" th:href="@{/css/components/language-switcher.css}" />
    <link rel="stylesheet" th:href="@{/css/components/confirmation-dialog.css}" />
    <link rel="stylesheet" th:href="@{/css/utilities.css}" />
    <th:block layout:fragment="styles"></th:block>
  </head>

<body class="app-shell app-shell--staff staff-shell staff-shell--admin">

    <!-- Sidebar -->
    <aside class="sidebar staff-sidebar" id="sidebar" th:aria-label="#{staff.sidebar.navigation}">
        <div class="sidebar-header">
            <a th:href="@{/admin/dashboard}" class="sidebar-brand">
                <i class="bi bi-book-half"></i>
                <span class="menu-text" th:text="#{staff.brand.admin}">LMW Admin</span>
            </a>
        </div>
        <ul class="sidebar-menu">
            <li class="menu-item">
                <a th:href="@{/admin/dashboard}" class="menu-link"
                    th:classappend="${activeMenu == 'dashboard'} ? 'active'">
                    <i class="bi bi-grid-1x2-fill menu-icon"></i>
                    <span class="menu-text" th:text="#{staff.nav.dashboard}">Dashboard</span>
                </a>
            </li>

            <li class="menu-item">
                <a href="#adminUserManagementMenu" data-bs-toggle="collapse"
                    class="menu-link u-display-flex-justify-content-space-between-align-items-center-3490dbc8"
                    th:classappend="${activeMenu == 'accounts' || activeMenu == 'staff'} ? 'active'"
                    th:attr="aria-expanded=${activeMenu == 'accounts' || activeMenu == 'staff'}"
                    aria-controls="adminUserManagementMenu">
                    <span class="d-flex align-items-center">
                        <i class="bi bi-people-fill menu-icon"></i>
                    <span class="menu-text" th:text="#{staff.nav.users}">User Management</span>
                    </span>
                    <i class="bi bi-chevron-down ms-auto menu-text u-font-size-0-75rem-8b511f07"></i>
                </a>
                <ul class="collapse list-unstyled mb-0" id="adminUserManagementMenu"
                    th:classappend="${activeMenu == 'accounts' || activeMenu == 'staff'} ? 'show'">
                    <li class="menu-item my-1">
                        <a th:href="@{/admin/accounts}" class="menu-link py-2"
                            th:classappend="${activeMenu == 'accounts'} ? 'active-submenu'">
                            <span class="menu-text" th:text="#{staff.nav.members}">Member List</span>
                        </a>
                    </li>
                    <li class="menu-item my-1">
                        <a th:href="@{/admin/staff}" class="menu-link py-2"
                            th:classappend="${activeMenu == 'staff'} ? 'active-submenu'">
                            <span class="menu-text" th:text="#{admin.nav.staff}">Staff List</span>
                        </a>
                    </li>
                </ul>
            </li>

            <li class="menu-item">
                <a th:href="@{/admin/books}" class="menu-link" th:classappend="${activeMenu == 'books'} ? 'active'">
                    <i class="bi bi-book-half menu-icon"></i>
                    <span class="menu-text" th:text="#{admin.nav.books}">Books</span>
                </a>
            </li>

            <li class="menu-item">
                <a th:href="@{/admin/reports}" class="menu-link" th:classappend="${activeMenu == 'reports'} ? 'active'">
                    <i class="bi bi-bar-chart-fill menu-icon"></i>
                    <span class="menu-text" th:text="#{admin.nav.reports}">Reports</span>
                </a>
            </li>

            <li class="menu-item">
                <a th:href="@{/admin/payments}" class="menu-link" th:classappend="${activeMenu == 'payments'} ? 'active'">
                    <i class="bi bi-credit-card-2-front-fill menu-icon"></i>
                    <span class="menu-text" th:text="#{admin.nav.onlinePayments}">Online Payments</span>
                </a>
            </li>

            <li class="menu-item">
                <a th:href="@{/admin/system/logs}" class="menu-link"
                    th:classappend="${activeMenu == 'logs'} ? 'active'">
                    <i class="bi bi-journal-text menu-icon"></i>
                    <span class="menu-text" th:text="#{admin.nav.systemLogs}">System Logs</span>
                </a>
            </li>

            <li class="menu-item">
                <a href="#settingsMenu" data-bs-toggle="collapse" class="menu-link u-display-flex-justify-content-space-between-align-items-center-3490dbc8"
                    th:classappend="${activeMenu == 'settings' || activeMenu == 'tiers'} ? 'active'"
                   >
                    <span>
                        <i class="bi bi-gear-fill menu-icon"></i>
                        <span class="menu-text" th:text="#{admin.nav.settings}">Settings</span>
                    </span>
                    <i class="bi bi-chevron-down menu-text u-font-size-0-75rem-8b511f07"></i>
                </a>
                <ul class="collapse list-unstyled mb-0" id="settingsMenu"
                    th:classappend="${activeMenu == 'settings' || activeMenu == 'tiers'} ? 'show'">
                    <li>
                        <a th:href="@{/admin/settings}" class="menu-link"
                            th:classappend="${activeMenu == 'settings'} ? 'active-submenu'">
                            <span class="menu-text" th:text="#{admin.nav.systemSettings}">System Configuration</span>
                        </a>
                    </li>
                    <li>
                        <a th:href="@{/admin/tiers}" class="menu-link"
                            th:classappend="${activeMenu == 'tiers'} ? 'active-submenu'">
                            <span class="menu-text" th:text="#{admin.nav.membershipTiers}">Membership Tiers</span>
                        </a>
                    </li>
                </ul>
            </li>
        </ul>
    </aside>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- Topbar -->
        <header class="topbar staff-topbar">
            <div>
                <button class="toggle-btn" id="sidebarToggle" type="button"
                        aria-controls="sidebar" aria-expanded="true"
                        th:aria-label="#{staff.sidebar.toggle}">
                    <i class="bi bi-list" aria-hidden="true"></i>
                </button>
            </div>

            <div class="topbar-right">
                <div th:replace="~{fragments/language-switcher :: switcher}"></div>
                <div class="dropdown admin-user-dropdown staff-user-dropdown">
                    <button type="button" class="user-dropdown-toggle staff-user-dropdown-toggle"
                            data-bs-toggle="dropdown" aria-expanded="false"
                            th:aria-label="#{staff.user.menu}">
                        <div class="user-avatar p-0 overflow-hidden u-border-2px-solid-8b5a2b-2bf825ad"
                             th:with="principalAvatar=${#authentication.principal instanceof T(com.lms.config.CustomUserDetails) ? #authentication.principal.user?.avatar : null}">
                            <i th:if="${principalAvatar == null}" class="bi bi-person w-100 h-100 d-flex align-items-center justify-content-center m-0 u-background-color-8b5a2b-color-white-2f93b67b"></i>
                            <img th:if="${principalAvatar != null}" th:src="${principalAvatar}"
                                 th:alt="#{common.profile}" class="w-100 h-100 m-0 p-0 u-object-fit-cover-fd3ff4b2">
                        </div>
                        <span class="staff-user-name" sec:authorize="isAuthenticated()" sec:authentication="name">Admin</span>
                        <i class="bi bi-chevron-down ms-1 u-font-size-0-8rem-color-8b5a2b-39ce8ef8" aria-hidden="true"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 admin-base-ul-border-right-left-08"
                       >
                        <li><a class="dropdown-item py-2" th:href="@{/admin/profile}"><i
                                    class="bi bi-person-circle me-2 text-classic"></i><span th:text="#{common.profile}">Profile</span></a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item py-2 text-danger" th:href="@{/staff-logout}"><i
                                    class="bi bi-box-arrow-right me-2"></i><span th:text="#{nav.logout}">Log out</span></a></li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div class="content-area staff-content-area">
            <div layout:fragment="content"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
    <script th:replace="~{fragments/language-switcher :: script}"></script>
    <script>
        (function () {
            var sidebarToggle = document.getElementById('sidebarToggle');
            if (!sidebarToggle) return;
            sidebarToggle.addEventListener('click', function () {
                var collapsed = document.body.classList.toggle('sidebar-collapsed');
                sidebarToggle.setAttribute('aria-expanded', String(!collapsed));
            });
        })();
    </script>
    <th:block layout:fragment="scripts"></th:block>
    <script th:src="@{/js/dynamic-presentation.js}"></script>
    <script th:src="@{/js/confirmation-dialog.js}"></script>
</body>

</html>
