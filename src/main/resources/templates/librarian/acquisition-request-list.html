<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<main layout:fragment="content">
    <div class="container mt-4">
    <h2 th:text="#{librarian.acquisition.title}">Book Acquisition Requests</h2>
        <hr>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th th:text="#{common.code}">Code</th>
                <th th:text="#{book.title}">Book Title</th>
                <th th:text="#{librarian.acquisition.requester}">Requested By</th>
                <th th:text="#{librarian.acquisition.date}">Request Date</th>
                <th th:text="#{book.author}">Author</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="request : ${requests.content}">
                <td th:text="${request.requestId}">1</td>
                <td th:text="${request.title}">Book title</td>
                <td th:text="${request.member.user.fullName}">Requester</td>
                <td th:text="${#temporals.format(request.createdDate, 'dd/MM/yyyy HH:mm')}">
                <td th:text="${request.author}">Author</td>
                    Ngày đề xuất
                </td>
            </tr>

            <tr th:if="${requests == null || requests.totalElements == 0}">
                <td colspan="5" class="text-center" th:text="#{librarian.acquisition.empty}">There are no book acquisition requests.</td>
            </tr>
            </tbody>
        </table>

        <nav th:if="${requests != null && requests.totalPages > 1}"
             th:with="startPage=${requests.totalPages <= 10 ? 0 : (requests.number < 9 ? 0 : (requests.number - 8 > requests.totalPages - 10 ? requests.totalPages - 10 : requests.number - 8))}, endPage=${startPage + 9 < requests.totalPages ? startPage + 9 : requests.totalPages - 1}">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${requests.first} ? 'disabled'">
                    <a class="page-link page-link-classic"
               th:href="@{/librarian/interaction/acquisition-requests(page=0)}" th:text="#{pagination.first}">First</a>
                </li>
                <li class="page-item" th:classappend="${requests.first} ? 'disabled'">
                    <a class="page-link page-link-classic"
                       th:href="@{/librarian/interaction/acquisition-requests(page=${requests.number - 1})}">
                        &lsaquo;
                    </a>
                </li>

                <li class="page-item disabled" th:if="${startPage > 0}">
                    <span class="page-link page-link-classic">…</span>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
                    th:classappend="${i == requests.number} ? 'active'">
                    <a class="page-link page-link-classic"
                       th:href="@{/librarian/interaction/acquisition-requests(page=${i})}"
                       th:text="${i + 1}">1</a>
                </li>
                <li class="page-item disabled" th:if="${endPage < requests.totalPages - 1}">
                    <span class="page-link page-link-classic">…</span>
                </li>

                <li class="page-item" th:classappend="${requests.last} ? 'disabled'">
                    <a class="page-link page-link-classic"
                       th:href="@{/librarian/interaction/acquisition-requests(page=${requests.number + 1})}">
                        &rsaquo;
                    </a>
                </li>
                <li class="page-item" th:classappend="${requests.last} ? 'disabled'">
                    <a class="page-link page-link-classic"
               th:href="@{/librarian/interaction/acquisition-requests(page=${requests.totalPages - 1})}" th:text="#{pagination.last}">Last</a>
                </li>
            </ul>
        </nav>
    </div>
</main>
</body>
</html>
