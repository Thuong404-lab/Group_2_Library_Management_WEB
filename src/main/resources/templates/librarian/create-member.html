<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/librarian_base}">

<head>
    <title>Tạo tài khoản thành viên</title>
</head>

<body>
<div layout:fragment="content" th:with="activeMenu='members'">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom" style="border-color: rgba(139, 90, 43, 0.2) !important;">
        <div>
            <h2 class="fw-bold mb-1" style="color: #4a3b32; font-family: 'Playfair Display', serif;">
                <a th:href="@{/librarian/members}" class="text-decoration-none me-2" style="color: #8b5a2b;" title="Quay lại danh sách">
                    <i class="bi bi-arrow-left-circle"></i>
                </a>
                Thêm Thành viên Mới
            </h2>
            <div class="text-muted ms-5">Tạo tài khoản thành viên và cấp thẻ thư viện</div>
        </div>
    </div>

    <!-- Alert Messages -->
    <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${error != null}">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}">Lỗi</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card-classic border-0 shadow-sm p-4">
                <form method="post" th:action="@{/librarian/members/create}">
                    <h5 class="fw-bold mb-4" style="color: #4a3b32; font-family: 'Playfair Display', serif;">
                        <i class="bi bi-person-lines-fill me-2 text-classic"></i>Thông tin tài khoản
                    </h5>
                    
                    <div class="row g-4 mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-muted small">Họ tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control bg-light" name="fullName" placeholder="Nhập họ và tên đầy đủ..." required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-muted small">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control bg-light" name="email" placeholder="example@email.com" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-muted small">Số điện thoại</label>
                            <input type="text" class="form-control bg-light" name="phone" placeholder="09xxxxxxxxx">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-muted small">Tên tài khoản (Username) <span class="text-danger">*</span></label>
                            <input type="text" class="form-control bg-light" name="username" placeholder="Nhập username để đăng nhập..." required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-muted small">Mật khẩu <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <input type="password" class="form-control bg-light border-end-0" name="password" id="passwordField" required>
                                <button class="btn btn-light border border-start-0" type="button" onclick="const p=document.getElementById('passwordField'); p.type=p.type==='password'?'text':'password';">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <h5 class="fw-bold mb-4 mt-5" style="color: #4a3b32; font-family: 'Playfair Display', serif;">
                        <i class="bi bi-card-heading me-2 text-classic"></i>Thiết lập Thẻ Thư viện
                    </h5>

                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-muted small">Hạng thành viên <span class="text-danger">*</span></label>
                            <select class="form-select bg-light" name="tierId" required>
                                <option value="" disabled selected>-- Chọn hạng thành viên --</option>
                                <option th:each="tier : ${tiers}" th:value="${tier.tierId}" th:text="${tier.tierName}">
                                    Standard Member
                                </option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold text-muted small">Trạng thái <span class="text-danger">*</span></label>
                            <select class="form-select bg-light" name="status" required>
                                <option value="Active" selected>Active (Kích hoạt ngay)</option>
                                <option value="Inactive">Inactive (Chờ kích hoạt)</option>
                            </select>
                        </div>
                    </div>

                    <hr class="my-5 border-color">

                    <div class="d-flex justify-content-end gap-3">
                        <a class="btn btn-light border px-4" th:href="@{/librarian/members}">Hủy bỏ</a>
                        <button class="btn btn-classic px-5" type="submit">
                            <i class="bi bi-person-check-fill me-2"></i>Tạo tài khoản
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
