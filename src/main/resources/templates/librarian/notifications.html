<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/librarian_base}">
<head>
    <title>Thông báo</title>
</head>
<body>
<div layout:fragment="content" th:with="activeMenu='notifications'">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom" style="border-color: rgba(139, 90, 43, 0.2) !important;">
        <div>
            <h2 class="fw-bold mb-1" style="color: #4a3b32; font-family: 'Playfair Display', serif;">Trung tâm Thông báo</h2>
            <div class="text-muted">Các thông báo và cập nhật mới nhất từ hệ thống</div>
        </div>
    </div>
    
    <div class="card-classic border-0 shadow-sm p-5 text-center">
        <i class="bi bi-bell-slash fs-1 text-muted mb-3 d-block opacity-50"></i>
        <h4 class="fw-bold" style="color: #4a3b32;">Không có thông báo mới</h4>
        <p class="text-muted">Bạn đã đọc hết tất cả các thông báo.</p>
    </div>
</div>
</body>
</html>
