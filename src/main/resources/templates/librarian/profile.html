<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/librarian_base}">

<head>
    <title th:text="#{librarian.profile.title}">Profile - Librarian</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/pages/librarian/profile.css}" />
  </head>

<body>
<div layout:fragment="content" th:with="activeMenu='profile'" class="container mt-4 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom u-border-color-rgba-139-90-43-0-2-important-f8e732ba">
        <div>
            <h2 class="fw-bold mb-1 page-title"><i class="bi bi-person-badge-fill me-2 u-color-8b5a2b-93ece783"></i><span th:text="#{librarian.profile.heading}">Profile</span></h2>
            <div class="text-muted small" th:text="#{librarian.profile.description}">Manage account information and security.</div>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-3 d-flex justify-content-between align-items-center u-background-color-f0fff4-color-2f855a-85044379" role="alert">
        <div><i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span></div>
        <button type="button" class="btn-close shadow-none u-color-2f855a-filter-invert-37-sepia-43-saturate-518-hue-rotate-97deg-bri-7c7e29e2" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-3 d-flex justify-content-between align-items-center u-background-color-fff5f5-color-c53030-0e7ed3fe" role="alert">
        <div><i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span></div>
        <button type="button" class="btn-close shadow-none u-color-c53030-filter-invert-24-sepia-74-saturate-3015-hue-rotate-338deg-b-a0fc36f1" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${passwordSuccess}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-3 d-flex justify-content-between align-items-center u-background-color-f0fff4-color-2f855a-85044379" role="alert">
        <div><i class="bi bi-shield-check me-2"></i><span th:text="${passwordSuccess}"></span></div>
        <button type="button" class="btn-close shadow-none u-color-2f855a-filter-invert-37-sepia-43-saturate-518-hue-rotate-97deg-bri-7c7e29e2" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${passwordError}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-3 d-flex justify-content-between align-items-center u-background-color-fff5f5-color-c53030-0e7ed3fe" role="alert">
        <div><i class="bi bi-shield-x me-2"></i><span th:text="${passwordError}"></span></div>
        <button type="button" class="btn-close shadow-none u-color-c53030-filter-invert-24-sepia-74-saturate-3015-hue-rotate-338deg-b-a0fc36f1" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="row g-4">

        <div class="col-lg-4">
            <div class="card card-profile-classic mb-4">
                <div class="card-body text-center p-4 u-background-color-fdfbf7-71083b05">

                    <div class="avatar-container-classic mb-3">
                        <div th:if="${librarian?.avatar == null}" id="avatarPlaceholder" class="rounded-circle d-flex align-items-center justify-content-center text-white shadow w-100 h-100 u-background-color-8b5a2b-font-size-3rem-font-family-playfair-display-seri-21f7ac93"

                             th:text="${librarian != null ? #strings.substring(librarian.fullName, 0, 1).toUpperCase() : 'L'}">L</div>

                        <img th:if="${librarian?.avatar != null}" id="avatarPreview" th:src="${librarian.avatar}" class="rounded-circle border border-3 border-white shadow w-100 h-100 u-object-fit-cover-fd3ff4b2">
                        <img th:if="${librarian?.avatar == null}" id="avatarPreview" src="" class="rounded-circle border border-3 border-white shadow d-none w-100 h-100 u-object-fit-cover-fd3ff4b2">

                        <label for="avatarUploadLibrarian" class="btn btn-camera-classic rounded-circle d-flex align-items-center justify-content-center m-0 shadow-sm" th:title="#{member.profile.changeAvatar}">
                            <i class="bi bi-camera-fill u-font-size-0-85rem-4908cb0a"></i>
                        </label>
                    </div>

                    <h4 class="fw-bold mb-1 font-playfair mt-3 u-color-2c1e16-5ab7ae80" th:text="${librarian?.fullName}">Librarian</h4>
                    <p class="text-muted small mb-3" th:text="${librarian?.email}">lib01@library.vn</p>

                    <div class="d-flex justify-content-center gap-2 mb-2">
                        <span class="badge badge-classic-status text-uppercase font-playfair fw-bold u-letter-spacing-0-3px-dd9ff5a5"><i class="bi bi-patch-check-fill me-1"></i>Official Staff</span>
                    </div>
                </div>
            </div>

            <div class="card card-profile-classic">
                <div class="card-body p-4 u-background-color-fdfbf7-71083b05">
                    <h6 class="fw-bold mb-3 font-playfair u-color-4a3b32-1ba01220" th:text="#{member.profile.security}">Account Security</h6>
                    <button class="btn btn-classic-outline w-100 fw-bold" data-bs-toggle="modal" data-bs-target="#changePasswordModal" th:text="#{member.profile.changePassword}">Change Password</button>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card card-profile-classic h-100">
                <div class="card-header-classic px-4">
                    <h5 class="fw-bold mb-0 font-playfair u-color-4a3b32-1ba01220" th:text="#{member.profile.details}">Account Details</h5>
                </div>
                <div class="card-body-classic">
                    <form id="profileForm" th:action="@{/librarian/profile/update}" method="post" enctype="multipart/form-data" class="m-0 needs-validation" novalidate>
                        <input type="file" id="avatarUploadLibrarian" name="avatarFile" accept="image/*" class="d-none">
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.fullName}">Full Name</label>
                                <input type="text" name="fullName" class="form-control form-control-classic py-2" th:classappend="${fullNameError} ? 'is-invalid' : ''" th:value="${librarian?.fullName}" minlength="2" maxlength="50" required th:data-msg-required="#{validation.fullNameRequired}" th:data-msg-length="#{validation.fullNameMax}">
                                <div class="invalid-feedback" th:text="${fullNameError != null ? fullNameError : #messages.msg('validation.fullNameRequired')}">Please enter a valid full name.</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.email}">Email Address</label>
                                <input type="email" name="email" class="form-control form-control-classic py-2 bg-light text-muted" th:classappend="${emailError} ? 'is-invalid' : ''" th:value="${librarian?.email}" required th:data-msg-required="#{validation.emailRequired}" th:data-msg-type="#{validation.email}" readonly>
                                <div class="invalid-feedback" th:text="${emailError != null ? emailError : #messages.msg('validation.emailRequired')}">Please enter a valid email.</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.phone}">Phone Number</label>
                                <input type="tel" name="phone" class="form-control form-control-classic py-2" th:classappend="${phoneError} ? 'is-invalid' : ''" th:value="${librarian?.phone}" pattern="^(0|\+84)(3[2-9]|5[2689]|7[06-9]|8[1-9]|9[0-46-9])\d{7}$" required th:data-msg-required="#{validation.phoneRequired}" th:data-msg-pattern="#{backend.profile.phoneFormat}">
                                <div class="invalid-feedback" th:text="${phoneError != null ? phoneError : #messages.msg('validation.phoneRequired')}">Please enter a valid phone number.</div>
                            </div>

                            <div class="col-12 mt-3 text-end">
                                <button type="submit" class="btn btn-classic-primary fw-bold px-4 shadow-sm" th:text="#{member.profile.save}">Save Changes</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content modal-content-classic shadow-lg">
                    <div class="modal-header modal-header-classic d-flex justify-content-between align-items-center">
                        <h5 class="modal-title fw-bold font-playfair mb-0 u-color-4a3b32-1ba01220" th:text="#{librarian.profile.passwordTitle}">Change Staff Account Password</h5>
                        <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="changePasswordForm" th:action="@{/librarian/profile/change-password}" method="post" class="m-0 needs-validation" novalidate>
                        <div class="modal-body p-4 u-background-color-fdfbf7-71083b05">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.currentPassword}">Current Password</label>
                                <input type="password" name="oldPassword" class="form-control form-control-classic py-2" th:placeholder="#{librarian.profile.currentPasswordPlaceholder}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.newPassword}">New Password</label>
                                <input type="password" name="newPassword" class="form-control form-control-classic py-2" th:placeholder="#{librarian.profile.passwordHint}" minlength="6" maxlength="50" pattern="^\S+$" th:title="#{validation.passwordNoSpaces}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.confirmPassword}">Confirm New Password</label>
                                <input type="password" name="confirmPassword" class="form-control form-control-classic py-2" th:placeholder="#{member.profile.confirmPassword}" minlength="6" maxlength="50" pattern="^\S+$" th:title="#{validation.passwordNoSpaces}" required>
                            </div>
                        </div>
                        <div class="modal-footer border-0 p-3 u-background-color-fdfbf7-71083b05">
                            <button type="button" class="btn btn-sm fw-bold px-3 py-2 u-background-color-e2e8f0-color-4a3b32-border-radius-6px-33d529ee" data-bs-dismiss="modal" th:text="#{common.cancel}">Cancel</button>
                            <button type="submit" class="btn btn-classic-primary fw-bold px-4 shadow-sm" th:text="#{member.profile.updatePassword}">Update Password</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const fileInput = document.getElementById('avatarUploadLibrarian');
        const avatarPreview = document.getElementById('avatarPreview');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');

        if(fileInput) {
            fileInput.addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        if(avatarPlaceholder) avatarPlaceholder.classList.add('d-none');
                        if(avatarPreview) {
                            avatarPreview.src = e.target.result;
                            avatarPreview.classList.remove('d-none');
                        }
                    }
                    reader.readAsDataURL(file);
                }
            });
        }

        const profileForm = document.getElementById('profileForm');
        if (profileForm) {
            profileForm.addEventListener('submit', function(event) {
                profileForm.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
                if (!profileForm.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                    
                    profileForm.querySelectorAll('input').forEach(input => {
                        const feedback = input.nextElementSibling;
                        if (feedback && feedback.classList.contains('invalid-feedback')) {
                            if (input.validity.valueMissing && input.dataset.msgRequired) {
                                feedback.textContent = input.dataset.msgRequired;
                            } else if (input.validity.patternMismatch && input.dataset.msgPattern) {
                                feedback.textContent = input.dataset.msgPattern;
                            } else if (input.validity.typeMismatch && input.dataset.msgType) {
                                feedback.textContent = input.dataset.msgType;
                            } else if (input.validity.tooShort || input.validity.tooLong) {
                                if (input.dataset.msgLength) feedback.textContent = input.dataset.msgLength;
                            }
                        }
                    });
                }
                profileForm.classList.add('was-validated');
            });
        }

        const changePasswordForm = document.getElementById('changePasswordForm');
        if (changePasswordForm) {
            changePasswordForm.addEventListener('submit', function(event) {
                const newPass = document.querySelector('input[name="newPassword"]').value;
                const confirmPass = document.querySelector('input[name="confirmPassword"]').value;
                const confirmInput = document.querySelector('input[name="confirmPassword"]');
                let isValid = changePasswordForm.checkValidity();
                
                if (newPass !== confirmPass) {
                    confirmInput.setCustomValidity("Passwords do not match");
                    isValid = false;
                } else {
                    confirmInput.setCustomValidity("");
                }
                
                if (!isValid) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                changePasswordForm.classList.add('was-validated');
            });
        }
    });
</script>

</body>
</html>
