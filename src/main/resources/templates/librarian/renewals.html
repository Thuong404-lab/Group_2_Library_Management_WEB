<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/librarian_base}">

<head>
    <title>Quản lý Gia hạn sách</title>
</head>

<body>
<div layout:fragment="content" th:with="activeMenu='borrow-desk'">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom" style="border-color: rgba(139, 90, 43, 0.2) !important;">
        <div>
            <h2 class="fw-bold mb-1" style="color: #4a3b32; font-family: 'Playfair Display', serif;">Quản lý Gia hạn Sách</h2>
            <div class="text-muted">Phê duyệt hoặc từ chối các yêu cầu gia hạn mượn sách từ độc giả</div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="card-classic mb-4 border-0 shadow-sm p-3">
        <form class="row g-3 align-items-center" method="get" th:action="@{/librarian/renewals}">
            <div class="col-md-3">
                <select class="form-select text-muted" name="status">
                    <option value="">-- Trạng thái gia hạn --</option>
                    <option value="Pending">Chờ duyệt (Pending)</option>
                    <option value="Approved">Đã duyệt (Approved)</option>
                    <option value="Rejected">Từ chối (Rejected)</option>
                </select>
            </div>
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-white text-classic border-end-0"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" name="keyword" placeholder="Mã phiếu, mã sách, tên bạn đọc...">
                </div>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-classic px-4">Tìm kiếm</button>
            </div>
        </form>
    </div>

    <!-- Table -->
    <div class="card-classic border-0 shadow-sm overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Mã PGH</th>
                        <th>Thông tin Độc giả</th>
                        <th>Thông tin Sách</th>
                        <th>Số lần GH</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Thao tác</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="detail, iter : ${renewalDetails}">
                        <td class="ps-4 fw-bold" style="color: #4a3b32;" th:text="${'PGH' + detail.borrowDetailId}">PGH1</td>

                        <td>
                            <div th:if="${detail.borrow != null && detail.borrow.member != null && detail.borrow.member.user != null}">
                                <div class="fw-bold text-dark" th:text="${detail.borrow.member.user.fullName}">Bạn đọc</div>
                                <div class="small text-muted">Mã thẻ: <span th:text="${'TV' + detail.borrow.member.memberId}">TV1</span></div>
                                <div class="small text-muted"><i class="bi bi-telephone text-classic me-1"></i> <span th:text="${detail.borrow.member.user.phone}">090...</span></div>
                            </div>
                        </td>

                        <td>
                            <div class="fw-bold text-wrap" style="max-width: 200px;" th:text="${detail.book != null ? detail.book.title : 'Không rõ'}">Tên sách</div>
                        </td>
                        
                        <td>
                            <span class="badge bg-light text-dark border px-3" th:text="${detail.renewCount + ' lần'}">0 lần</span>
                        </td>

                        <td>
                            <span class="badge rounded-pill px-3 py-2"
                                  th:classappend="${detail.status == 'Renew_Pending' ? 'bg-warning bg-opacity-10 text-dark border border-warning' : (detail.status == 'Borrowed' ? 'bg-success bg-opacity-10 text-success border border-success' : 'bg-danger bg-opacity-10 text-danger border border-danger')}"
                                  th:text="${detail.status == 'Renew_Pending' ? 'Chờ duyệt' : detail.status}">
                                Chờ duyệt
                            </span>
                        </td>

                        <td class="text-end pe-4">
                            <div class="d-flex justify-content-end gap-2">
                                <form th:action="@{/librarian/loan/renewals/approve/{id}(id=${detail.borrowDetailId})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-outline-success" title="Duyệt gia hạn">
                                        <i class="bi bi-check-lg"></i> Duyệt
                                    </button>
                                </form>
                                <form th:action="@{/librarian/loan/renewals/reject/{id}(id=${detail.borrowDetailId})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Từ chối">
                                        <i class="bi bi-x-lg"></i> Từ chối
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(renewalDetails)}">
                        <td colspan="6" class="text-center py-5">
                            <div class="text-muted">
                                <i class="bi bi-calendar-check fs-1 d-block mb-3 text-success opacity-50"></i>
                                Không có yêu cầu gia hạn nào.
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
