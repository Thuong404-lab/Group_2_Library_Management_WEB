<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/librarian_base}">
<head>
    <title>Bàn Tiếp Nhận Trả Sách</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f7f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .text-classic { color: #8b5a2b !important; }
        .btn-classic {
            background-color: #8b5a2b !important;
            border-color: #8b5a2b !important;
            color: #ffffff !important;
        }
        .btn-classic:hover {
            background-color: #74481f !important;
            color: #ffffff !important;
        }
        .card-classic {
            background-color: #ffffff;
            border-radius: 10px;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
<div layout:fragment="content" th:with="activeMenu='borrow-desk'">

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-4" style="background-color: #f0fff4; color: #2f855a;">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}">Thành công</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm mb-4" style="background-color: #fff5f5; color: #c53030;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}">Lỗi</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="mb-4 pb-2 border-bottom" style="border-color: rgba(139, 90, 43, 0.2) !important;">
        <h2 class="fw-bold mb-1" style="color: #4a3b32; font-family: 'Playfair Display', serif;">Quầy Tiếp Nhận Trả Sách</h2>
        <div class="text-muted small">Quét mã vạch đơn vị sách vật lý để tiến hành kiểm tra, phạt quá hạn và nhận sách hoàn trả lại kho.</div>
    </div>

    <div class="card-classic p-4 mb-4">
        <form method="get" th:action="@{/librarian/loan/returns/search}">
            <input type="text" class="form-control" name="barcode" th:value="${barcode}" placeholder="Nhập mã vạch..." required>
            <button type="submit" class="btn btn-primary">Tìm đơn mượn</button>
        </form>
    </div>

    <div class="card-classic overflow-hidden" th:if="${searchResults != null && !searchResults.isEmpty()}">
        <div class="p-3 bg-light border-bottom fw-bold text-dark">Thông tin đơn mượn hiện hành của sách</div>
        <div class="table-responsive">
            <table class="table" th:if="${searchResults != null && !searchResults.isEmpty()}">
                <thead>
                <tr>
                    <th>Tên Sách</th>
                    <th>Độc giả</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="detail : ${searchResults}">
                    <td th:text="${detail.book.title}">Tên sách</td>
                    <td th:text="${detail.borrow.member.user.fullName}">Tên độc giả</td>
                    <td><span class="badge bg-warning" th:text="${detail.status}"></span></td>
                    <td>
                        <button class="btn btn-success" data-bs-toggle="modal" th:data-bs-target="'#modal' + ${detail.borrowDetailId}">
                            Nhận trả
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card-classic p-5 text-center text-muted" th:if="${barcode != null && !barcode.isEmpty() && (searchResults == null || searchResults.isEmpty())}">
        <i class="bi bi-search-heart fs-1 d-block mb-2 text-classic"></i>
        Không tìm thấy lượt mượn nào chưa trả ứng với mã vạch <strong th:text="${barcode}"></strong> này.
    </div>

    <div th:each="detail : ${searchResults}" class="modal fade" th:id="'modal' + ${detail.borrowDetailId}">
        <div class="modal-dialog">
            <form method="post" th:action="@{/librarian/loan/returns/confirm/{id}(id=${detail.borrowDetailId})}">
                <div class="modal-content">
                    <div class="modal-body">
                        <label>Tình trạng sách:</label>
                        <select name="conditionNote" class="form-select">
                            <option value="Bình thường">Bình thường</option>
                            <option value="Hư hại">Hư hại</option>
                        </select>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary">Xác nhận nhập kho</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function() {
            const input = document.querySelector('input[name="barcode"]');
            if (input) input.focus();
        });
    </script>
</div>
</body>
</html>
