<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/librarian_base}">
<head>
    <title>Đánh giá sách</title>
</head>
<body>
<div layout:fragment="content" th:with="activeMenu='reviews'">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom" style="border-color: rgba(139, 90, 43, 0.2) !important;">
        <div>
            <h2 class="fw-bold mb-1" style="color: #4a3b32; font-family: 'Playfair Display', serif;">Đánh giá Sách</h2>
            <div class="text-muted">Quản lý các đánh giá, nhận xét của bạn đọc về sách</div>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="card-classic shadow-sm mb-4">
        <div class="card-body p-4">
            <form class="row g-3" method="get">
                <div class="col-md-5">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white border-end-0" style="color: #8b5a2b;">
                            <i class="bi bi-search"></i>
                        </span>
                        <input class="form-control border-start-0 ps-0" type="text" name="keyword" placeholder="Tìm theo tên sách hoặc người dùng...">
                        <button class="btn btn-classic" type="submit">Tìm</button>
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="rating">
                        <option value="">Tất cả đánh giá</option>
                        <option value="5">★★★★★ (5 sao)</option>
                        <option value="4">★★★★☆ (4 sao)</option>
                        <option value="3">★★★☆☆ (3 sao)</option>
                        <option value="2">★★☆☆☆ (2 sao)</option>
                        <option value="1">★☆☆☆☆ (1 sao)</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="status">
                        <option value="">Tất cả trạng thái</option>
                        <option value="approved">Đã duyệt</option>
                        <option value="pending">Chờ duyệt</option>
                        <option value="hidden">Đã ẩn</option>
                    </select>
                </div>
                <div class="col-md-1 text-end">
                    <a class="btn btn-light border w-100" href="?"><i class="bi bi-arrow-clockwise"></i></a>
                </div>
            </form>
        </div>
    </div>

    <!-- Reviews Table -->
    <div class="card-classic shadow-sm">
        <div class="card-body p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light text-uppercase small text-muted">
                        <tr>
                            <th class="ps-3">Sách</th>
                            <th>Người đánh giá</th>
                            <th>Điểm</th>
                            <th>Nhận xét</th>
                            <th>Ngày đánh giá</th>
                            <th>Trạng thái</th>
                            <th class="text-end pe-3">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Dữ liệu từ server -->
                        <tr th:each="review : ${reviews}" th:if="${reviews != null}">
                            <td class="ps-3">
                                <div class="fw-bold text-classic" th:text="${review.bookTitle}">Tên sách</div>
                            </td>
                            <td th:text="${review.userName}">Người dùng</td>
                            <td>
                                <span class="text-warning" th:text="${'★'.repeat(review.rating)}">★★★★★</span>
                                <span class="text-muted" th:text="${review.rating + '/5'}">(5/5)</span>
                            </td>
                            <td>
                                <span class="text-truncate d-inline-block" style="max-width: 200px;" th:text="${review.content}">Nhận xét...</span>
                            </td>
                            <td th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy')}">01/01/2026</td>
                            <td>
                                <span class="badge rounded-pill bg-success" th:if="${review.status == 'approved'}">Đã duyệt</span>
                                <span class="badge rounded-pill bg-warning text-dark" th:if="${review.status == 'pending'}">Chờ duyệt</span>
                                <span class="badge rounded-pill bg-secondary" th:if="${review.status == 'hidden'}">Đã ẩn</span>
                            </td>
                            <td class="text-end pe-3">
                                <button class="btn btn-sm btn-outline-success me-1"><i class="bi bi-check-circle"></i> Duyệt</button>
                                <button class="btn btn-sm btn-outline-secondary me-1"><i class="bi bi-eye-slash"></i> Ẩn</button>
                                <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                            </td>
                        </tr>

                        <!-- Placeholder nếu không có dữ liệu -->
                        <tr th:if="${reviews == null || #lists.isEmpty(reviews)}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="bi bi-star fs-2 d-block mb-2 opacity-50"></i>
                                Chưa có đánh giá nào.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
