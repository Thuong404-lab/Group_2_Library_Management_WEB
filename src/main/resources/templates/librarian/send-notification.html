<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/librarian_base}">
<head>
    <title th:text="#{librarian.notification.title}">Send Notifications to Members</title>
    <link rel="stylesheet" th:href="@{/css/pages/librarian/send-notification.css}" />
</head>
<body>
<main layout:fragment="content">

    <div class="container mt-4">
            <h2 th:text="#{librarian.notification.title}">Send Notifications to Members</h2>
        <hr>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/librarian/interaction/notifications}"
              th:object="${notificationRequest}"
              method="post">

            <div class="mb-3">
                <label class="form-label fw-bold" th:text="#{librarian.notification.recipient}">Recipients</label>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           th:field="*{recipientType}"
                           value="ALL"
                           id="recipientAll">
                    <label class="form-check-label" for="recipientAll">
                            <span th:text="#{librarian.notification.allMembers}">Send to All Members</span>
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           th:field="*{recipientType}"
                           value="SELECTED"
                           id="recipientSelected">
                    <label class="form-check-label" for="recipientSelected">
                            <span th:text="#{librarian.notification.selectedMembers}">Send to Selected Members</span>
                    </label>
                </div>

                <div class="text-danger mt-1"
                     th:if="${#fields.hasErrors('recipientType')}"
                     th:errors="*{recipientType}">
                </div>
            </div>

            <div class="mb-3" id="memberListBox">
                <label class="form-label fw-bold" th:text="#{librarian.notification.selectMember}">Select Members</label>

                <div class="border rounded p-3 librarian-send-notification-div-max-height-overflow-y-01">
                    <div th:each="member : ${members}" class="form-check">
                        <input class="form-check-input member-checkbox"
                               type="checkbox"
                               name="memberIds"
                               th:value="${member.memberId}">
                        <label class="form-check-label"
                               th:text="${member.user.fullName + ' - ID: ' + member.memberId}">
                            Member name
                        </label>
                    </div>

                    <div th:if="${members == null || members.isEmpty()}" class="text-muted">
                        <span th:text="#{librarian.notification.noMembers}">There are no members in the system.</span>
                    </div>
                </div>

                <small class="text-muted">
                    <span th:text="#{librarian.notification.selectionHint}">Only select members when "Send to Selected Members" is chosen.</span>
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold" th:text="#{common.title}">Title</label>
                <input type="text"
                       class="form-control"
                       th:field="*{title}"
                       th:placeholder="#{librarian.notification.titlePlaceholder}" placeholder="Enter the notification title">

                <div class="text-danger mt-1"
                     th:if="${#fields.hasErrors('title')}"
                     th:errors="*{title}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold" th:text="#{common.content}">Content</label>
                <textarea class="form-control"
                          rows="5"
                          th:field="*{content}"
                          th:placeholder="#{librarian.notification.contentPlaceholder}" placeholder="Enter the notification content"></textarea>

                <div class="text-danger mt-1"
                     th:if="${#fields.hasErrors('content')}"
                     th:errors="*{content}">
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                    <span th:text="#{librarian.notification.submit}">Send Notification</span>
            </button>

            <a th:href="@{/librarian/interaction/reviews}" class="btn btn-secondary">
                    <span th:text="#{common.back}">Back</span>
            </a>
        </form>
    </div>

    <script>
        function toggleMemberList() {
            const selected = document.getElementById("recipientSelected");
            const memberListBox = document.getElementById("memberListBox");
            const checkboxes = document.querySelectorAll(".member-checkbox");

            if (selected.checked) {
                memberListBox.style.display = "block";
                checkboxes.forEach(function (checkbox) {
                    checkbox.disabled = false;
                });
            } else {
                memberListBox.style.display = "none";
                checkboxes.forEach(function (checkbox) {
                    checkbox.checked = false;
                    checkbox.disabled = true;
                });
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            const recipientAll = document.getElementById("recipientAll");
            const recipientSelected = document.getElementById("recipientSelected");

            recipientAll.addEventListener("change", toggleMemberList);
            recipientSelected.addEventListener("change", toggleMemberList);

            toggleMemberList();
        });
    </script>

</main>
</body>
</html>
