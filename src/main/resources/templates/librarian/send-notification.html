<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<body>
<main layout:fragment="content">

    <div class="container mt-4">
        <h2>Gửi thông báo cho Độc giả</h2>
        <hr>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/librarian/interaction/notifications}"
              th:object="${notificationRequest}"
              method="post">

            <div class="mb-3">
                <label class="form-label fw-bold">Đối tượng nhận</label>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           th:field="*{recipientType}"
                           value="ALL"
                           id="recipientAll">
                    <label class="form-check-label" for="recipientAll">
                        Gửi cho tất cả Member
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           th:field="*{recipientType}"
                           value="SELECTED"
                           id="recipientSelected">
                    <label class="form-check-label" for="recipientSelected">
                        Gửi cho Member được chọn
                    </label>
                </div>

                <div class="text-danger mt-1"
                     th:if="${#fields.hasErrors('recipientType')}"
                     th:errors="*{recipientType}">
                </div>
            </div>

            <div class="mb-3" id="memberListBox">
                <label class="form-label fw-bold">Chọn Member</label>

                <div class="border rounded p-3" style="max-height: 250px; overflow-y: auto;">
                    <div th:each="member : ${members}" class="form-check">
                        <input class="form-check-input member-checkbox"
                               type="checkbox"
                               name="memberIds"
                               th:value="${member.memberId}">
                        <label class="form-check-label"
                               th:text="${member.user.fullName + ' - ID: ' + member.memberId}">
                            Member name
                        </label>
                    </div>

                    <div th:if="${members == null || members.isEmpty()}" class="text-muted">
                        Chưa có member nào trong hệ thống.
                    </div>
                </div>

                <small class="text-muted">
                    Chỉ cần chọn Member nếu bạn chọn "Gửi cho Member được chọn".
                </small>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Tiêu đề</label>
                <input type="text"
                       class="form-control"
                       th:field="*{title}"
                       placeholder="Nhập tiêu đề thông báo">

                <div class="text-danger mt-1"
                     th:if="${#fields.hasErrors('title')}"
                     th:errors="*{title}">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Nội dung</label>
                <textarea class="form-control"
                          rows="5"
                          th:field="*{content}"
                          placeholder="Nhập nội dung thông báo"></textarea>

                <div class="text-danger mt-1"
                     th:if="${#fields.hasErrors('content')}"
                     th:errors="*{content}">
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                Gửi thông báo
            </button>

            <a th:href="@{/librarian/interaction/reviews}" class="btn btn-secondary">
                Quay lại
            </a>
        </form>
    </div>

    <script>
        function toggleMemberList() {
            const selected = document.getElementById("recipientSelected");
            const memberListBox = document.getElementById("memberListBox");
            const checkboxes = document.querySelectorAll(".member-checkbox");

            if (selected.checked) {
                memberListBox.style.display = "block";
                checkboxes.forEach(function (checkbox) {
                    checkbox.disabled = false;
                });
            } else {
                memberListBox.style.display = "none";
                checkboxes.forEach(function (checkbox) {
                    checkbox.checked = false;
                    checkbox.disabled = true;
                });
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            const recipientAll = document.getElementById("recipientAll");
            const recipientSelected = document.getElementById("recipientSelected");

            recipientAll.addEventListener("change", toggleMemberList);
            recipientSelected.addEventListener("change", toggleMemberList);

            toggleMemberList();
        });
    </script>

</main>
</body>
</html>
