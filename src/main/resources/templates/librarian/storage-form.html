<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/librarian_base}">

<head>
    <title th:text="${shelf != null} ? #{librarian.storage.editTitle} : #{librarian.storage.addTitle}"></title>
    <link rel="stylesheet" th:href="@{/css/pages/librarian/storage-form.css}" />
</head>

<body>
    <main layout:fragment="content" th:with="activeMenu='dashboard'" class="storage-form-page">
        <header class="app-page-header">
            <div>
                <div class="app-page-eyebrow" th:text="#{librarian.storage.management}">Bookshelf Management</div>
                <h1 class="app-page-title" th:text="${shelf != null} ? #{librarian.storage.editTitle} : #{librarian.storage.addNew}"></h1>
            </div>
            <a class="btn btn-outline-classic" th:href="@{/librarian/storage}" th:text="#{common.back}">Back</a>
        </header>
        <div class="card-box">
            <form th:action="${shelf != null} ? @{/librarian/storage/update/{id}(id=${shelf.shelfId})} : @{/librarian/storage/add}" method="post">
                <div th:if="${_csrf != null}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                </div>
                <div class="form-group">
                <label for="shelfName" th:text="#{librarian.storage.name}">Location Name</label>
                    <input id="shelfName" name="shelfName" type="text" class="form-control"
                           th:value="${shelf != null} ? ${shelf.shelfName} : ''" required>
                </div>
                <div class="form-group">
                <label for="location" th:text="#{librarian.storage.location}">Location</label>
                    <input id="location" name="location" type="text" class="form-control"
                           th:value="${shelf != null} ? ${shelf.location} : ''">
                </div>
                <div class="form-group storage-form-actions">
                <button type="submit" class="btn btn-primary" th:text="${shelf != null} ? #{common.update} : #{common.add}"></button>
                <a class="btn btn-outline-secondary" th:href="@{/librarian/storage}" th:text="#{common.cancel}">Cancel</a>
                </div>
            </form>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        </div>
    </main>
</body>

</html>
