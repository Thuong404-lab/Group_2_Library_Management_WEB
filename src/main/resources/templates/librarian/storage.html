<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<!-- Người phụ trách: La Tấn Khanh (CE191640) -->

<head>
    <meta charset="UTF-8">
    <title>Quản lý kho sách</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.css}">
    <style>
        :root {
            --sidebar: #172742;
            --sidebar-active: #243a63;
            --line: #d7dee8;
            --page: #f2f5f9;
            --text-light: #ffffff;
            --muted-light: #93a4bd;
        }

        body {
            background: var(--page);
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-navbar {
            align-items: center;
            background: var(--sidebar);
            border-bottom: 1px solid rgba(255, 255, 255, .08);
            color: var(--text-light);
            display: flex;
            height: 52px;
            justify-content: space-between;
            padding: 0 22px;
        }

        .brand-link,
        .brand-link:link,
        .brand-link:visited,
        .brand-link:hover,
        .brand-link:focus,
        .brand-link:active {
            align-items: center;
            color: #ffffff;
            display: flex;
            gap: 10px;
            height: 100%;
            text-decoration: none !important;
        }

        .brand-icon {
            align-items: center;
            background: #4bc3ff;
            border-radius: 4px;
            color: #0d3760;
            display: inline-flex;
            height: 24px;
            justify-content: center;
            width: 24px;
        }

        .brand-name {
            color: #ffffff;
            font-size: 14px;
            font-weight: 800;
            line-height: 1;
            text-decoration: none !important;
        }

        .nav-right {
            color: var(--muted-light);
            font-size: 12px;
        }

        .page {
            flex: 1;
            padding: 22px;
        }

        .title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .toolbar-content {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .card-box {
            background: #fff;
            border: 1px solid #d7dee8;
            border-radius: 4px;
            padding: 16px;
        }

        .table-app {
            font-size: 13px;
            margin: 0;
        }

        .table-app th {
            background: #f8fafc;
            color: #475569;
            font-size: 12px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--sidebar-active);
            border-color: var(--sidebar-active);
        }

        .btn-primary:hover {
            background: #1d3154;
            border-color: #1d3154;
        }

        .text-danger {
            color: #b91c1c;
        }

        .form-group {
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
    <header class="page-navbar">
        <a class="brand-link" th:href="@{/librarian/dashboard}">
            <span class="brand-icon">▱</span>
            <span class="brand-name">LMS</span>
        </a>
        <div class="nav-right">Quản lý vị trí lưu trữ</div>
    </header>

    <div class="page">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h1 class="title">Vị trí lưu trữ</h1>
            </div>
            <a class="btn btn-primary btn-sm" th:href="@{/librarian/storage/add}">Thêm vị trí mới</a>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

        <div class="card-box">
            <table class="table table-hover table-app">
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>Tên vị trí</th>
                        <th>Vị trí</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="shelf : ${shelves}">
                        <td th:text="${shelf.shelfId}"></td>
                        <td th:text="${shelf.shelfName}"></td>
                        <td th:text="${shelf.location}"></td>
                        <td>
                            <a class="btn btn-outline-secondary btn-sm"
                               th:href="@{/librarian/storage/edit/{id}(id=${shelf.shelfId})}">Sửa</a>
                            <form th:action="@{/librarian/storage/delete/{id}(id=${shelf.shelfId})}" method="post" style="display:inline;">
                                <div th:if="${_csrf != null}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                </div>
                                <button type="submit" class="btn btn-outline-danger btn-sm">Xóa</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
