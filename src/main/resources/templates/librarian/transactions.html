<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/librarian_base}">
<head>
    <!-- UC-14.3 UI maintained by Pham Kien Quoc. -->
    <title th:text="#{librarian.transactions.title}">Transaction Management</title>
    <link rel="stylesheet" th:href="@{/css/librarian-finance.css}">
    <link rel="stylesheet" th:href="@{/css/pages/librarian/transactions.css}">
    <script defer th:src="@{/js/auto-filter.js}"></script>
  </head>
<body>
<div layout:fragment="content" th:with="activeMenu='transactions'" class="finance-page transaction-page">
    <header class="finance-header transaction-page-hero">
        <div>
            <span class="transaction-page-eyebrow" th:text="#{staff.nav.finance}">FINANCE</span>
            <h2 class="finance-title" th:text="#{librarian.transactions.heading}">Transaction Management</h2>
            <div class="finance-description" th:text="#{librarian.transactions.description}">Track wallet transactions, borrowing fees, fines, and top-ups.</div>
        </div>
        <div class="transaction-hero-summary" th:if="${transactionPage != null}">
            <i class="bi bi-receipt" aria-hidden="true"></i>
            <strong th:text="${transactionPage.totalElements}">0</strong>
            <span th:text="#{transaction.transactions}">Transactions</span>
        </div>
    </header>

    <section class="card-classic finance-card transaction-filter-card p-4 mb-4" th:aria-label="#{common.filter}">
        <form method="get" th:action="@{/librarian/members/transactions}" class="transaction-filter-form" data-auto-filter-form>
            <div class="transaction-type-filter">
                <label for="transactionTypeFilter" th:text="#{transaction.type}">Transaction type</label>
                <div class="transaction-select-control">
                    <i class="bi bi-funnel" aria-hidden="true"></i>
                    <select id="transactionTypeFilter" name="type" class="form-select" data-auto-submit>
                    <option value="" th:selected="${selectedType == null or selectedType == ''}" th:text="#{member.wallet.allTransactions}">All Transactions</option>
                    <option value="TOP_UP" th:selected="${selectedType == 'TOP_UP'}" th:text="#{transaction.type.topUp}">Top Up</option>
                    <option value="BORROW_FEE" th:selected="${selectedType == 'BORROW_FEE'}" th:text="#{transaction.type.borrowFee}">Borrowing Fee</option>
                    <option value="DEPOSIT" th:selected="${selectedType == 'DEPOSIT'}" th:text="#{transaction.type.deposit}">Deposit</option>
                    <option value="FINE" th:selected="${selectedType == 'FINE'}" th:text="#{transaction.type.fine}">Fine</option>
                    <option value="DAMAGE_FEE" th:selected="${selectedType == 'DAMAGE_FEE'}" th:text="#{transaction.type.damageFee}">Damage Fee</option>
                    <option value="REFUND" th:selected="${selectedType == 'REFUND'}" th:text="#{transaction.type.refund}">Refund</option>
                    </select>
                </div>
            </div>

            <div class="transaction-filter-submit">
                <button type="submit" class="btn btn-classic px-4">
                    <i class="bi bi-funnel" aria-hidden="true"></i>
                    <span th:text="#{common.filter}">Filter</span>
                </button>
            </div>
            <div class="transaction-reset-filter">
                <a th:href="@{/librarian/members/transactions}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-counterclockwise" aria-hidden="true"></i>
                    <span th:text="#{common.clearFilter}">Clear Filter</span>
                </a>
            </div>
        </form>
    </section>

    <section class="card-classic finance-card transaction-table-card">
        <div th:if="${transactions == null or #lists.isEmpty(transactions)}" class="empty-state">
            <span th:text="#{transaction.empty}">No transactions found.</span>
        </div>

        <div class="app-table-wrap" th:if="${transactions != null and !#lists.isEmpty(transactions)}">
            <table class="table table-hover align-middle mb-0 transaction-table">
                <thead class="table-light">
                <tr>
                    <th class="ps-4" th:text="#{transaction.code}">Transaction ID</th>
                    <th th:text="#{common.member}">Member</th>
                    <th th:text="#{common.dateTime}">Date &amp; Time</th>
                    <th th:text="#{transaction.type}">Type</th>
                    <th th:text="#{transaction.amount}">Amount</th>
                    <th th:text="#{common.status}">Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="transaction : ${transactions}">
                    <td class="transaction-code ps-4" th:data-label="#{transaction.code}" th:text="|#TXN-${transaction.transactionId}|">#TXN-1</td>
                    <td th:data-label="#{common.member}">
                            <div class="transaction-member-name"
                             th:text="${transaction.wallet != null and transaction.wallet.member != null and transaction.wallet.member.user != null ? transaction.wallet.member.user.fullName : #messages.msg('common.unknown')}">
                            Member
                        </div>
                        <div class="small text-muted"
                             th:text="${transaction.wallet != null and transaction.wallet.member != null ? #messages.msg('member.idValue', transaction.wallet.member.memberId) : ''}">
                            Member ID
                        </div>
                    </td>
                    <td class="transaction-date" th:data-label="#{common.dateTime}" th:text="${transaction.transactionDate != null ? #temporals.format(transaction.transactionDate, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
                    <td th:data-label="#{transaction.type}">
                        <span class="badge transaction-type"
                              th:classappend="${transaction.transactionType == 'TOP_UP'} ? ' type-topup' :
                                  (${transaction.transactionType == 'BORROW_FEE'} ? ' type-borrow-fee' :
                                  (${transaction.transactionType == 'DEPOSIT'} ? ' type-deposit' :
                                  (${transaction.transactionType == 'FINE'} ? ' type-fine' :
                                  (${transaction.transactionType == 'DAMAGE_FEE'} ? ' type-damage-fee' :
                                  (${transaction.transactionType == 'REFUND'} ? ' type-refund' : ' type-default')))))"
                              th:text="${transaction.transactionType == 'TOP_UP' ? #messages.msg('transaction.type.topUp') :
                                  (transaction.transactionType == 'BORROW_FEE' ? #messages.msg('transaction.type.borrowFee') :
                                  (transaction.transactionType == 'DEPOSIT' ? #messages.msg('transaction.type.deposit') :
                                  (transaction.transactionType == 'FINE' ? #messages.msg('transaction.type.fine') :
                                  (transaction.transactionType == 'DAMAGE_FEE' ? #messages.msg('transaction.type.damageFee') :
                                  (transaction.transactionType == 'REFUND' ? #messages.msg('transaction.type.refund') : #messages.msg('transaction.type.other'))))))}">Transaction Type</span>
                    </td>
                    <td class="transaction-amount" th:data-label="#{transaction.amount}"
                        th:classappend="${transaction.amount != null and transaction.amount.signum() >= 0} ? ' amount-positive' : ' amount-negative'">
                        <span th:text="${transaction.amount != null and transaction.amount.signum() >= 0 ? '+ ' : '- '}">+ </span>
                        <span th:text="${transaction.amount != null ? #numbers.formatDecimal(transaction.amount.abs(), 0, 'COMMA', 0, 'POINT') : '0'}">0</span>
                        <span th:text="#{currency.vnd}">VND</span>
                    </td>
                    <td th:data-label="#{common.status}">
                        <span class="status-badge"
                              th:classappend="${transaction.status == 'Completed' ? 'status-completed' : (transaction.status == 'Failed' ? 'status-rejected' : (transaction.status == 'Canceled' ? 'status-canceled' : 'status-pending'))}"
                              th:text="${transaction.status == 'Completed' ? #messages.msg('transaction.status.completed') : (transaction.status == 'Pending' ? #messages.msg('transaction.status.pending') : (transaction.status == 'Failed' ? #messages.msg('transaction.status.failed') : (transaction.status == 'Canceled' ? #messages.msg('transaction.status.canceled') : transaction.status)))}">Completed</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="app-pagination-region" th:if="${transactionPage != null and transactionPage.totalPages > 1}"
             th:with="startPage=${transactionPage.totalPages <= 10 ? 0 : (transactionPage.number < 9 ? 0 : (transactionPage.number - 8 > transactionPage.totalPages - 10 ? transactionPage.totalPages - 10 : transactionPage.number - 8))}">
            <nav th:aria-label="#{transaction.pagination}" th:with="endPage=${startPage + 9 < transactionPage.totalPages ? startPage + 9 : transactionPage.totalPages - 1}">
                <ul class="pagination app-pagination">
                    <li class="page-item" th:classappend="${transactionPage.first} ? 'disabled'"><a class="page-link" th:href="@{/librarian/members/transactions(page=0,type=${selectedType})}" th:text="#{pagination.first}">First</a></li>
                    <li class="page-item" th:classappend="${transactionPage.first} ? 'disabled'"><a class="page-link" th:href="@{/librarian/members/transactions(page=${transactionPage.number-1},type=${selectedType})}" th:aria-label="#{pagination.previous}"><i class="bi bi-chevron-left"></i></a></li>
                    <li class="page-item disabled" th:if="${startPage > 0}"><span class="page-link">…</span></li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(startPage,endPage)}" th:classappend="${i == transactionPage.number} ? 'active'"><a class="page-link" th:href="@{/librarian/members/transactions(page=${i},type=${selectedType})}" th:text="${i+1}">1</a></li>
                    <li class="page-item disabled" th:if="${endPage < transactionPage.totalPages-1}"><span class="page-link">…</span></li>
                    <li class="page-item" th:classappend="${transactionPage.last} ? 'disabled'"><a class="page-link" th:href="@{/librarian/members/transactions(page=${transactionPage.number+1},type=${selectedType})}" th:aria-label="#{pagination.next}"><i class="bi bi-chevron-right"></i></a></li>
                    <li class="page-item" th:classappend="${transactionPage.last} ? 'disabled'"><a class="page-link" th:href="@{/librarian/members/transactions(page=${transactionPage.totalPages-1},type=${selectedType})}" th:text="#{pagination.last}">Last</a></li>
                </ul>
            </nav>
        </div>
    </section>
</div>
</body>
</html>
