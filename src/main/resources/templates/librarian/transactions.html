<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/librarian_base}">
<head>
    <!-- UC-14.3 UI maintained by Pham Kien Quoc. -->
    <title>Quản lý giao dịch</title>
    <link rel="stylesheet" th:href="@{/css/librarian-finance.css}">
  </head>
<body>
<div layout:fragment="content" th:with="activeMenu='transactions'" class="finance-page">
    <div class="finance-header d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4 pb-2 border-bottom u-border-color-rgba-139-90-43-0-2-important-4432b9df"
        >
        <div>
            <h2 class="fw-bold mb-1">Quản lý giao dịch</h2>
            <div class="text-muted">Theo dõi giao dịch ví, phí mượn, phí phạt và nạp tiền trong hệ thống.</div>
        </div>
    </div>

    <div class="card-classic finance-card p-4 mb-4">
        <form method="get" th:action="@{/librarian/members/transactions}" class="row g-3 align-items-end">
            <div class="col-md-4 transaction-type-filter">
                <select name="type" class="form-select">
                    <option value="" th:selected="${selectedType == null or selectedType == ''}">Tất cả giao dịch</option>
                    <option value="TOP_UP" th:selected="${selectedType == 'TOP_UP'}">Nạp tiền</option>
                    <option value="BORROW_FEE" th:selected="${selectedType == 'BORROW_FEE'}">Phí mượn</option>
                    <option value="DEPOSIT" th:selected="${selectedType == 'DEPOSIT'}">Tiền cọc</option>
                    <option value="FINE" th:selected="${selectedType == 'FINE'}">Phí phạt</option>
                    <option value="DAMAGE_FEE" th:selected="${selectedType == 'DAMAGE_FEE'}">Phí hư hỏng</option>
                    <option value="REFUND" th:selected="${selectedType == 'REFUND'}">Hoàn tiền</option>
                </select>
            </div>

            <div class="col-auto transaction-filter-submit">
                <button type="submit" class="btn btn-classic px-4">Lọc</button>
            </div>
            <div class="col-auto transaction-reset-filter">
                <a th:href="@{/librarian/members/transactions}" class="btn btn-outline-secondary">Xóa lọc</a>
            </div>
        </form>
    </div>

    <div class="card-classic finance-card overflow-hidden">
        <div th:if="${transactions == null or #lists.isEmpty(transactions)}" class="text-center text-muted py-5">
            Chưa có giao dịch nào.
        </div>

        <div class="table-responsive" th:if="${transactions != null and !#lists.isEmpty(transactions)}">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">Mã GD</th>
                    <th>Thành viên</th>
                    <th>Ngày giờ</th>
                    <th>Loại</th>
                    <th>Số tiền</th>
                    <th>Trạng thái</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="transaction : ${transactions}">
                    <td class="transaction-code ps-4 fw-bold" th:text="|#TXN-${transaction.transactionId}|">#TXN-1</td>
                    <td>
                        <div class="fw-bold"
                             th:text="${transaction.wallet != null and transaction.wallet.member != null and transaction.wallet.member.user != null ? transaction.wallet.member.user.fullName : 'Không rõ'}">
                            Thành viên
                        </div>
                        <div class="small text-muted"
                             th:text="${transaction.wallet != null and transaction.wallet.member != null ? 'Mã thành viên: ' + transaction.wallet.member.memberId : ''}">
                            Mã thành viên
                        </div>
                    </td>
                    <td th:text="${transaction.transactionDate != null ? #temporals.format(transaction.transactionDate, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
                    <td>
                        <span class="badge transaction-type"
                              th:classappend="${transaction.transactionType == 'TOP_UP'} ? ' type-topup' :
                                  (${transaction.transactionType == 'BORROW_FEE'} ? ' type-borrow-fee' :
                                  (${transaction.transactionType == 'DEPOSIT'} ? ' type-deposit' :
                                  (${transaction.transactionType == 'FINE'} ? ' type-fine' :
                                  (${transaction.transactionType == 'DAMAGE_FEE'} ? ' type-damage-fee' :
                                  (${transaction.transactionType == 'REFUND'} ? ' type-refund' : ' type-default')))))"
                              th:text="${transaction.transactionType == 'TOP_UP' ? 'Nạp tiền' :
                                  (transaction.transactionType == 'BORROW_FEE' ? 'Phí mượn' :
                                  (transaction.transactionType == 'DEPOSIT' ? 'Tiền cọc' :
                                  (transaction.transactionType == 'FINE' ? 'Phí phạt' :
                                  (transaction.transactionType == 'DAMAGE_FEE' ? 'Phí hư hỏng' :
                                  (transaction.transactionType == 'REFUND' ? 'Hoàn tiền' : transaction.transactionType)))))}">Loại giao dịch</span>
                    </td>
                    <td class="fw-bold"
                        th:classappend="${transaction.amount != null and transaction.amount.signum() >= 0} ? ' text-success' : ' text-danger'">
                        <span th:text="${transaction.amount != null and transaction.amount.signum() >= 0 ? '+ ' : '- '}">+ </span>
                        <span th:text="${transaction.amount != null ? #numbers.formatDecimal(transaction.amount.abs(), 0, 'COMMA', 0, 'POINT') : '0'}">0</span>
                        VNĐ
                    </td>
                    <td>
                        <span class="status-badge"
                              th:classappend="${transaction.status == 'Completed' ? 'status-completed' : (transaction.status == 'Failed' ? 'status-rejected' : (transaction.status == 'Canceled' ? 'status-canceled' : 'status-pending'))}"
                              th:text="${transaction.status == 'Completed' ? 'Hoàn tất' : (transaction.status == 'Pending' ? 'Chờ xử lý' : (transaction.status == 'Failed' ? 'Thất bại' : (transaction.status == 'Canceled' ? 'Đã hủy' : transaction.status)))}">Hoàn tất</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${transactionPage != null and transactionPage.totalPages > 1}" class="p-3" aria-label="Phân trang giao dịch">
            <ul class="pagination justify-content-center mb-0">
                <li class="page-item" th:classappend="${transactionPage.first} ? 'disabled'">
                    <a class="page-link page-link-classic" th:href="@{/librarian/members/transactions(page=${currentPage - 1}, type=${selectedType})}">Trước</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, transactionPage.totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link page-link-classic" th:href="@{/librarian/members/transactions(page=${i}, type=${selectedType})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${transactionPage.last} ? 'disabled'">
                    <a class="page-link page-link-classic" th:href="@{/librarian/members/transactions(page=${currentPage + 1}, type=${selectedType})}">Sau</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
</body>
</html>
