<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/base}">

<head>
    <title>Đăng nhập</title>
</head>

<body>
    <div layout:fragment="content" class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 450px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
                        <i class="bi bi-person-lock text-primary fs-2"></i>
                    </div>
                    <h3 class="fw-bold">Đăng nhập hệ thống</h3>
                    <p class="text-muted small">Nhập tài khoản để tiếp tục</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center p-2 mb-4" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <div>Tài khoản hoặc mật khẩu không đúng.</div>
                </div>

                <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center p-2 mb-4"
                    role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i>
                    <div>Đăng xuất thành công.</div>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username"
                            placeholder="Tên đăng nhập" required autofocus>
                        <label for="username"><i class="bi bi-person me-1"></i> Tên đăng nhập</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Mật khẩu"
                            required>
                        <label for="password"><i class="bi bi-key me-1"></i> Mật khẩu</label>
                    </div>
                    <button class="btn btn-primary w-100 py-3 rounded-3 fw-bold shadow-sm" type="submit">
                        ĐĂNG NHẬP <i class="bi bi-box-arrow-in-right ms-1"></i>
                    </button>
                </form>
            </div>
            <div class="card-footer bg-light text-center py-3 border-0 rounded-bottom-4">
                <span class="text-muted small">Bạn chưa có tài khoản? </span>
                <a href="#" class="text-decoration-none fw-semibold">Đăng ký thành viên</a>
            </div>
        </div>
    </div>
</body>

</html>
