<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Thư Viện Số</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .auth-card {
            border-radius: 1rem;
            border: none;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
            max-width: 450px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card auth-card mx-auto">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <i class="bi bi-book-half text-primary mb-3" style="font-size: 3rem;"></i>
                    <h3 class="fw-bold">Thư Viện Số</h3>
                    <p class="text-muted">Đăng nhập để tiếp tục</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i>Tài khoản hoặc mật khẩu không đúng!
                </div>

                <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
                    <i class="bi bi-check-circle me-2"></i>Đăng xuất thành công.
                </div>

                <div th:if="${successMsg}" class="alert alert-success py-2" role="alert">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${successMsg}"></span>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Tên đăng nhập" required autofocus>
                        <label for="username">Tên đăng nhập</label>
                    </div>
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Mật khẩu" required>
                        <label for="password">Mật khẩu</label>
                    </div>
                    <button class="btn btn-primary w-100 py-2 fs-5 mb-3" type="submit">Đăng Nhập</button>
                    
                    <!-- Tạm ẩn phần đăng nhập Google
                    <div class="d-flex align-items-center mb-3">
                        <hr class="flex-grow-1">
                        <span class="mx-2 text-muted">Hoặc</span>
                        <hr class="flex-grow-1">
                    </div>
                    
                    <a href="/oauth2/authorization/google" class="btn btn-outline-danger w-100 py-2 fs-6">
                        <i class="bi bi-google me-2"></i> Đăng nhập bằng Google
                    </a>
                    -->
                </form>
            </div>
            <div class="card-footer bg-white text-center py-3 border-0 rounded-bottom-4">
                <span class="text-muted">Chưa có tài khoản?</span>
                <a th:href="@{/register}" class="text-decoration-none fw-semibold">Đăng ký ngay</a>
            </div>
        </div>
    </div>
</body>
</html>
