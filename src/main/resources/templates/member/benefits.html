<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Membership Benefits</title>
    <style>
        .container { width: 50%; margin: 50px auto; font-family: Arial, sans-serif; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: #fff; }
        .header { background-color: #4CAF50; color: white; padding: 10px; border-radius: 4px; text-align: center; }
        .info { margin: 15px 0; font-size: 16px; }
        .bold { font-weight: bold; }
        .btn-group { margin-top: 25px; text-align: center; display: flex; justify-content: center; gap: 20px; }
        .btn-link { text-decoration: none; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h2>Current Membership Tier: <span th:text="${tierBenefits != null ? tierBenefits.tierName : 'None'}">Gold</span></h2>
        </div>

        <div class="info">
            <span class="bold">Discount Percent: </span>
            <span th:text="${tierBenefits != null ? tierBenefits.discountPercent : 0}">0</span>%
        </div>

        <div class="info">
            <span class="bold">Borrowing Limit: </span>
            <span th:text="${tierBenefits != null ? tierBenefits.borrowLimit : 0}">0</span> books
        </div>

        <div class="info">
            <span class="bold">Detailed Privileges: </span>
            <p th:text="${tierBenefits != null ? tierBenefits.benefits : 'No privilege description available.'}">Privilege descriptions go here...</p>
        </div>

        <hr>

        <div class="btn-group">
            <a href="/" class="btn-link" style="color: #666;">🏠 Back to Home</a>
            <span style="color: #ccc;">|</span>
            <a href="/member/membership/tier" class="btn-link" style="color: #2196F3;">→ View Tier Progression</a>
        </div>
    </div>
</div>

</body>
</html>
