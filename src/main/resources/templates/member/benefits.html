<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Membership Benefits</title>
    <link rel="stylesheet" th:href="@{/css/pages/member/benefits.css}" />
      <link rel="stylesheet" th:href="@{/css/utilities.css}" />
  </head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h2>Current Membership Tier: <span th:text="${tierBenefits != null ? tierBenefits.tierName : 'None'}">Gold</span></h2>
        </div>

        <div class="info">
            <span class="bold">Discount Percent: </span>
            <span th:text="${tierBenefits != null ? tierBenefits.discountPercent : 0}">0</span>%
        </div>

        <div class="info">
            <span class="bold">Borrowing Limit: </span>
            <span th:text="${tierBenefits != null ? tierBenefits.borrowLimit : 0}">0</span> books
        </div>

        <div class="info">
            <span class="bold">Detailed Privileges: </span>
            <p th:text="${tierBenefits != null ? tierBenefits.benefits : 'No privilege description available.'}">Privilege descriptions go here...</p>
        </div>

        <hr>

        <div class="btn-group">
            <a href="/" class="btn-link member-benefits-a-color-01">🏠 Back to Home</a>
            <span class="member-benefits-span-color-02">|</span>
            <a href="/member/membership/tier" class="btn-link member-benefits-a-color-03">→ View Tier Progression</a>
        </div>
    </div>
</div>

</body>
</html>
