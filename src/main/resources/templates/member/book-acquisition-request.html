<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title>De xuat bo sung sach</title>
    <style>
        .member-page {
            max-width: 1250px;
        }

        .member-page-title {
            color: #4a3b32;
            font-family: 'Playfair Display', serif;
        }

        .member-form-card {
            background: #fff;
            border: 1px solid rgba(139, 90, 43, 0.14);
            border-left: 4px solid #8b5a2b;
            border-radius: 8px;
        }

        .validate-field.is-invalid {
            border-color: #dc3545 !important;
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.15) !important;
        }

        .validate-field.is-valid {
            border-color: #198754 !important;
            box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.15) !important;
        }
    </style>
</head>

<body>
<div layout:fragment="content" class="container member-page mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
        <div>
            <h2 class="member-page-title font-weight-bold mb-1">
                &#272;&#7873; xu&#7845;t b&#7893; sung s&#225;ch
            </h2>
            <div class="text-muted">G&#7917;i t&#234;n s&#225;ch b&#7841;n mu&#7889;n th&#432; vi&#7879;n b&#7893; sung v&#224;o kho.</div>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="member-form-card shadow-sm p-4">
        <h5 class="font-weight-bold mb-4" style="color:#4a3b32;">
            <i class="bi bi-pencil-square mr-2" style="color:#8b5a2b;"></i>G&#7917;i &#273;&#7873; xu&#7845;t m&#7899;i
        </h5>

        <form id="acquisitionRequestForm"
              th:action="@{/member/interaction/acquisition-requests}"
              th:object="${acquisitionRequest}"
              method="post">
            <div class="form-group mb-3">
                <label for="title" class="font-weight-bold small text-muted text-uppercase">
                    T&#234;n s&#225;ch <span class="text-danger">*</span>
                </label>
                <input type="text"
                       id="title"
                       class="form-control mt-1 validate-field"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                       th:field="*{title}"
                       maxlength="255"
                       placeholder="Nhập tên sách muốn đề xuất">
                <div id="titleFeedback"
                     class="invalid-feedback d-block"
                     th:if="${#fields.hasErrors('title')}"
                     th:errors="*{title}">
                </div>
            </div>

            <div class="form-group mb-4">
                <label for="author" class="font-weight-bold small text-muted text-uppercase">
                    T&#225;c gi&#7843;
                </label>
                <input type="text"
                       id="author"
                       class="form-control mt-1"
                       th:field="*{author}"
                       maxlength="255">
            </div>

            <div class="d-flex justify-content-end">
                <button type="submit" class="btn text-white font-weight-bold px-4" style="background:#8b5a2b;">
                    G&#7917;i &#273;&#7873; xu&#7845;t
                </button>
            </div>
        </form>
    </div>

    <script>
        const acquisitionForm = document.getElementById('acquisitionRequestForm');
        const titleInput = document.getElementById('title');

        function setTitleError(message) {
            titleInput.classList.remove('is-valid');
            titleInput.classList.add('is-invalid');
            let feedback = document.getElementById('titleFeedback');

            if (!feedback) {
                feedback = document.createElement('div');
                feedback.id = 'titleFeedback';
                feedback.className = 'invalid-feedback d-block';
                titleInput.insertAdjacentElement('afterend', feedback);
            }

            feedback.textContent = message;
        }

        function clearTitleError() {
            titleInput.classList.remove('is-invalid', 'is-valid');
            const feedback = document.getElementById('titleFeedback');

            if (feedback) {
                feedback.textContent = '';
            }
        }

        titleInput.addEventListener('input', function () {
            if (this.value.trim() !== '') {
                clearTitleError();
            }
        });

        acquisitionForm.addEventListener('submit', function (event) {
            if (titleInput.value.trim() === '') {
                event.preventDefault();
                setTitleError('Tên sách không được để trống');
                titleInput.focus();
            } else {
                titleInput.classList.remove('is-invalid');
                titleInput.classList.add('is-valid');
            }
        });
    </script>
</div>
</body>
</html>
