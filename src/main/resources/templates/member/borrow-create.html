<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="#{member.borrowCreate.title}">Online Book Loan Request</title>
    <link rel="stylesheet" th:href="@{/css/pages/member/borrow-create.css}" />
  </head>
<body>
<div layout:fragment="content" class="container member-borrow-create-page member-palette-page">
    <header class="member-dashboard-hero member-borrow-create-hero">
        <div class="member-borrow-create-hero-copy">
            <span th:text="#{member.borrowCreate.eyebrow}">CREATE A LOAN REQUEST</span>
            <h1 th:text="#{member.borrowCreate.title}">Online Book Loan Request</h1>
            <p th:text="#{member.borrowCreate.description}">Review the selected book and choose a borrowing period before submitting.</p>
        </div>
    </header>

    <section class="member-borrow-create-card member-reference-list" th:aria-label="#{member.borrowCreate.title}">
        <form th:action="@{/member/borrow/request/submit}" method="post" class="member-borrow-create-form">
                <input type="hidden" name="bookId" th:value="${selectedBookId}" />

                <div class="member-reference-list__header member-borrow-create-summary">
                    <article class="member-borrow-create-summary-item">
                        <span class="member-borrow-create-summary-icon" aria-hidden="true"><i class="bi bi-person"></i></span>
                        <div>
                            <small th:text="#{member.borrowCreate.account}">Requesting Account:</small>
                            <strong th:text="${currentMemberName}">Username</strong>
                        </div>
                    </article>

                    <article class="member-borrow-create-summary-item" th:if="${selectedBook != null}">
                        <span class="member-borrow-create-summary-icon" aria-hidden="true"><i class="bi bi-book"></i></span>
                        <div>
                            <small th:text="#{member.borrowCreate.book}">Book</small>
                            <strong th:text="${selectedBook.title}">Book Title</strong>
                            <span th:text="${selectedBook.isbn != null ? 'ISBN: ' + selectedBook.isbn : #messages.msg('book.isbn.missing')}">ISBN</span>
                        </div>
                    </article>
                </div>

                <div class="member-reference-list__body member-borrow-create-body">
                    <div class="member-borrow-create-field">
                        <label for="borrowDuration" th:text="#{member.borrowCreate.duration}">Preferred Loan Period</label>
                        <select id="borrowDuration" name="numberOfDays" required>
                            <option th:if="${maxBorrowDays < 7}"
                                    th:value="${maxBorrowDays}"
                                    th:text="#{member.borrowCreate.configuredTerm(${maxBorrowDays})}"
                                    selected>Configured period</option>
                            <option th:if="${maxBorrowDays >= 7}"
                                    value="7"
                                    th:selected="${maxBorrowDays < 14}"
                                    th:text="#{member.borrowCreate.shortTerm}">Short-term (7 days)</option>
                            <option th:if="${maxBorrowDays >= 14}"
                                    value="14"
                                    selected
                                    th:text="#{member.borrowCreate.standard}">Standard (14 days)</option>
                            <option th:if="${maxBorrowDays >= 30}"
                                    value="30"
                                    th:text="#{member.borrowCreate.longTerm}">Long-term (30 days)</option>
                        </select>
                        <div class="member-borrow-create-help">
                            <i class="bi bi-info-circle" aria-hidden="true"></i>
                            <div>
                                <span th:text="#{member.borrowCreate.notice}">After submission, the request will await librarian approval.</span>
                                <small th:text="#{member.borrowCreate.maxDays(${maxBorrowDays})}">Maximum loan period: 14 days.</small>
                            </div>
                        </div>
                    </div>

                    <div class="member-borrow-create-actions">
                        <a th:href="@{/member/dashboard}" class="member-ui-button member-ui-button--secondary" th:text="#{common.cancel}">Cancel</a>
                        <button type="submit" class="member-ui-button member-ui-button--primary">
                            <i class="bi bi-send" aria-hidden="true"></i>
                            <span th:text="#{member.borrowCreate.submit}">Submit for Approval</span>
                        </button>
                    </div>
                </div>
        </form>
    </section>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            var successMessage = /*[[${successMessage}]]*/ null;
            var errorMessage = /*[[${errorMessage}]]*/ null;
            if (successMessage && window.AppFeedback) window.AppFeedback.success(successMessage);
            if (errorMessage && window.AppFeedback) window.AppFeedback.error(errorMessage);
        });
    </script>
</div>
</body>
</html>
