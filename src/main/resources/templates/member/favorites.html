<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title>Sách Yêu Thích</title>
</head>

<body>
    <div layout:fragment="content" class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0" style="color: #4a3b32;"><i class="bi bi-heart-fill text-danger me-2"></i>Sách Yêu Thích</h2>
            <a th:href="@{/books}" class="btn btn-primary" style="background-color: #8b5a2b; border: none;"><i class="bi bi-search"></i> Khám phá thêm</a>
        </div>

        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4 py-3" style="width: 35%;">Tên Sách</th>
                                <th class="py-3" style="width: 20%;">Tác giả</th>
                                <th class="py-3" style="width: 15%;">Ngày thêm</th>
                                <th class="py-3" style="width: 15%;">Tình trạng</th>
                                <th class="text-end pe-4 py-3" style="width: 15%;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Dữ liệu mẫu (Dummy data) -->
                            <tr>
                                <td class="ps-4 py-3">
                                    <div class="d-flex align-items-center">
                                        <img src="https://picsum.photos/seed/10/100/150" class="rounded me-4 shadow-sm" alt="Book" style="width: 50px; height: 70px; object-fit: cover;">
                                        <div>
                                            <h6 class="mb-2 fw-bold text-dark">Đất Rừng Phương Nam</h6>
                                            <span class="badge bg-secondary">Văn học Việt Nam</span>
                                        </div>
                                    </div>
                                </td>
                                <td>Đoàn Giỏi</td>
                                <td class="text-muted">20/10/2026</td>
                                <td><span class="badge bg-success">Sẵn sàng</span></td>
                                <td class="text-end pe-4">
                                    <div class="d-flex flex-column flex-md-row gap-2 justify-content-md-end">
                                        <button class="btn btn-sm btn-outline-primary fw-bold" style="width: 110px;" onclick="showToast('Chức năng mượn sách đang được phát triển!')"><i class="bi bi-cart-plus"></i> Mượn</button>
                                        <button class="btn btn-sm btn-outline-danger" style="width: 110px;" onclick="showToast('Đã xóa khỏi danh sách yêu thích!')"><i class="bi bi-trash"></i> Bỏ thích</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="ps-4 py-3">
                                    <div class="d-flex align-items-center">
                                        <img src="https://picsum.photos/seed/15/100/150" class="rounded me-4 shadow-sm" alt="Book" style="width: 50px; height: 70px; object-fit: cover;">
                                        <div>
                                            <h6 class="mb-2 fw-bold text-dark">Nhà Giả Kim</h6>
                                            <span class="badge bg-secondary">Tiểu thuyết</span>
                                        </div>
                                    </div>
                                </td>
                                <td>Paulo Coelho</td>
                                <td class="text-muted">18/10/2026</td>
                                <td><span class="badge bg-warning text-dark">Đang mượn</span></td>
                                <td class="text-end pe-4">
                                    <div class="d-flex flex-column flex-md-row gap-2 justify-content-md-end">
                                        <button class="btn btn-sm btn-outline-primary fw-bold" style="width: 110px;" onclick="showToast('Chức năng đặt trước đang được phát triển!')"><i class="bi bi-bookmark-plus"></i> Đặt trước</button>
                                        <button class="btn btn-sm btn-outline-danger" style="width: 110px;" onclick="showToast('Đã xóa khỏi danh sách yêu thích!')"><i class="bi bi-trash"></i> Bỏ thích</button>
                                    </div>
                                </td>
                            </tr>
                            <tr>
                                <td class="ps-4 py-3">
                                    <div class="d-flex align-items-center">
                                        <img src="https://picsum.photos/seed/32/100/150" class="rounded me-4 shadow-sm" alt="Book" style="width: 50px; height: 70px; object-fit: cover;">
                                        <div>
                                            <h6 class="mb-2 fw-bold text-dark">Tâm Lý Học Tội Phạm</h6>
                                            <span class="badge bg-secondary">Tâm lý học</span>
                                        </div>
                                    </div>
                                </td>
                                <td>T Stanton Samenow</td>
                                <td class="text-muted">15/10/2026</td>
                                <td><span class="badge bg-success">Sẵn sàng</span></td>
                                <td class="text-end pe-4">
                                    <div class="d-flex flex-column flex-md-row gap-2 justify-content-md-end">
                                        <button class="btn btn-sm btn-outline-primary fw-bold" style="width: 110px;" onclick="showToast('Chức năng mượn sách đang được phát triển!')"><i class="bi bi-cart-plus"></i> Mượn</button>
                                        <button class="btn btn-sm btn-outline-danger" style="width: 110px;" onclick="showToast('Đã xóa khỏi danh sách yêu thích!')"><i class="bi bi-trash"></i> Bỏ thích</button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
