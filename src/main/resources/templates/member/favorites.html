<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title>Sách Yêu Thích</title>
    <style>
        .favorites-page {
            max-width: 1250px;
        }

        .favorites-title {
            color: #4a3b32;
            font-family: 'Playfair Display', serif;
        }

        .favorite-heart {
            color: #a26035;
        }

        .favorite-card {
            border: 1px solid rgba(139, 90, 43, 0.12);
            border-left: 4px solid #8b5a2b;
            border-radius: 8px;
            overflow: hidden;
        }

        .favorite-table thead th {
            background: #fdfbf7;
            color: #4a3b32;
            border-bottom: 1px solid rgba(139, 90, 43, 0.18);
            font-weight: 700;
        }

        .favorite-table tbody tr {
            transition: background-color 0.15s ease;
        }

        .favorite-table tbody tr:hover {
            background-color: #fffaf2;
        }

        .favorite-cover {
            width: 56px;
            height: 78px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid rgba(139, 90, 43, 0.12);
        }

        .genre-badge {
            background: #eee4d6;
            color: #5f4736;
            border: 1px solid rgba(139, 90, 43, 0.15);
            font-weight: 600;
        }

        .status-badge {
            background: #e6f2e8;
            color: #2f6b3f;
            border: 1px solid rgba(47, 107, 63, 0.18);
            font-weight: 700;
        }

        .status-badge.unavailable {
            background: #f5eadf;
            color: #8b5a2b;
            border-color: rgba(139, 90, 43, 0.2);
        }

        .btn-favorite-classic {
            border-color: #8b5a2b;
            color: #8b5a2b;
            background: #fff;
            font-weight: 700;
        }

        .btn-favorite-classic:hover,
        .btn-favorite-classic:focus {
            background: #8b5a2b;
            border-color: #8b5a2b;
            color: #fff;
        }

        .btn-favorite-soft {
            border-color: rgba(139, 90, 43, 0.32);
            color: #6b4b35;
            background: #fdfbf7;
            font-weight: 700;
        }

        .btn-favorite-soft:hover,
        .btn-favorite-soft:focus {
            background: #eadfce;
            border-color: #8b5a2b;
            color: #4a3b32;
        }
    </style>
</head>

<body>
    <div layout:fragment="content" class="container favorites-page mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <div>
                <h2 class="favorites-title fw-bold mb-1">
                    <i class="bi bi-heart-fill favorite-heart me-2"></i>Sách Yêu Thích
                </h2>
                <div class="text-muted">
                    Những cuốn sách bạn đã lưu để đọc sau
                </div>
            </div>
            <a th:href="@{/books}" class="btn btn-classic">
                <i class="bi bi-search me-1"></i>Khám phá thêm
            </a>
        </div>

        <div class="card favorite-card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table favorite-table align-middle mb-0">
                        <thead>
                            <tr>
                                <th class="ps-4 py-3" style="width: 36%;">Tên sách</th>
                                <th class="py-3" style="width: 20%;">Tác giả</th>
                                <th class="py-3" style="width: 14%;">Ngày thêm</th>
                                <th class="py-3" style="width: 14%;">Tình trạng</th>
                                <th class="text-end pe-4 py-3" style="width: 16%;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                        <tr th:each="favorite : ${favorites}">
                            <td class="ps-4 py-3">
                                <div class="d-flex align-items-center">
                                    <img th:src="@{'https://picsum.photos/seed/' + ${favorite.book.bookId} + '/100/150'}"
                                         class="favorite-cover me-3 shadow-sm"
                                         alt="Book"
                                         >

                                    <div>
                                        <h6 class="mb-2 fw-bold"
                                            style="color:#2c1e16;"
                                            th:text="${favorite.book.title}">
                                            Tên sách
                                        </h6>

                                        <span class="badge genre-badge"
                                              th:text="${favorite.book.genre != null ? favorite.book.genre.genreName : 'Chưa phân loại'}">
                                            Thể loại
                                        </span>
                                    </div>
                                </div>
                            </td>

                            <td>
        <span th:if="${favorite.book.authors != null && !favorite.book.authors.isEmpty()}"
              th:text="${favorite.book.authors.iterator().next().authorName}">
            Tác giả
        </span>

                                <span th:unless="${favorite.book.authors != null && !favorite.book.authors.isEmpty()}">
            Chưa rõ
        </span>
                            </td>

                            <td class="text-muted">
                                -
                            </td>

                            <td>
                                <span class="badge status-badge"
                                      th:classappend="${favorite.book.status == 'Active'} ? '' : ' unavailable'"
                                      th:text="${favorite.book.status == 'Active' ? 'Sẵn sàng' : 'Không có sẵn'}">
                                    Sẵn sàng
                                </span>
                            </td>

                            <td class="text-end pe-4">
                                <div class="d-flex flex-column flex-md-row gap-2 justify-content-md-end">
                                    <button class="btn btn-sm btn-favorite-classic"
                                            style="width: 110px;"
                                            onclick="showToast('Chức năng mượn sách đang được phát triển!')">
                                        Mượn
                                    </button>

                                    <form th:action="@{'/member/interaction/favorites/' + ${favorite.book.bookId} + '/remove'}"
                                          method="post">
                                        <button type="submit"
                                                class="btn btn-sm btn-favorite-soft"
                                                style="width: 110px;">
                                            Bỏ thích
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${favorites == null || favorites.isEmpty()}">
                            <td colspan="5" class="text-center text-muted py-5">
                                <i class="bi bi-heart fs-2 d-block mb-2" style="color:#8b5a2b;"></i>
                                Bạn chưa có sách yêu thích nào.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
