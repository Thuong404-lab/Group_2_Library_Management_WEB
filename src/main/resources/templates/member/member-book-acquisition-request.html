<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<body>

<main layout:fragment="content">

    <div class="container mt-4">

        <h2>Đề xuất mua sách mới</h2>
        <hr>

        <div th:if="${success}"
             class="alert alert-success"
             th:text="${success}">
        </div>

        <div th:if="${error}"
             class="alert alert-danger"
             th:text="${error}">
        </div>

        <form th:action="@{/member/interaction/acquisition-requests}"
              th:object="${acquisitionRequest}"
              method="post">

            <div class="mb-3">
                <label for="title" class="form-label">Tên sách</label>

                <input type="text"
                       id="title"
                       class="form-control"
                       th:field="*{title}"
                       placeholder="Nhập tên sách muốn đề xuất">

                <div class="text-danger mt-1"
                     th:if="${#fields.hasErrors('title')}"
                     th:errors="*{title}">
                </div>
            </div>

            <div class="mb-3">
                <label for="author" class="form-label">Tên tác giả</label>

                <input type="text"
                       id="author"
                       class="form-control"
                       th:field="*{author}"
                       placeholder="Nhập tên tác giả">
            </div>

            <button type="submit" class="btn btn-primary">
                Gửi đề xuất
            </button>

        </form>

    </div>

</main>

</body>
</html>
