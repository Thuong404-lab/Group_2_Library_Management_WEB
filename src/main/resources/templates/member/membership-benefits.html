<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title th:text="#{member.benefits.title}">Membership Tier Benefits</title>
    <link rel="stylesheet" th:href="@{/css/pages/member/membership-benefits.css}" />
</head>
<body>
<main layout:fragment="content" class="member-benefits-page member-palette-page">
    <div class="container member-benefits-container">
        <header class="member-benefits-hero member-dashboard-hero">
            <div class="member-benefits-hero-copy">
                <span th:text="#{member.benefits.eyebrow}">YOUR MEMBERSHIP</span>
                <h1 th:text="#{member.benefits.heading}">Your Benefits</h1>
                <p th:text="#{member.benefits.description}">Based on your current membership tier</p>
            </div>
            <a th:href="@{/member/membership/tier}" class="member-ui-button member-ui-button--inverse">
                <i class="bi bi-graph-up-arrow" aria-hidden="true"></i><span th:text="#{member.benefits.viewProgress}">View Tier Progress</span>
            </a>
        </header>
        <div class="member-benefits-alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <section class="member-benefits-card member-reference-list" th:if="${tierBenefits != null}">
            <div class="member-benefits-tier member-reference-list__header">
                <span th:text="#{member.tier.current}">Current Membership Tier</span>
                <h2 th:text="${tierBenefits.tierName}">Tier</h2>
            </div>
            <div class="member-benefits-body member-reference-list__body">
                <div class="member-benefits-metrics">
                    <article class="member-reference-list__item"><i class="bi bi-book" aria-hidden="true"></i><span th:text="#{member.benefits.maxLimit}">Maximum Limit</span><strong th:text="#{common.bookCount(${tierBenefits.borrowLimit})}">3 books</strong></article>
                    <article class="member-reference-list__item"><i class="bi bi-percent" aria-hidden="true"></i><span th:text="#{member.tier.discount}">Discount</span><strong th:text="${tierBenefits.discountPercent} + '%'">0%</strong></article>
                </div>
                <article class="member-benefits-detail member-reference-list__item">
                    <div><i class="bi bi-gift" aria-hidden="true"></i><h3 th:text="#{member.benefits.details}">Benefit Details</h3></div>
                    <p th:if="${tierBenefits.discountPercent > 0}" th:text="#{public.tiers.benefits.dynamic(${#numbers.formatDecimal(tierBenefits.discountPercent, 0, 'COMMA', 0, 'POINT')}, ${tierBenefits.borrowLimit})}"></p>
                    <p th:if="${tierBenefits.discountPercent == 0}" th:text="#{public.tiers.benefits.dynamicNoDiscount(${tierBenefits.borrowLimit})}"></p>
                    <p th:if="${tierBenefits.benefits != null && !tierBenefits.benefits.trim().isEmpty() && !tierBenefits.benefits.startsWith('Giảm') && !tierBenefits.benefits.startsWith('Mượn') && !tierBenefits.benefits.startsWith('Borrow') && !tierBenefits.benefits.contains('discount')}" th:text="${tierBenefits.benefits}"></p>
                </article>
            </div>
        </section>

        <section class="member-benefits-empty member-reference-list__item" th:if="${tierBenefits == null && errorMessage == null}">
            <i class="bi bi-person-exclamation" aria-hidden="true"></i>
            <h2 th:text="#{member.benefits.noData}">No tier benefit configuration was found for your account.</h2>
            <a th:href="@{/membership-tiers}" class="member-ui-button member-ui-button--secondary" th:text="#{public.tiers.heading}">Explore membership tiers</a>
        </section>
    </div>
</main>
</body>
</html>
