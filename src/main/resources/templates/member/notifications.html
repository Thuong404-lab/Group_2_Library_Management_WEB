<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/base}"
>
  <body>
    <main layout:fragment="content">
      <div class="container mt-4">
        <h2>Thông báo của tôi</h2>
        <hr />

        <div
          th:if="${success}"
          class="alert alert-success"
          th:text="${success}"
        ></div>
        <div
          th:if="${error}"
          class="alert alert-danger"
          th:text="${error}"
        ></div>

        <table class="table table-striped table-hover mt-3">
          <thead class="table-dark">
            <tr>
              <th>Tiêu đề</th>
              <th>Nội dung</th>
              <th>Ngày gửi</th>
              <th class="text-end">Hành động</th>
            </tr>

          </thead>

          <tbody>
            <tr th:each="notification : ${notifications}">
              <td th:text="${notification.title}">Tiêu đề</td>

              <td th:text="${notification.content}">Nội dung</td>

              <td
                th:text="${#temporals.format(notification.sentDate, 'dd/MM/yyyy HH:mm')}"
              >
                Ngày gửi
              </td>

              <td class="text-end" style="white-space: nowrap;">
                <form
                  th:action="@{/member/interaction/notifications/delete/{id}(id=${notification.notificationId})}"
                  method="post"
                  style="display:inline;"
                >
                  <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa">
                    <i class="bi bi-trash"></i> Xóa
                  </button>
                </form>
              </td>
            </tr>


            <tr th:if="${notifications == null || notifications.isEmpty()}">
              <td colspan="3" class="text-center">
                Bạn chưa có thông báo nào.
              </td>
            </tr>
          </tbody>
        </table>

        <div class="d-flex gap-2 mt-3">
          <form th:action="@{/member/interaction/notifications/delete-all}" method="post">
            <button type="submit" class="btn btn-danger">
              <i class="bi bi-trash me-2"></i>Xóa tất cả
            </button>
          </form>

          <a th:href="@{/}" class="btn btn-secondary"> Quay lại </a>
        </div>

      </div>
    </main>
  </body>
</html>
