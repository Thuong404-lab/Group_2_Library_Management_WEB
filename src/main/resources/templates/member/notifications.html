<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
  <title>Thông báo của tôi</title>
  <link rel="stylesheet" th:href="@{/css/pages/member/notifications.css}" />
</head>
<body>
<main layout:fragment="content" class="member-notifications-page">
  <div class="member-notifications-container">
    <header class="member-notifications-header">
      <div>
        <span class="member-notifications-eyebrow">TRUNG TÂM THÔNG BÁO</span>
        <h1>Thông báo của tôi</h1>
        <p>Cập nhật mới nhất từ thư viện về hoạt động và tài khoản của bạn.</p>
      </div>
      <a th:href="@{/}" class="member-notifications-back"><i class="bi bi-arrow-left" aria-hidden="true"></i><span>Về trang chủ</span></a>
    </header>

    <div th:if="${success}" class="member-notifications-alert is-success" th:text="${success}"></div>
    <div th:if="${error}" class="member-notifications-alert is-error" th:text="${error}"></div>

    <section class="member-notifications-card" aria-label="Danh sách thông báo">
      <div class="member-notifications-list" th:if="${notifications != null && !notifications.isEmpty()}">
        <article class="member-notification-row" th:each="notification : ${notifications}">
          <span class="member-notification-row-icon"><i class="bi bi-bell" aria-hidden="true"></i></span>
          <div class="member-notification-row-content">
            <h2 th:text="${notification.title}">Tiêu đề</h2>
            <p th:text="${notification.content}">Nội dung</p>
          </div>
          <time class="member-notification-row-time" th:datetime="${notification.sentDate}" th:text="${notification.sentDate != null ? #temporals.format(notification.sentDate, 'dd/MM/yyyy · HH:mm') : 'N/A'}">Ngày gửi</time>
        </article>
      </div>
      <div class="member-notifications-empty" th:if="${notifications == null || notifications.isEmpty()}">
        <span><i class="bi bi-bell-slash" aria-hidden="true"></i></span>
        <h2>Chưa có thông báo</h2>
        <p>Các cập nhật mới từ thư viện sẽ xuất hiện tại đây.</p>
      </div>
    </section>
  </div>
</main>
</body>
</html>
