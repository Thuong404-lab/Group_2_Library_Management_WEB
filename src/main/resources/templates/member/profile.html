<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title th:text="#{member.profile.title}">My Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/pages/member/profile.css}" />
  </head>

<body>
<div layout:fragment="content" class="container mt-4 mb-5">
    <h2 class="page-title mb-4" th:text="#{member.profile.heading}">My Profile</h2>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm u-background-color-f0fff4-color-2f855a-85044379" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="close u-color-2f855a-3ab9db54" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm u-background-color-fff5f5-color-c53030-0e7ed3fe" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="close u-color-c53030-c575d87d" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>
    </div>
    <div th:if="${passwordSuccess}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm u-background-color-f0fff4-color-2f855a-85044379" role="alert">
        <i class="bi bi-shield-check me-2"></i><span th:text="${passwordSuccess}"></span>
        <button type="button" class="close u-color-2f855a-3ab9db54" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>
    </div>
    <div th:if="${passwordError}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm u-background-color-fff5f5-color-c53030-0e7ed3fe" role="alert">
        <i class="bi bi-shield-x me-2"></i><span th:text="${passwordError}"></span>
        <button type="button" class="close u-color-c53030-c575d87d" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">&times;</span></button>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4 mb-3 mb-md-0">
            <div class="card card-stat-classic p-3 h-100">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <span class="text-uppercase stat-label mb-1 d-block" th:text="#{member.profile.activeLoans}">Active Loans</span>
                        <h2 class="mb-0 stat-value" th:text="${activeBorrowsCount}">0</h2>
                    </div>
                    <i class="bi bi-book fs-1 member-profile-i-color-05"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3 mb-md-0">
            <div class="card card-stat-classic p-3 h-100 member-profile-div-border-left-color-06">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <span class="text-uppercase stat-label mb-1 d-block" th:text="#{member.profile.tier}">Membership Tier</span>
                        <h2 class="mb-0 stat-value member-profile-h2-font-size-07"
                            th:text="${membership.tier == null ? #messages.msg('tier.standard') : (membership.tier.tierName == 'Regular' ? #messages.msg('tier.regular') : (membership.tier.tierName == 'Silver' ? #messages.msg('tier.silver') : (membership.tier.tierName == 'Gold' ? #messages.msg('tier.gold') : (membership.tier.tierName == 'Diamond' ? #messages.msg('tier.diamond') : membership.tier.tierName))))}">Regular</h2>
                    </div>
                    <i class="bi bi-person-badge fs-1 member-profile-i-color-08"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3 mb-md-0">
            <div class="card card-stat-classic p-3 h-100 member-profile-div-border-left-color-09">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <span class="text-uppercase stat-label mb-1 d-block" th:text="#{member.profile.borrowLimit}">Borrowing Limit</span>
                        <h2 class="mb-0 stat-value" th:text="#{book.count(${membership.tier != null ? membership.tier.borrowLimit : 3})}">3 books</h2>
                    </div>
                    <i class="bi bi-exclamation-circle fs-1 member-profile-i-color-10"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card card-profile-classic mb-4">
                <div class="card-body text-center p-4 u-background-color-fdfbf7-71083b05">
                    <div class="avatar-container-classic mb-3">
                        <div th:if="${member?.avatar == null}" id="avatarPlaceholder" class="rounded-circle d-flex align-items-center justify-content-center text-white shadow w-100 h-100 u-background-color-8b5a2b-font-size-3rem-font-family-playfair-display-seri-21f7ac93"

                             th:text="${member != null ? #strings.substring(member.fullName, 0, 1).toUpperCase() : 'M'}">M</div>
                        <img th:if="${member?.avatar != null}" id="avatarPreview" th:src="${member.avatar}" class="rounded-circle border border-3 border-white shadow w-100 h-100 u-object-fit-cover-fd3ff4b2">
                        <img th:if="${member?.avatar == null}" id="avatarPreview" src="" class="rounded-circle border border-3 border-white shadow d-none w-100 h-100 u-object-fit-cover-fd3ff4b2">

                        <label for="avatarUpload" class="btn btn-camera-classic rounded-circle d-flex align-items-center justify-content-center m-0 shadow-sm" th:title="#{member.profile.changeAvatar}">
                            <i class="bi bi-camera-fill u-font-size-0-85rem-4908cb0a"></i>
                        </label>
                    </div>
                    <h4 class="fw-bold mb-1 font-playfair u-color-2c1e16-5ab7ae80" th:text="${member?.fullName}">Member Name</h4>
                    <p class="text-muted small mb-3" th:text="${member?.email}">email@example.com</p>

                    <div class="d-flex justify-content-center mb-2 u-gap-12px-58cf3fe5">
                        <span class="badge badge-classic-status" th:text="#{member.profile.reader}">Library Member</span>
                        <span th:if="${member?.status?.name() == 'Active'}" class="badge badge-classic-status badge-classic-success" th:text="#{account.status.active}">Active</span>
                        <span th:if="${member?.status?.name() != 'Active'}" class="badge badge-classic-status text-danger border-danger"
                              th:text="${member?.status?.name() == 'Inactive' ? #messages.msg('account.status.inactive') : (member?.status?.name() == 'Blocked' ? #messages.msg('account.status.blocked') : member?.status)}">Status</span>
                    </div>
                    <hr class="member-profile-hr-border-top-17">

                    <div class="d-flex justify-content-between text-start small mt-2 px-1">
                        <span class="text-muted fw-medium" th:text="#{member.profile.readerTier}">Member tier:</span>
                        <span class="fw-bold font-playfair member-profile-span-color-font-size-18"
                              th:text="${membership.tier == null ? #messages.msg('tier.standard') : (membership.tier.tierName == 'Regular' ? #messages.msg('tier.regular') : (membership.tier.tierName == 'Silver' ? #messages.msg('tier.silver') : (membership.tier.tierName == 'Gold' ? #messages.msg('tier.gold') : (membership.tier.tierName == 'Diamond' ? #messages.msg('tier.diamond') : membership.tier.tierName))))}">Regular</span>
                    </div>
                </div>
            </div>

            <div class="card card-profile-classic" th:if="${#authentication.principal.attributes == null}">
                <div class="card-body p-4 u-background-color-fdfbf7-71083b05">
                    <h6 class="fw-bold mb-3 font-playfair u-color-4a3b32-1ba01220" th:text="#{member.profile.security}">Account Security</h6>
                    <button class="btn btn-classic-outline w-100 fw-bold" data-toggle="modal" data-target="#changePasswordModal" th:disabled="${isInactiveMember}" th:text="#{member.profile.changePassword}">Change Password</button>
                </div>
            </div>

            <div class="card card-profile-classic" th:if="${#authentication.principal.attributes != null}">
                <div class="card-body p-4 text-center u-background-color-fdfbf7-71083b05">
                    <i class="bi bi-google mb-2 d-block member-profile-i-font-size-color-20"></i>
                    <h6 class="fw-bold mb-1 font-playfair u-color-4a3b32-1ba01220" th:text="#{member.profile.googleAccount}">Google Account</h6>
                    <p class="text-muted small mb-0 fst-italic" th:text="#{member.profile.googleDescription}">Your account signs in through Google.</p>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card card-profile-classic h-100">
                <div class="card-header-classic px-4">
                    <h5 class="fw-bold mb-0 font-playfair u-color-4a3b32-1ba01220" th:text="#{member.profile.details}">Account Details</h5>
                </div>
                <div class="card-body-classic">
                    <form th:action="@{/member/profile/update}" method="post" enctype="multipart/form-data">
                        <input type="file" id="avatarUpload" name="avatarFile" accept="image/*" class="d-none">
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.fullName}">Full Name</label>
                                <input type="text" name="fullName" class="form-control form-control-classic py-2" th:value="${member?.fullName}" maxlength="50" required th:readonly="${isInactiveMember}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.username}">Username</label>
                                <input type="text" class="form-control form-control-classic py-2" th:value="${#authentication.name}" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.email}">Email Address</label>
                                <input type="email" name="email" class="form-control form-control-classic py-2" th:value="${member?.email}" required th:readonly="${isInactiveMember}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.phone}">Phone Number</label>
                                <input type="tel" name="phone" class="form-control form-control-classic py-2" th:value="${member?.phone}" required th:readonly="${isInactiveMember}">
                            </div>

                            <div class="col-12 mt-3 text-end">
                                <button type="submit" class="btn btn-classic-primary fw-bold px-4 shadow-sm" th:disabled="${isInactiveMember}" th:text="#{member.profile.save}">Save Changes</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content modal-content-classic shadow-lg">
                    <div class="modal-header modal-header-classic">
                        <h5 class="modal-title fw-bold font-playfair u-color-4a3b32-1ba01220"><i class="bi bi-shield-lock-fill text-muted me-2"></i><span th:text="#{member.profile.passwordTitle}">Change Secure Password</span></h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    </div>
                    <form th:action="@{/member/change-password}" method="post" class="m-0">
                        <div class="modal-body p-4 u-background-color-fdfbf7-71083b05">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.currentPassword}">Current Password</label>
                                <input type="password" name="oldPassword" class="form-control form-control-classic py-2" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.newPassword}">New Password</label>
                                <input type="password" name="newPassword" class="form-control form-control-classic py-2" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small" th:text="#{member.profile.confirmPassword}">Confirm New Password</label>
                                <input type="password" name="confirmPassword" class="form-control form-control-classic py-2" required>
                            </div>
                        </div>
                        <div class="modal-footer border-0 p-3 u-background-color-fdfbf7-71083b05">
                            <button type="button" class="btn btn-light rounded px-3 fw-bold small member-profile-button-background-21" data-dismiss="modal" th:text="#{common.cancel}">Cancel</button>
                            <button type="submit" class="btn btn-classic-primary fw-bold px-4 shadow-sm"><i class="bi bi-shield-check me-1"></i><span th:text="#{member.profile.updatePassword}">Update Password</span></button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const fileInput = document.getElementById('avatarUpload');
        const avatarPreview = document.getElementById('avatarPreview');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');

        if(fileInput) {
            fileInput.addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        if(avatarPlaceholder) avatarPlaceholder.classList.add('d-none');
                        if(avatarPreview) {
                            avatarPreview.src = e.target.result;
                            avatarPreview.classList.remove('d-none');
                        }
                    }
                    reader.readAsDataURL(file);
                }
            });
        }
    });
</script>

</body>
</html>
