<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title>Hồ Sơ Cá Nhân</title>
</head>

<body>
    <div layout:fragment="content" class="container mt-4 mb-5">
        <h2 class="fw-bold mb-4">Hồ Sơ Cá Nhân</h2>

    <!-- Alerts -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${passwordSuccess}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-shield-check me-2"></i><span th:text="${passwordSuccess}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${passwordError}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-shield-x me-2"></i><span th:text="${passwordError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

        <div class="row g-4">
            <!-- Profile Card -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-3 mb-4">
                    <div class="card-body text-center p-4">
                        <div class="position-relative d-inline-block mb-3">
                            <div th:if="${member?.avatar == null}" id="avatarPlaceholder" class="rounded-circle d-flex align-items-center justify-content-center mx-auto border border-3 border-white shadow-sm" 
                                 style="width: 120px; height: 120px; background-color: #8b5a2b; color: white; font-size: 3rem; font-family: 'Playfair Display', serif;"
                                 th:text="${member != null ? #strings.substring(member.fullName, 0, 1).toUpperCase() : 'M'}">M</div>
                            <img th:if="${member?.avatar != null}" id="avatarPreview" th:src="${member.avatar}" class="rounded-circle mx-auto border border-3 border-white shadow-sm" style="width: 120px; height: 120px; object-fit: cover;">
                            <img th:if="${member?.avatar == null}" id="avatarPreview" src="" class="rounded-circle mx-auto border border-3 border-white shadow-sm d-none" style="width: 120px; height: 120px; object-fit: cover;">
                            
                            <!-- Label liên kết với thẻ input file ẩn bên dưới -->
                            <label for="avatarUpload" class="btn btn-sm position-absolute bottom-0 end-0 rounded-circle text-white shadow-sm" style="width: 32px; height: 32px; background-color: #d97706; cursor: pointer;" title="Đổi ảnh đại diện"><i class="bi bi-camera-fill"></i></label>
                        </div>
                        <h4 class="fw-bold mb-1" style="color: #4a3b32;" th:text="${member?.fullName}">Tên Thành Viên</h4>
                        <p class="text-muted mb-3" th:text="${member?.email}">email@example.com</p>
                        <div class="d-flex justify-content-center gap-2 mb-3">
                            <span class="badge px-3 py-2" style="background-color: #8b5a2b; color: white;">Thành viên</span>
                            <span th:if="${member?.status?.name() == 'Active'}" class="badge bg-success text-white px-3 py-2"><i class="bi bi-check-circle-fill me-1"></i> Hoạt động</span>
                            <span th:if="${member?.status?.name() != 'Active'}" class="badge bg-danger text-white px-3 py-2" th:text="${member?.status}">Trạng thái</span>
                        </div>
                        <hr style="border-color: rgba(139, 90, 43, 0.2) !important;">
                        <div class="d-flex justify-content-between text-start small mt-2">
                            <span class="text-muted">Hạng thành viên:</span>
                            <span class="fw-bold" style="color: #d97706;">Tiêu chuẩn</span>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-3" th:if="${#authentication.principal.attributes == null}">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3" style="color: #4a3b32;"><i class="bi bi-shield-lock-fill text-danger me-2"></i>Bảo mật tài khoản</h6>
                        <button class="btn w-100 mb-2 fw-bold" style="border: 2px solid #8b5a2b; color: #8b5a2b;" data-bs-toggle="modal" data-bs-target="#changePasswordModal">Đổi mật khẩu</button>
                    </div>
                </div>
                
                <div class="card border-0 shadow-sm rounded-3" th:if="${#authentication.principal.attributes != null}">
                    <div class="card-body p-4 text-center">
                        <i class="bi bi-google mb-2" style="font-size: 2rem; color: #DB4437;"></i>
                        <h6 class="fw-bold mb-2" style="color: #4a3b32;">Tài khoản Google</h6>
                        <p class="text-muted small mb-0">Tài khoản của bạn được liên kết với Google. Không cần đổi mật khẩu.</p>
                    </div>
                </div>
            </div>

            <!-- Profile Form -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-3 h-100">
                    <div class="card-header bg-white border-0 pt-4 pb-0">
                        <h5 class="fw-bold mb-0" style="color: #4a3b32;">Thông tin chi tiết</h5>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/member/profile/update}" method="post" enctype="multipart/form-data">
                            <!-- Nút chọn file ẩn (được nhấn thông qua label nút camera) -->
                            <input type="file" id="avatarUpload" name="avatarFile" accept="image/*" class="d-none">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small">Họ và Tên</label>
                                    <input type="text" name="fullName" class="form-control" th:value="${member?.fullName}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small">Tên đăng nhập (Username)</label>
                                    <input type="text" class="form-control bg-light" th:value="${#authentication.name}" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small">Email</label>
                                    <input type="email" name="email" class="form-control" th:value="${member?.email}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small">Số điện thoại</label>
                                    <input type="tel" name="phone" class="form-control" th:value="${member?.phone}" required>
                                </div>
                                
                                <div class="col-12 mt-4 text-end">
                                    <button type="submit" class="btn px-4 fw-bold shadow-sm" style="background-color: #8b5a2b; color: white;">Cập nhật thông tin</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

        <!-- Change Password Modal -->
        <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow">
                    <div class="modal-header border-bottom-0 pb-0">
                        <h5 class="modal-title fw-bold" style="color: #4a3b32;"><i class="bi bi-shield-lock-fill text-danger me-2"></i>Đổi mật khẩu</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/member/change-password}" method="post">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Mật khẩu hiện tại</label>
                                <input type="password" name="oldPassword" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Mật khẩu mới</label>
                                <input type="password" name="newPassword" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Xác nhận mật khẩu mới</label>
                                <input type="password" name="confirmPassword" class="form-control" required>
                            </div>
                        </div>
                        <div class="modal-footer border-top-0 pt-0">
                            <button type="button" class="btn btn-light rounded-pill fw-bold" data-bs-dismiss="modal">Hủy</button>
                            <button type="submit" class="btn rounded-pill fw-bold text-white shadow-sm" style="background-color: #8b5a2b;">Cập nhật mật khẩu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>


    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const fileInput = document.getElementById('avatarUpload');
        const avatarPreview = document.getElementById('avatarPreview');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');

        if(fileInput) {
            fileInput.addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        if(avatarPlaceholder) avatarPlaceholder.classList.add('d-none');
                        if(avatarPreview) {
                            avatarPreview.src = e.target.result;
                            avatarPreview.classList.remove('d-none');
                        }
                    }
                    reader.readAsDataURL(file);
                }
            });
        }
    });
</script>

</body>
</html>
