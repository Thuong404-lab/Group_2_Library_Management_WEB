<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title>Hồ Sơ Cá Nhân</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f7f5; /* Nền giấy beige sáng đồng bộ */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        .page-title {
            color: #4a3b32;
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        /* --- CẤU TRÚC KHUNG CARD CLASSIC --- */
        .card-profile-classic {
            border: none;
            border-radius: 10px;
            background-color: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .card-header-classic {
            background-color: #ffffff;
            border-bottom: 2px solid #4a3b32; /* Đường kẻ tối giản đậm nét cổ điển */
            padding-top: 20px;
            padding-bottom: 12px;
        }

        .card-body-classic {
            background-color: #fdfbf7; /* Màu nền kem giấy */
            padding: 1.75rem;
        }

        /* --- BADGES TRẠNG THÁI CLASSIC --- */
        .badge-classic-status {
            background-color: rgba(139, 90, 43, 0.1);
            color: #8b5a2b;
            border: 1px solid rgba(139, 90, 43, 0.3);
            border-radius: 4px;
            padding: 5px 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-classic-success {
            background-color: #f0fff4;
            color: #2f855a;
            border: 1px solid #9ae6b4;
        }

        /* --- INPUT FORM CONTROL STYLE CLASSIC --- */
        .form-control-classic {
            border: 1px solid rgba(139, 90, 43, 0.2);
            color: #4a3b32;
            background-color: #fdfbf7;
            border-radius: 6px;
        }
        .form-control-classic:focus {
            border-color: #8b5a2b;
            box-shadow: 0 0 0 0.2rem rgba(139, 90, 43, 0.15);
            background-color: #ffffff;
        }
        .form-control-classic[readonly] {
            background-color: #f1f0ea;
            color: #718096;
            border-color: rgba(139, 90, 43, 0.1);
        }

        /* --- HỆ THỐNG NÚT BẤM CỔ ĐIỂN --- */
        .btn-classic-primary {
            background: #8b5a2b !important;
            border: 1px solid #8b5a2b !important;
            color: #ffffff !important;
            font-weight: 500;
            border-radius: 6px !important;
            padding: 0.5rem 1.5rem;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .btn-classic-primary:hover {
            background: #74481f !important;
            border-color: #74481f !important;
        }

        .btn-classic-outline {
            background: transparent !important;
            border: 2px solid #8b5a2b !important;
            color: #8b5a2b !important;
            font-weight: 600;
            border-radius: 6px !important;
            padding: 0.5rem 1.5rem;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .btn-classic-outline:hover {
            background: rgba(139, 90, 43, 0.08) !important;
            color: #74481f !important;
        }

        /* Nút đổi ảnh đại diện tinh tế, bớt chói chang */
        .btn-camera-classic {
            width: 34px;
            height: 34px;
            background-color: #4a3b32;
            color: #ffffff;
            border: 2px solid #ffffff;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-camera-classic:hover {
            background-color: #8b5a2b;
        }

        /* --- MODAL DIỆN MẠO MỚI --- */
        .modal-content-classic {
            background-color: #ffffff;
            border: none;
            border-radius: 12px;
            overflow: hidden;
        }
        .modal-header-classic {
            border-bottom: 2px solid #4a3b32;
            background-color: #ffffff;
            padding: 1.25rem 1.5rem;
        }
    </style>
</head>

<body>
<div layout:fragment="content" class="container mt-4 mb-5">
    <h2 class="page-title mb-4"><i class="bi bi-person-lines-fill me-2" style="color: #8b5a2b;"></i>Hồ Sơ Cá Nhân</h2>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm" style="background-color: #f0fff4; color: #2f855a;" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close" style="color: #2f855a;"><span aria-hidden="true">&times;</span></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm" style="background-color: #fff5f5; color: #c53030;" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close" style="color: #c53030;"><span aria-hidden="true">&times;</span></button>
    </div>
    <div th:if="${passwordSuccess}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm" style="background-color: #f0fff4; color: #2f855a;" role="alert">
        <i class="bi bi-shield-check me-2"></i><span th:text="${passwordSuccess}"></span>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close" style="color: #2f855a;"><span aria-hidden="true">&times;</span></button>
    </div>
    <div th:if="${passwordError}" class="alert alert-danger alert-dismissible fade show border-0 shadow-sm" style="background-color: #fff5f5; color: #c53030;" role="alert">
        <i class="bi bi-shield-x me-2"></i><span th:text="${passwordError}"></span>
        <button type="button" class="close" data-dismiss="alert" aria-label="Close" style="color: #c53030;"><span aria-hidden="true">&times;</span></button>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card card-profile-classic mb-4">
                <div class="card-body text-center p-4" style="background-color: #fdfbf7;">
                    <div class="position-relative d-inline-block mb-3">
                        <div th:if="${member?.avatar == null}" id="avatarPlaceholder" class="rounded-circle d-flex align-items-center justify-content-center mx-auto border border-3 border-white shadow"
                             style="width: 120px; height: 120px; background-color: #8b5a2b; color: white; font-size: 3rem; font-family: 'Playfair Display', serif;"
                             th:text="${member != null ? #strings.substring(member.fullName, 0, 1).toUpperCase() : 'M'}">M</div>
                        <img th:if="${member?.avatar != null}" id="avatarPreview" th:src="${member.avatar}" class="rounded-circle mx-auto border border-3 border-white shadow" style="width: 120px; height: 120px; object-fit: cover;">
                        <img th:if="${member?.avatar == null}" id="avatarPreview" src="" class="rounded-circle mx-auto border border-3 border-white shadow d-none" style="width: 120px; height: 120px; object-fit: cover;">

                        <label for="avatarUpload" class="btn btn-camera-classic position-absolute bottom-0 end-0 rounded-circle d-flex align-items-center justify-content-center m-0 shadow-sm" title="Đổi ảnh đại diện">
                            <i class="bi bi-camera-fill" style="font-size: 0.85rem;"></i>
                        </label>
                    </div>
                    <h4 class="fw-bold mb-1 font-playfair" style="color: #2c1e16;" th:text="${member?.fullName}">Tên Thành Viên</h4>
                    <p class="text-muted small mb-3" th:text="${member?.email}">email@example.com</p>

                    <div class="d-flex justify-content-center gap-2 mb-2">
                        <span class="badge badge-classic-status">Độc giả thư viện</span>
                        <span th:if="${member?.status?.name() == 'Active'}" class="badge badge-classic-status badge-classic-success"><i class="bi bi-check-circle me-1"></i>Hoạt động</span>
                        <span th:if="${member?.status?.name() != 'Active'}" class="badge badge-classic-status text-danger border-danger" th:text="${member?.status}">Trạng thái</span>
                    </div>
                    <hr style="border-top: 1px dashed rgba(139, 90, 43, 0.2) !important;">

                    <div class="d-flex justify-content-between text-start small mt-2 px-1">
                        <span class="text-muted fw-medium">Hạng độc giả:</span>
                        <span class="fw-bold font-playfair" style="color: #8b5a2b; font-size: 0.95rem;">Tiêu chuẩn</span>
                    </div>
                </div>
            </div>

            <div class="card card-profile-classic" th:if="${#authentication.principal.attributes == null}">
                <div class="card-body p-4" style="background-color: #fdfbf7;">
                    <h6 class="fw-bold mb-3 font-playfair" style="color: #4a3b32;"><i class="bi bi-shield-lock text-muted me-2"></i>Bảo mật tài khoản</h6>
                    <button class="btn btn-classic-outline w-100 fw-bold" data-toggle="modal" data-target="#changePasswordModal"><i class="bi bi-key me-1"></i>Thay đổi mật khẩu</button>
                </div>
            </div>

            <div class="card card-profile-classic" th:if="${#authentication.principal.attributes != null}">
                <div class="card-body p-4 text-center" style="background-color: #fdfbf7;">
                    <i class="bi bi-google mb-2 d-block" style="font-size: 1.8rem; color: #DB4437;"></i>
                    <h6 class="fw-bold mb-1 font-playfair" style="color: #4a3b32;">Tài khoản Google</h6>
                    <p class="text-muted small mb-0 fst-italic">Tài khoản của bạn đăng nhập thông qua liên kết Google. Không cần quản lý mật khẩu thủ công.</p>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card card-profile-classic h-100">
                <div class="card-header-classic px-4">
                    <h5 class="fw-bold mb-0 font-playfair" style="color: #4a3b32;"><i class="bi bi-pencil-square me-2" style="color: #8b5a2b;"></i>Thông tin chi tiết tài khoản</h5>
                </div>
                <div class="card-body-classic">
                    <form th:action="@{/member/profile/update}" method="post" enctype="multipart/form-data">
                        <input type="file" id="avatarUpload" name="avatarFile" accept="image/*" class="d-none">
                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-muted small">Họ và Tên độc giả</label>
                                <input type="text" name="fullName" class="form-control form-control-classic py-2" th:value="${member?.fullName}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-muted small">Tên đăng nhập (Tài khoản)</label>
                                <input type="text" class="form-control form-control-classic py-2" th:value="${#authentication.name}" readonly>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-muted small">Địa chỉ Email</label>
                                <input type="email" name="email" class="form-control form-control-classic py-2" th:value="${member?.email}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-muted small">Số điện thoại liên hệ</label>
                                <input type="tel" name="phone" class="form-control form-control-classic py-2" th:value="${member?.phone}" required>
                            </div>

                            <div class="col-12 mt-3 text-end">
                                <button type="submit" class="btn btn-classic-primary fw-bold px-4 shadow-sm"><i class="bi bi-save me-1"></i>Lưu thay đổi</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content modal-content-classic shadow-lg">
                    <div class="modal-header modal-header-classic">
                        <h5 class="modal-title fw-bold font-playfair" style="color: #4a3b32;"><i class="bi bi-shield-lock-fill text-muted me-2"></i>Thay đổi mật khẩu bảo mật</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    </div>
                    <form th:action="@{/member/change-password}" method="post" class="m-0">
                        <div class="modal-body p-4" style="background-color: #fdfbf7;">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Mật khẩu hiện tại</label>
                                <input type="password" name="oldPassword" class="form-control form-control-classic py-2" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Mật khẩu mới</label>
                                <input type="password" name="newPassword" class="form-control form-control-classic py-2" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold text-muted small">Xác nhận lại mật khẩu mới</label>
                                <input type="password" name="confirmPassword" class="form-control form-control-classic py-2" required>
                            </div>
                        </div>
                        <div class="modal-footer border-0 p-3" style="background-color: #fdfbf7;">
                            <button type="button" class="btn btn-light rounded px-3 fw-bold small" style="background-color: #e2e8f0;" data-dismiss="modal">Hủy bỏ</button>
                            <button type="submit" class="btn btn-classic-primary fw-bold px-4 shadow-sm"><i class="bi bi-shield-check me-1"></i>Cập nhật mật khẩu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const fileInput = document.getElementById('avatarUpload');
        const avatarPreview = document.getElementById('avatarPreview');
        const avatarPlaceholder = document.getElementById('avatarPlaceholder');

        if(fileInput) {
            fileInput.addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        if(avatarPlaceholder) avatarPlaceholder.classList.add('d-none');
                        if(avatarPreview) {
                            avatarPreview.src = e.target.result;
                            avatarPreview.classList.remove('d-none');
                        }
                    }
                    reader.readAsDataURL(file);
                }
            });
        }
    });
</script>

</body>
</html>
