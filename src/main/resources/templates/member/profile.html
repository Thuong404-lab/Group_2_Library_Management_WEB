<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title>Hồ Sơ Cá Nhân</title>
</head>

<body>
    <div layout:fragment="content" class="container mt-4 mb-5">
        <h2 class="fw-bold mb-4">Hồ Sơ Cá Nhân</h2>

        <div class="row g-4">
            <!-- Profile Card -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-3 mb-4">
                    <div class="card-body text-center p-4">
                        <div class="position-relative d-inline-block mb-3">
                            <img src="https://ui-avatars.com/api/?name=Nguyễn+Lan+Anh&background=0D8ABC&color=fff&size=120" alt="Avatar" class="rounded-circle border border-3 border-white shadow-sm">
                            <button class="btn btn-sm btn-primary position-absolute bottom-0 end-0 rounded-circle" style="width: 32px; height: 32px;"><i class="bi bi-camera-fill"></i></button>
                        </div>
                        <h4 class="fw-bold mb-1">Nguyễn Thị Lan Anh</h4>
                        <p class="text-muted mb-3">lananh.nguyen@example.com</p>
                        <div class="d-flex justify-content-center gap-2 mb-3">
                            <span class="badge bg-primary px-3 py-2">Thành viên</span>
                            <span class="badge bg-warning text-dark px-3 py-2"><i class="bi bi-star-fill"></i> LOYAL</span>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between text-start small mt-3">
                            <span class="text-muted">Ngày tham gia:</span>
                            <span class="fw-bold">12/05/2023</span>
                        </div>
                        <div class="d-flex justify-content-between text-start small mt-2">
                            <span class="text-muted">Tổng sách đã mượn:</span>
                            <span class="fw-bold text-primary">45 cuốn</span>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-3">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3"><i class="bi bi-shield-lock-fill text-secondary me-2"></i>Bảo mật tài khoản</h6>
                        <button class="btn btn-outline-primary w-100 mb-2">Đổi mật khẩu</button>
                        <button class="btn btn-outline-danger w-100">Yêu cầu xóa tài khoản</button>
                    </div>
                </div>
            </div>

            <!-- Profile Form -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-3 h-100">
                    <div class="card-header bg-white border-0 pt-4 pb-0">
                        <h5 class="fw-bold mb-0">Thông tin chi tiết</h5>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small">Họ và Tên</label>
                                    <input type="text" class="form-control" value="Nguyễn Thị Lan Anh">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small">Tên đăng nhập (Username)</label>
                                    <input type="text" class="form-control bg-light" value="lananh123" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small">Email</label>
                                    <input type="email" class="form-control" value="lananh.nguyen@example.com">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small">Số điện thoại</label>
                                    <input type="tel" class="form-control" value="0987654321">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-bold text-muted small">Địa chỉ</label>
                                    <input type="text" class="form-control" value="Số 1, Đại Cồ Việt, Hai Bà Trưng, Hà Nội">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small">Ngày sinh</label>
                                    <input type="date" class="form-control" value="1998-05-15">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-muted small">Giới tính</label>
                                    <select class="form-select">
                                        <option value="male">Nam</option>
                                        <option value="female" selected>Nữ</option>
                                        <option value="other">Khác</option>
                                    </select>
                                </div>
                                
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-primary px-4 fw-bold">Cập nhật thông tin</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-danger">Change Password</button>
        </form>

        <hr style="margin-top: 30px; border: 0; border-top: 1px solid #eee;">
        <div style="text-align: center; margin-top: 20px;">
            <a href="/" class="btn-home">🏠 Back to Home</a>
        </div>

    </div>
</div>

</body>
</html>
