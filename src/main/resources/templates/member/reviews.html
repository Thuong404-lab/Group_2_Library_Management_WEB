<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout/base}"
>
  <head>
    <title>Đánh giá của tôi</title>
    <style>
      .member-page {
        max-width: 1250px;
      }
      .member-page-title {
        color: #4a3b32;
        font-family: "Playfair Display", serif;
      }
      .review-card {
        border: 1px solid rgba(139, 90, 43, 0.14);
        border-left: 4px solid #8b5a2b;
        border-radius: 8px;
        transition: box-shadow 0.2s;
      }
      .review-card:hover {
        box-shadow: 0 4px 16px rgba(139, 90, 43, 0.12) !important;
      }
      .sent-review-card {
        background: #fffdfa;
        border: 1px solid rgba(139, 90, 43, 0.14);
        border-left: 4px solid #8b5a2b;
        border-radius: 8px;
        box-shadow: 0 4px 14px rgba(74, 59, 50, 0.07) !important;
      }
      .review-table thead th {
        background: #fdfbf7;
        color: #4a3b32;
        border-bottom: 1px solid rgba(139, 90, 43, 0.18);
        font-weight: 700;
      }
      .review-table tbody td {
        border-color: rgba(139, 90, 43, 0.1);
      }
      .review-table .review-main-row td {
        border-bottom: 0;
      }
      .review-table .review-detail-row td {
        border-top: 0;
        padding-top: 0;
      }
      .review-cover {
        width: 56px;
        height: 78px;
        object-fit: cover;
        border-radius: 6px;
        border: 1px solid rgba(139, 90, 43, 0.12);
        margin-right: 1.5rem;
      }
      .sent-review-title {
        color: #2c1e16;
        font-family: 'Playfair Display', serif;
      }
      .genre-badge {
        background: #eee4d6;
        color: #5f4736;
        border: 1px solid rgba(139, 90, 43, 0.15);
        font-weight: 600;
      }
      .sent-review-rating {
        color: #c8942d;
        font-weight: 700;
        letter-spacing: 1px;
      }
      .sent-review-comment {
        background: #fbf6ee;
        border-left: 3px solid #8b5a2b;
        color: #3f3128;
      }
      .librarian-response-box {
        background: #f1f6ef;
        border-left: 3px solid #6f8a57;
        color: #3f3128;
      }
      .librarian-response-title {
        color: #557143;
      }
      .btn-review-classic {
        border-color: #8b5a2b;
        color: #fff;
        background: #8b5a2b;
        font-weight: 700;
      }
      .btn-review-classic:hover,
      .btn-review-classic:focus {
        background: #74481f;
        border-color: #74481f;
        color: #fff;
      }
      .review-actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        justify-content: flex-end;
      }
      .review-actions .btn {
        width: 110px;
      }
    </style>
  </head>

  <body>
    <div layout:fragment="content" class="container member-page mt-4 mb-5">
      <div
        class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom"
      >
        <div>
          <h2
            class="member-page-title fw-bold mb-1"
          >
            Đánh giá
            của tôi
          </h2>
          <div class="text-muted">
            <span th:text="${myReviews != null ? myReviews.totalElements : 0}">0</span>
            đánh giá bạn đã gửi
          </div>
        </div>
      </div>

      <div
        class="alert alert-success"
        th:if="${success}"
        th:text="${success}"
      ></div>
      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

      <div class="mb-3">
        <h5 class="fw-bold" style="color: #4a3b32">
          <i class="bi bi-list-stars me-2" style="color: #8b5a2b"></i>Đánh giá
          đã gửi
        </h5>
      </div>

      <div class="card sent-review-card border-0 shadow-sm">
        <div class="card-body p-4">
          <div class="table-responsive">
            <table class="table review-table align-middle">
              <thead>
                <tr>
                  <th class="ps-3 py-3" style="width: 42%;">Tên sách</th>
                  <th class="py-3" style="width: 24%;">Tác giả</th>
                  <th class="py-3" style="width: 14%;">Đánh giá</th>
                  <th class="text-end pe-3 py-3" style="width: 20%;">Thao tác</th>
                </tr>
              </thead>
              <tbody>
                <tr th:if="${myReviews == null || myReviews.totalElements == 0}">
                  <td colspan="4" class="text-center text-muted py-5">
                    <i class="bi bi-list-stars fs-2 d-block mb-2" style="color:#8b5a2b;"></i>
                    Bạn chưa gửi đánh giá nào.
                  </td>
                </tr>

                <th:block th:each="review : ${myReviews.content}">
                  <tr class="review-main-row">
                    <td class="ps-3 py-3">
                      <div class="d-flex align-items-center">
                        <img
                          th:src="@{'https://picsum.photos/seed/' + ${review.book.bookId} + '/100/150'}"
                          class="review-cover shadow-sm"
                          alt="Book"
                        />
                        <div>
                          <h6 class="mb-2 fw-bold sent-review-title" th:text="${review.book.title}">
                            Tên sách
                          </h6>
                          <span
                            class="badge genre-badge"
                            th:text="${review.book.genre != null ? review.book.genre.genreName : 'Chưa phân loại'}"
                          >
                            Thể loại
                          </span>
                        </div>
                      </div>
                    </td>

                    <td>
                      <span
                        th:if="${review.book.authors != null && !review.book.authors.isEmpty()}"
                        th:text="${review.book.authors.iterator().next().authorName}"
                      >
                        Tác giả
                      </span>
                      <span th:unless="${review.book.authors != null && !review.book.authors.isEmpty()}">
                        Chưa rõ
                      </span>
                    </td>

                    <td>
                      <div class="sent-review-rating mb-1">
                        <span th:each="i : ${#numbers.sequence(1, review.rating)}">★</span>
                        <span class="text-muted small" th:text="${review.rating + '/5'}">5/5</span>
                      </div>
                      <div
                        class="small text-muted"
                        th:text="${review.createdDate != null ? #temporals.format(review.createdDate, 'dd/MM/yyyy') : 'Chưa rõ ngày'}"
                      >
                        Ngày
                      </div>
                    </td>

                    <td class="text-end pe-3">
                      <div class="review-actions">
                        <a
                          th:href="@{'/books/' + ${review.book.bookId}}"
                          class="btn btn-sm btn-review-classic"
                        >
                          Xem sách
                        </a>
                        <form
                          th:action="@{'/member/interaction/reviews/' + ${review.feedbackId} + '/delete'}"
                          method="post"
                          class="m-0"
                        >
                          <button type="submit" class="btn btn-sm btn-outline-danger">
                            Xóa
                          </button>
                        </form>
                      </div>
                    </td>
                  </tr>

                  <tr class="review-detail-row">
                    <td colspan="4" class="ps-3 pe-3 pb-4">
                      <div
                        class="p-3 rounded mb-3 lh-lg sent-review-comment"
                        th:text="${review.comment}"
                      >
                        Nội dung đánh giá
                      </div>

                      <div
                        class="p-3 rounded librarian-response-box"
                        th:if="${review.librarianResponse != null && !review.librarianResponse.isBlank()}"
                      >
                        <div class="fw-bold mb-1 librarian-response-title">
                          Phản hồi của thủ thư
                        </div>
                        <div th:text="${review.librarianResponse}">Nội dung phản hồi</div>
                      </div>
                    </td>
                  </tr>
                </th:block>
              </tbody>
            </table>
          </div>
          <nav th:if="${myReviews != null && myReviews.totalPages > 1}" class="mt-3"
            th:with="startPage=${myReviews.totalPages <= 10 ? 0 : (myReviews.number < 9 ? 0 : (myReviews.number - 8 > myReviews.totalPages - 10 ? myReviews.totalPages - 10 : myReviews.number - 8))}, endPage=${startPage + 9 < myReviews.totalPages ? startPage + 9 : myReviews.totalPages - 1}">
            <ul class="pagination justify-content-center mb-0">
              <li class="page-item" th:classappend="${myReviews.first} ? 'disabled'">
                <a class="page-link" th:href="@{/member/interaction/reviews(page=0)}"
                  style="color: #8b5a2b; border-color: rgba(139, 90, 43, 0.2);">Đầu</a>
              </li>
              <li class="page-item" th:classappend="${myReviews.first} ? 'disabled'">
                <a class="page-link" th:href="@{/member/interaction/reviews(page=${myReviews.number - 1})}"
                  style="color: #8b5a2b; border-color: rgba(139, 90, 43, 0.2);"><i class="bi bi-chevron-left"></i></a>
              </li>
              <li class="page-item disabled" th:if="${startPage > 0}">
                <span class="page-link">…</span>
              </li>
              <li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
                th:classappend="${i == myReviews.number ? 'active' : ''}">
                <a class="page-link" th:href="@{/member/interaction/reviews(page=${i})}"
                  th:text="${i + 1}"
                  th:style="${i == myReviews.number ? 'background-color: #8b5a2b; border-color: #8b5a2b; color: white;' : 'color: #8b5a2b; border-color: rgba(139, 90, 43, 0.2);'}">1</a>
              </li>
              <li class="page-item disabled" th:if="${endPage < myReviews.totalPages - 1}">
                <span class="page-link">…</span>
              </li>
              <li class="page-item" th:classappend="${myReviews.last} ? 'disabled'">
                <a class="page-link" th:href="@{/member/interaction/reviews(page=${myReviews.number + 1})}"
                  style="color: #8b5a2b; border-color: rgba(139, 90, 43, 0.2);">
                  <i class="bi bi-chevron-right"></i>
                </a>
              </li>
              <li class="page-item" th:classappend="${myReviews.last} ? 'disabled'">
                <a class="page-link" th:href="@{/member/interaction/reviews(page=${myReviews.totalPages - 1})}"
                  style="color: #8b5a2b; border-color: rgba(139, 90, 43, 0.2);">Cuối</a>
              </li>
            </ul>
          </nav>
        </div>
      </div>

    </div>
  </body>
</html>
