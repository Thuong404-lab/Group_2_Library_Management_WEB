<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">

<head>
    <title>Thông báo nạp tiền</title>
</head>

<body>
    <main layout:fragment="content">
        <div class="container mt-4 mb-5">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
                <div>
                    <h2 class="fw-bold mb-1">Thông báo nạp tiền</h2>
                    <div class="text-muted">Các thông báo liên quan đến giao dịch nạp tiền vào ví của bạn.</div>
                </div>
                <a th:href="@{/member/financial/transactions}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i> Lịch sử giao dịch
                </a>
            </div>

            <div th:if="${notifications == null or #lists.isEmpty(notifications)}"
                 class="card border-0 shadow-sm">
                <div class="card-body text-center text-muted py-5">
                    Hiện chưa có thông báo nạp tiền nào.
                </div>
            </div>

            <div class="list-group shadow-sm"
                 th:if="${notifications != null and !#lists.isEmpty(notifications)}">
                <div class="list-group-item list-group-item-action p-4"
                     th:each="memberNotification : ${notifications}">
                    <div class="d-flex flex-wrap justify-content-between align-items-start gap-2 mb-2">
                        <h5 class="mb-0"
                            th:text="${memberNotification.notification.title}">
                            Thông báo nạp tiền
                        </h5>
                        <small class="text-muted"
                               th:text="${memberNotification.notification.createdDate != null ? #temporals.format(memberNotification.notification.createdDate, 'dd/MM/yyyy HH:mm') : 'N/A'}">
                            01/01/2026 08:00
                        </small>
                    </div>

                    <p class="mb-3"
                       th:text="${memberNotification.notification.content}">
                        Nội dung thông báo
                    </p>

                    <span class="badge"
                          th:classappend="${memberNotification.isRead} ? ' bg-success' : ' bg-warning text-dark'"
                          th:text="${memberNotification.isRead} ? 'Đã đọc' : 'Chưa đọc'">
                        Chưa đọc
                    </span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
