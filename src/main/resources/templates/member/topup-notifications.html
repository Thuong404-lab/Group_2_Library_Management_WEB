<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <!-- UC-8.5 UI maintained by Pham Kien Quoc. -->
    <meta charset="UTF-8">
    <title>Thông báo nạp tiền</title>
</head>
<body>
<div layout:fragment="content" class="container mt-4 mb-5">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <div>
            <h2 class="fw-bold mb-1">Thông báo nạp tiền</h2>
            <div class="text-muted">Theo dõi các thông báo liên quan đến giao dịch nạp tiền vào ví của bạn.</div>
        </div>
        <a th:href="@{/member/financial/transactions(type='TOP_UP')}" class="btn btn-outline-secondary">
            Lịch sử nạp tiền
        </a>
    </div>

    <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

    <form method="post" th:action="@{/member/financial/topup-notifications/mark-all-read(page=${currentPage})}"
          class="mb-3" th:if="${notifications != null and !#lists.isEmpty(notifications)}">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn btn-outline-primary btn-sm">
            Đánh dấu tất cả là đã đọc
        </button>
    </form>

    <div th:if="${notifications == null or #lists.isEmpty(notifications)}" class="card border-0 shadow-sm">
        <div class="card-body text-center text-muted py-5">
            Hiện chưa có thông báo nạp tiền nào.
        </div>
    </div>

    <div class="list-group" th:if="${notifications != null and !#lists.isEmpty(notifications)}">
        <div class="list-group-item mb-2 border rounded shadow-sm"
             th:each="memberNotification : ${notifications}">
            <div class="d-flex flex-wrap justify-content-between align-items-start gap-2">
                <div>
                    <h5 class="mb-1" th:text="${memberNotification.notification.title}">Nạp tiền thành công</h5>
                    <p class="mb-2 text-muted" th:text="${memberNotification.notification.content}">
                        Tài khoản ví của bạn vừa được nạp tiền.
                    </p>
                </div>
                <small class="text-muted"
                       th:text="${memberNotification.notification.createdDate != null ? #temporals.format(memberNotification.notification.createdDate, 'dd/MM/yyyy HH:mm') : 'N/A'}">
                    01/01/2026 08:00
                </small>
            </div>

            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
                <span class="badge"
                      th:classappend="${memberNotification.isRead} ? ' bg-success' : ' bg-warning text-dark'"
                      th:text="${memberNotification.isRead} ? 'Đã đọc' : 'Chưa đọc'">
                    Chưa đọc
                </span>
                <form method="post"
                      th:if="${!memberNotification.isRead}"
                      th:action="@{/member/financial/topup-notifications/{id}/mark-read(id=${memberNotification.notification.notificationId}, page=${currentPage})}">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-outline-success">
                        Đánh dấu đã đọc
                    </button>
                </form>
            </div>
        </div>
    </div>

    <nav th:if="${notificationPage != null and notificationPage.totalPages > 1}" class="mt-3"
         aria-label="Phân trang thông báo nạp tiền">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${notificationPage.first} ? 'disabled'">
                <a class="page-link page-link-classic" th:href="@{/member/financial/topup-notifications(page=${currentPage - 1})}">Trước</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, notificationPage.totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link page-link-classic" th:href="@{/member/financial/topup-notifications(page=${i})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${notificationPage.last} ? 'disabled'">
                <a class="page-link page-link-classic" th:href="@{/member/financial/topup-notifications(page=${currentPage + 1})}">Sau</a>
            </li>
        </ul>
    </nav>

    <a th:href="@{/member/financial/transactions}" class="btn btn-secondary mt-3">
        Quay lại lịch sử giao dịch
    </a>
</div>
</body>
</html>
