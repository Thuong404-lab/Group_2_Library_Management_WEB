<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Thư Viện Số</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/pages/register.css}" />
      <link rel="stylesheet" th:href="@{/css/utilities.css}" />
  </head>
<body>
    <div class="container">
        <div class="card auth-card mx-auto">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-badge mb-3 register-i-font-size-color-01"></i>
                    <h3 class="fw-bold auth-title">Thành Viên Mới</h3>
                    <p class="text-muted register-p-font-style-02">Gia nhập không gian tri thức cổ điển</p>
                </div>

                <div th:if="${errorMsg}" class="alert alert-danger py-2" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
                </div>

                <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="needs-validation" novalidate>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="fullName" th:field="*{fullName}" placeholder="Họ và tên" maxlength="50" required autofocus>
                        <label for="fullName">Họ và tên</label>
                        <div class="invalid-feedback">Vui lòng nhập họ và tên hợp lệ.</div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Tên đăng nhập" required>
                                <label for="username">Tên đăng nhập</label>
                                <div class="invalid-feedback">Vui lòng nhập tên đăng nhập (3-20 ký tự).</div>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Mật khẩu" required>
                                <label for="password">Mật khẩu</label>
                                <div class="invalid-feedback">Vui lòng nhập mật khẩu (ít nhất 6 ký tự).</div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <div class="form-floating">
                                <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="Email" required>
                                <label for="email">Email</label>
                                <div class="invalid-feedback">Vui lòng nhập email hợp lệ.</div>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-floating">
                                <input type="tel" class="form-control" id="phone" th:field="*{phone}" placeholder="Số điện thoại" required>
                                <label for="phone">Số điện thoại</label>
                                <div class="invalid-feedback">Vui lòng nhập SDT hợp lệ (10 số, VD: 09xx, 08xx...).</div>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-classic w-100 py-2 fs-5 mb-3 fw-bold u-font-family-playfair-display-serif-53670465" type="submit">Đăng Ký Thành Viên</button>

                    <!-- Tạm ẩn phần đăng nhập Google -->
                </form>
            </div>
            <div class="card-footer text-center py-3 border-top border-secondary rounded-bottom-4 register-div-background-04">
                <span class="text-muted">Đã có tài khoản?</span>
                <a th:href="@{/login}" class="text-decoration-none fw-semibold text-classic ms-1">Đăng nhập ngay</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap Validation Script -->
    <script>
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms)
                .forEach(function (form) {
                    form.addEventListener('submit', function (event) {
                        if (!form.checkValidity()) {
                            event.preventDefault()
                            event.stopPropagation()
                        }
                        form.classList.add('was-validated')
                    }, false)
                })
        })()
    </script>
</body>
</html>
