<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Thư Viện Số</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
            margin: 0;
        }
        .auth-card {
            border-radius: 1rem;
            border: none;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
            max-width: 550px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card auth-card mx-auto">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus text-success mb-3" style="font-size: 3rem;"></i>
                    <h3 class="fw-bold">Tạo Tài Khoản</h3>
                    <p class="text-muted">Tham gia thư viện của chúng tôi</p>
                </div>

                <div th:if="${errorMsg}" class="alert alert-danger py-2" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
                </div>

                <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="fullName" th:field="*{fullName}" placeholder="Họ và tên" required autofocus>
                        <label for="fullName">Họ và tên</label>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Tên đăng nhập" required>
                                <label for="username">Tên đăng nhập</label>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Mật khẩu" required>
                                <label for="password">Mật khẩu</label>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <div class="form-floating">
                                <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="Email" required>
                                <label for="email">Email</label>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-floating">
                                <input type="tel" class="form-control" id="phone" th:field="*{phone}" placeholder="Số điện thoại" required>
                                <label for="phone">Số điện thoại</label>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-success w-100 py-2 fs-5 mb-3" type="submit">Đăng Ký Thành Viên</button>

                    <!-- Tạm ẩn phần đăng nhập Google
                    <div class="d-flex align-items-center mb-3">
                        <hr class="flex-grow-1">
                        <span class="mx-2 text-muted">Hoặc</span>
                        <hr class="flex-grow-1">
                    </div>
                    
                    <a href="/oauth2/authorization/google" class="btn btn-outline-danger w-100 py-2 fs-6">
                        <i class="bi bi-google me-2"></i> Đăng ký bằng Google
                    </a>
                    -->
                </form>
            </div>
            <div class="card-footer bg-white text-center py-3 border-0 rounded-bottom-4">
                <span class="text-muted">Đã có tài khoản?</span>
                <a th:href="@{/login}" class="text-decoration-none fw-semibold text-success">Đăng nhập ngay</a>
            </div>
        </div>
    </div>
</body>
</html>
