<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Thư Viện Số</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lora', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
            margin: 0;
            background-image: url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 30, 22, 0.7);
            z-index: 1;
        }
        .container {
            z-index: 2;
        }
        .auth-card {
            border-radius: 12px;
            border: 2px solid #8b5a2b;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 550px;
            width: 100%;
            background-color: rgba(253, 251, 247, 0.95);
            backdrop-filter: blur(10px);
        }
        .auth-title {
            font-family: 'Playfair Display', serif;
            color: #4a3b32;
        }
        .btn-classic {
            background-color: #8b5a2b;
            color: #fdfbf7;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-classic:hover {
            background-color: #4a3b32;
            color: #fdfbf7;
        }
        .form-floating > label {
            color: #6c757d;
        }
        .form-control:focus {
            border-color: #8b5a2b;
            box-shadow: 0 0 0 0.25rem rgba(139, 90, 43, 0.25);
        }
        .text-classic {
            color: #8b5a2b !important;
            transition: color 0.3s ease;
        }
        .text-classic:hover {
            color: #4a3b32 !important;
            text-decoration: underline !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card auth-card mx-auto">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-badge mb-3" style="font-size: 3rem; color: #8b5a2b;"></i>
                    <h3 class="fw-bold auth-title">Thành Viên Mới</h3>
                    <p class="text-muted" style="font-style: italic;">Gia nhập không gian tri thức cổ điển</p>
                </div>

                <div th:if="${errorMsg}" class="alert alert-danger py-2" role="alert">
                    <i class="bi bi-exclamation-circle me-2"></i><span th:text="${errorMsg}"></span>
                </div>

                <form th:action="@{/register}" th:object="${registerRequest}" method="post">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="fullName" th:field="*{fullName}" placeholder="Họ và tên" required autofocus>
                        <label for="fullName">Họ và tên</label>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Tên đăng nhập" required>
                                <label for="username">Tên đăng nhập</label>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Mật khẩu" required>
                                <label for="password">Mật khẩu</label>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <div class="form-floating">
                                <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="Email" required>
                                <label for="email">Email</label>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="form-floating">
                                <input type="tel" class="form-control" id="phone" th:field="*{phone}" placeholder="Số điện thoại" required>
                                <label for="phone">Số điện thoại</label>
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-classic w-100 py-2 fs-5 mb-3 fw-bold" type="submit" style="font-family: 'Playfair Display', serif;">Đăng Ký Thành Viên</button>

                    <!-- Tạm ẩn phần đăng nhập Google -->
                </form>
            </div>
            <div class="card-footer text-center py-3 border-top border-secondary rounded-bottom-4" style="background-color: transparent;">
                <span class="text-muted">Đã có tài khoản?</span>
                <a th:href="@{/login}" class="text-decoration-none fw-semibold text-classic ms-1">Đăng nhập ngay</a>
            </div>
        </div>
    </div>
</body>
</html>
