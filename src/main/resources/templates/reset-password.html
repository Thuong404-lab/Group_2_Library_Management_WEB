<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt Lại Mật Khẩu</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .reset-password-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }
        .form-group label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="reset-password-container">
        <h2 class="text-center mb-4">Đặt Lại Mật Khẩu</h2>

        <div th:if="${successMsg}" class="alert alert-success" role="alert">
            <p th:text="${successMsg}"></p>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger" role="alert">
            <p th:text="${errorMsg}"></p>
        </div>

        <form th:action="@{/reset-password}" th:object="${resetPasswordRequest}" method="post">
            <input type="hidden" th:field="*{token}" th:value="${token}" />

            <div class="form-group">
                <label for="newPassword">Mật khẩu mới:</label>
                <input type="password" id="newPassword" th:field="*{newPassword}" class="form-control" required>
                <div class="text-danger" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu:</label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="form-control" required>
                <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Đặt lại mật khẩu</button>
        </form>
        <div class="text-center mt-3">
            <a th:href="@{/login}">Quay lại trang đăng nhập</a>
        </div>
    </div>
</body>
</html>
